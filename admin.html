<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SEAM 診断ダッシュボード</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="images/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Serif+JP:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#2B2926; --char:#5A534B; --gold:#9A6B3A; --line:#E7E0D6; --cream:#FBF7F1; --brown:#A87456; --bg:#F5F1EA; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Noto Sans JP',sans-serif;-webkit-font-smoothing:antialiased;}
  .wm{font-family:'Cormorant Garamond',serif;letter-spacing:.22em;}
  .serif{font-family:'Noto Serif JP',serif;}
  a{color:inherit}
  header{position:sticky;top:0;z-index:20;background:rgba(245,241,234,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
  .hwrap{max-width:1080px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .hwrap h1{margin:0;font-size:17px;font-weight:600;letter-spacing:.02em;}
  .hwrap .sub{font-size:11px;color:var(--char);font-family:'Noto Sans JP'}
  .btn{font-size:12px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:8px 14px;border-radius:999px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--gold);color:var(--gold)}
  .btn.solid{background:var(--brown);color:#fff;border-color:var(--brown)}
  main{max-width:1080px;margin:0 auto;padding:22px 20px 60px;}
  .grid{display:grid;gap:14px}
  .kpis{grid-template-columns:repeat(2,1fr)}
  @media(min-width:760px){.kpis{grid-template-columns:repeat(4,1fr)}}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 18px 16px;box-shadow:0 1px 2px rgba(0,0,0,.02)}
  .kpi .label{font-size:11px;color:var(--char);letter-spacing:.04em}
  .kpi .num{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:38px;line-height:1.05;margin-top:4px;color:var(--ink)}
  .kpi .unit{font-size:12px;color:var(--char);margin-left:4px;font-family:'Noto Sans JP'}
  .panels{grid-template-columns:1fr;margin-top:16px}
  @media(min-width:760px){.panels{grid-template-columns:1fr 1fr}}
  .panel h2{margin:0 0 14px;font-size:14px;font-weight:600;letter-spacing:.02em;display:flex;align-items:center;gap:8px}
  .panel h2 .eyebrow{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
  .bar-row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:12.5px}
  .bar-row .nm{width:104px;flex-shrink:0;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar-track{flex:1;height:18px;background:#F1EBE2;border-radius:6px;overflow:hidden}
  .bar-fill{display:block;height:100%;background:linear-gradient(90deg,#C79A6E,#A87456);border-radius:6px;min-width:2px;transition:width .5s ease}
  .bar-row .ct{width:64px;text-align:right;flex-shrink:0;color:var(--char);font-variant-numeric:tabular-nums}
  .bar-row .ct b{color:var(--ink)}
  .empty{color:var(--char);font-size:12px;padding:10px 0}
  /* login & states */
  .overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px;z-index:50}
  .login{background:#fff;border:1px solid var(--line);border-radius:16px;padding:30px 28px;max-width:380px;width:100%;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.06)}
  .login .wm{font-size:26px;color:var(--ink)}
  .login p{font-size:12.5px;color:var(--char);margin:.6em 0 1.4em;line-height:1.7}
  .login input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;font-size:14px;margin-bottom:12px;font-family:inherit}
  .login input:focus{outline:none;border-color:var(--gold)}
  .login .err{color:#b4453a;font-size:12px;min-height:1em;margin-top:8px}
  .setup{font-size:12.5px;line-height:1.9;color:var(--char)}
  .setup code{background:var(--cream);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-size:12px;color:var(--gold)}
  .setup ol{padding-left:1.2em} .setup li{margin:.5em 0}
  .spark{width:100%;height:120px;display:block}
  .muted{color:var(--char);font-size:11px}
  .pill{display:inline-block;font-size:10px;border:1px solid var(--line);border-radius:999px;padding:2px 8px;color:var(--char)}
  .tbl-wrap{max-height:400px;overflow:auto;border:1px solid var(--line);border-radius:10px}
  .tbl{width:100%;border-collapse:collapse;font-size:12.5px}
  .tbl th{position:sticky;top:0;background:var(--cream);text-align:left;font-weight:600;color:var(--char);padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap;font-size:11px;letter-spacing:.03em}
  .tbl td{padding:8px 12px;border-bottom:1px solid #F1EBE2;white-space:nowrap;color:var(--ink)}
  .tbl tbody tr:last-child td{border-bottom:none}
  .tbl .n{text-align:right;font-variant-numeric:tabular-nums}
  .tbl td.n b{color:var(--ink)}
</style>
</head>
<body>
<div id="app" hidden>
  <header>
    <div class="hwrap">
      <div>
        <h1 class="serif">SEAM 診断ダッシュボード</h1>
        <span class="sub" id="genAt">—</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="rangeSel" class="btn" style="padding:7px 10px">
          <option value="30">直近30日</option>
          <option value="90" selected>直近90日</option>
          <option value="365">直近1年</option>
        </select>
        <button class="btn" id="csvBtn">CSV書出</button>
        <button class="btn" id="reloadBtn">更新</button>
        <button class="btn" id="logoutBtn">ログアウト</button>
      </div>
    </div>
  </header>
  <main>
    <div id="notice"></div>
    <section class="grid kpis" id="kpis"></section>
    <section class="grid panels" id="panels"></section>
    <p class="muted" style="margin-top:22px">個人情報は一切含みません（氏名・連絡先なし）。診断の傾向集計のみ。SEAM内部用・<span class="pill">noindex</span></p>
  </main>
</div>

<!-- login overlay -->
<div class="overlay" id="loginOverlay">
  <div class="login">
    <div class="wm">SEAM</div>
    <p class="serif" style="font-size:14px;color:var(--ink);margin-bottom:.3em">診断ダッシュボード</p>
    <p>関係者用パスキーを入力してください</p>
    <input type="password" id="keyInput" placeholder="パスキー" autocomplete="current-password" />
    <button class="btn solid" style="width:100%;padding:12px" id="loginBtn">表示する</button>
    <div class="err" id="loginErr"></div>
    <p class="muted" style="margin-top:16px">デモ表示は <a href="?demo=1" style="color:var(--gold)">?demo=1</a></p>
  </div>
</div>

<script>
(function(){

    return {configured:true, generatedAt:Date.now(), windowDays:90, _demo:true, profile:demoProfile(),

      byType:byType, byAdvice:[{a:'damage',c:Math.round(completes*.28)},{a:'frizz',c:Math.round(completes*.22)},{a:'dry',c:Math.round(completes*.18)},{a:'scalp',c:Math.round(completes*.14)},{a:'volume',c:Math.round(completes*.1)},{a:'color',c:Math.round(completes*.08)}],
      byTier:[{tier:1,c:Math.round(completes*.22)},{tier:2,c:Math.round(completes*.41)},{tier:3,c:Math.round(completes*.37)}],
      byGender:[{g:'female',c:Math.round(completes*.83)},{g:'male',c:Math.round(completes*.15)},{g:'other',c:Math.round(completes*.02)}],
      byMode:[{m:'a',c:Math.round(completes*.86)},{m:'b',c:Math.round(completes*.56)}],
      ctaTarget:[{target:'reserve_hpb',c:Math.round(completes*.19)},{target:'shop',c:Math.round(completes*.09)},{target:'product',c:Math.round(completes*.06)}],
      daily:d,
      bySource:[{ref:'instagram',c:Math.round(completes*.46)},{ref:'google',c:Math.round(completes*.27)},{ref:'direct',c:Math.round(completes*.14)},{ref:'x',c:Math.round(completes*.07)},{ref:'line',c:Math.round(completes*.06)}],
      byCampaign:[{u:'summer_2026',c:Math.round(completes*.21)},{u:'ig_story_uneri',c:Math.round(completes*.14)},{u:'kerastase_launch',c:Math.round(completes*.08)}],
      byDevice:[{d:'mobile',c:Math.round(completes*.88)},{d:'desktop',c:Math.round(completes*.12)}],
      byCountry:[{country:'JP',c:Math.round(completes*.94)},{country:'TW',c:Math.round(completes*.03)},{country:'US',c:Math.round(completes*.02)}],
      byLanding:[{landing:'/finder',c:Math.round(completes*.52)},{landing:'/',c:Math.round(completes*.30)},{landing:'/guide-uneri',c:Math.round(completes*.10)}],
      sourceFunnel:[{ref:'instagram',starts:Math.round(completes*.62),completes:Math.round(completes*.46),ctas:Math.round(completes*.18)},{ref:'google',starts:Math.round(completes*.40),completes:Math.round(completes*.27),ctas:Math.round(completes*.08)},{ref:'direct',starts:Math.round(completes*.19),completes:Math.round(completes*.14),ctas:Math.round(completes*.05)},{ref:'x',starts:Math.round(completes*.12),completes:Math.round(completes*.07),ctas:Math.round(completes*.02)}],
      recent:recentGen() };
  }

  // ---- 描画 ----
  function pct(n,total){return total>0?Math.round(n/total*1000)/10:0;}
  function barRows(items, nameFn){
    var max=items.reduce(function(m,x){return Math.max(m,x.c);},0)||1;
    var tot=items.reduce(function(s,x){return s+x.c;},0)||0;
    if(!items.length) return '<div class="empty">データなし</div>';
    return items.map(function(x){
      var w=Math.max(2, x.c/max*100);
      return '<div class="bar-row"><span class="nm" title="'+esc(nameFn(x))+'">'+esc(nameFn(x))+'</span>'+
        '<span class="bar-track"><span class="bar-fill" style="width:'+w+'%"></span></span>'+
        '<span class="ct"><b>'+x.c+'</b> <span class="muted">'+pct(x.c,tot)+'%</span></span></div>';
    }).join('');
  }
  function panel(eyebrow,title,inner){
    return '<div class="card panel"><h2><span class="eyebrow">'+eyebrow+'</span>'+esc(title)+'</h2>'+inner+'</div>';
  }
  function kpi(label,num,unit){
    return '<div class="card kpi"><div class="label">'+esc(label)+'</div><div class="num">'+num+(unit?'<span class="unit">'+unit+'</span>':'')+'</div></div>';
  }
  function sparkline(daily){
    if(!daily||!daily.length) return '<div class="empty">データなし</div>';
    var W=560,H=110,pad=6;
    var max=daily.reduce(function(m,x){return Math.max(m,x.c);},0)||1;
    var n=daily.length;
    var pts=daily.map(function(x,i){var px=pad+i/(Math.max(1,n-1))*(W-2*pad);var py=H-pad-(x.c/max)*(H-2*pad-10);return [px,py];});
    var line=pts.map(function(p,i){return (i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1);}).join(' ');
    var area=line+' L '+pts[n-1][0].toFixed(1)+' '+(H-pad)+' L '+pts[0][0].toFixed(1)+' '+(H-pad)+' Z';
    return '<svg class="spark" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'+
      '<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C79A6E" stop-opacity=".28"/><stop offset="1" stop-color="#C79A6E" stop-opacity="0"/></linearGradient></defs>'+
      '<path d="'+area+'" fill="url(#g)"/>'+
      '<path d="'+line+'" fill="none" stroke="#A87456" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'+
      '</svg><div class="muted" style="display:flex;justify-content:space-between;margin-top:2px"><span>'+esc(daily[0].d)+'</span><span>最多 '+max+'件/日</span><span>'+esc(daily[n-1].d)+'</span></div>';
  }

  // ---- プロファイル描画ヘルパー ----
  // {key:件数} → バー行。denomを渡すと右側は「件数 · denom比%」（複数選択は合計100%超）
  function objRows(obj, labels, denom, order){
    obj = obj || {};
    var keys = order ? order.filter(function(k){return obj[k];}) : Object.keys(obj).sort(function(a,b){return obj[b]-obj[a];});
    if(!keys.length) return '<div class="empty">データなし</div>';
    var max = keys.reduce(function(m,k){return Math.max(m,obj[k]);},0)||1;
    return keys.map(function(k){
      var n=obj[k], w=Math.max(2,n/max*100);
      var right='<b>'+n+'</b>'+(denom?' <span class="muted">'+pct(n,denom)+'%</span>':'');
      return '<div class="bar-row"><span class="nm" title="'+esc(labels[k]||k)+'">'+esc(labels[k]||k)+'</span>'+
        '<span class="bar-track"><span class="bar-fill" style="width:'+w+'%"></span></span>'+
        '<span class="ct">'+right+'</span></div>';
    }).join('');
  }
  // 年代別の該当率バー（分子obj / 分母=byAge）
  function rateByAge(numByAge, byAge){
    numByAge = numByAge||{}; byAge = byAge||{};
    var rows = AGE_ORDER.filter(function(a){return byAge[a];});
    if(!rows.length) return '<div class="empty">データなし</div>';
    return rows.map(function(a){
      var n=numByAge[a]||0, d=byAge[a]||0, r=pct(n,d);
      return '<div class="bar-row"><span class="nm">'+esc(AGE[a])+'</span>'+
        '<span class="bar-track"><span class="bar-fill" style="width:'+Math.max(2,r)+'%"></span></span>'+
        '<span class="ct"><b>'+r+'%</b> <span class="muted">'+n+'/'+d+'</span></span></div>';
    }).join('');
  }
  // 次元×列 ヒート表（既定は列=年代。セル=その列内での該当率%）
  function heatTable(rowKeys, rowLabels, matrix, colDenom, colOrder, colLabels){
    matrix = matrix||{}; colDenom = colDenom||{};
    colOrder = colOrder||AGE_ORDER; colLabels = colLabels||AGE;
    var cols = colOrder.filter(function(a){return colDenom[a];});
    if(!cols.length || !rowKeys.length) return '<div class="empty">データなし</div>';
    var maxR=0;
    rowKeys.forEach(function(rk){ cols.forEach(function(a){ var d=colDenom[a]||0, n=(matrix[rk]||{})[a]||0; var r=d?n/d*100:0; if(r>maxR)maxR=r; }); });
    maxR = maxR||1;
    var head='<tr><th></th>'+cols.map(function(a){return '<th class="n">'+esc(colLabels[a]||a)+'<div class="muted" style="font-weight:400">n='+colDenom[a]+'</div></th>';}).join('')+'</tr>';
    var body=rowKeys.map(function(rk){
      var tds=cols.map(function(a){
        var d=colDenom[a]||0, n=(matrix[rk]||{})[a]||0, r=d?Math.round(n/d*1000)/10:0;
        var alpha=(r/maxR)*0.55;
        return '<td class="n" style="background:rgba(199,154,110,'+alpha.toFixed(3)+')"><b>'+r+'%</b><div class="muted">'+n+'</div></td>';
      }).join('');
      return '<tr><td>'+esc(rowLabels[rk]||rk)+'</td>'+tds+'</tr>';
    }).join('');
    return '<div class="tbl-wrap" style="max-height:none"><table class="tbl"><thead>'+head+'</thead><tbody>'+body+'</tbody></table></div>';
  }
  // 月次トレンド（該当率%の複数ライン）
  function trendSvg(monthly){
    monthly = monthly||{};
    var yms = Object.keys(monthly).sort();
    if(yms.length < 2) return '<div class="empty">2ヶ月以上データがたまると 傾向線が表示されます（現在 '+yms.length+'ヶ月分）</div>';
    var series=[
      {k:'curlWant', label:'カール意欲', color:'#A87456'},
      {k:'permNow',  label:'パーマ現役', color:'#C79A6E'},
      {k:'bleach',   label:'ブリーチ経験', color:'#8C7A63'},
      {k:'kuse',     label:'くせあり', color:'#5A534B'},
      {k:'gray',     label:'白髪ケア中', color:'#B4453A'}
    ];
    var W=560,H=150,pad=8,padB=20;
    function xy(i,r){ var x=pad+i/(Math.max(1,yms.length-1))*(W-2*pad); var y=H-padB-(r/100)*(H-pad-padB); return [x,y]; }
    var paths=series.map(function(s){
      var d=yms.map(function(ym,i){ var m=monthly[ym]; var r=m.n?m[s.k]/m.n*100:0; var p=xy(i,r); return (i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1); }).join(' ');
      return '<path d="'+d+'" fill="none" stroke="'+s.color+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>';
    }).join('');
    var grid=[0,25,50,75,100].map(function(v){ var y=H-padB-(v/100)*(H-pad-padB); return '<line x1="'+pad+'" y1="'+y+'" x2="'+(W-pad)+'" y2="'+y+'" stroke="#F1EBE2" stroke-width="1"/><text x="'+(W-pad)+'" y="'+(y-2)+'" font-size="8" fill="#5A534B" text-anchor="end">'+v+'%</text>'; }).join('');
    var legend=series.map(function(s){return '<span style="display:inline-flex;align-items:center;gap:5px;margin-right:12px"><span style="width:14px;height:3px;background:'+s.color+';border-radius:2px;display:inline-block"></span>'+s.label+'</span>';}).join('');
    return '<svg class="spark" style="height:150px" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'+grid+paths+'</svg>'+
      '<div class="muted" style="display:flex;justify-content:space-between;margin-top:4px"><span>'+esc(yms[0])+'</span><span>'+esc(yms[yms.length-1])+'</span></div>'+
      '<div class="muted" style="margin-top:8px;line-height:2">'+legend+'</div>'+
      '<div class="muted" style="margin-top:4px">各月の診断完了に占める該当率（%）— パーマ・カール系の伸びを継続観測できます</div>';
  }
  // 「悩み → 求める質感」ペア表（広告コピー・開発コンセプトの素材）
  function pairTable(pairs, total){
    pairs = pairs||{};
    var keys=Object.keys(pairs).sort(function(a,b){return pairs[b]-pairs[a];}).slice(0,12);
    if(!keys.length) return '<div class="empty">データなし</div>';
    var rows=keys.map(function(k){
      var p=k.split('|');
      return '<tr><td>'+esc(CONCERN[p[0]]||p[0])+'</td><td>'+esc(TEXTURE[p[1]]||p[1])+'</td><td class="n"><b>'+pairs[k]+'</b></td><td class="n">'+pct(pairs[k],total)+'%</td></tr>';
    }).join('');
    return '<table class="tbl"><thead><tr><th>悩み</th><th>求める質感</th><th class="n">件数</th><th class="n">全体比</th></tr></thead><tbody>'+rows+'</tbody></table>'+
      '<p class="muted" style="margin:8px 0 0">例:「乾燥 × しっとりまとまり」が多ければ その組み合わせが広告コピー・開発コンセプトの最有力です</p>';
  }
  function noteLine(t){ return '<p class="muted" style="margin:10px 0 0;line-height:1.8">'+t+'</p>'; }
  function subhead(t){ return '<p style="font-size:11.5px;font-weight:600;color:var(--char);letter-spacing:.03em;margin:14px 0 4px">'+esc(t)+'</p>'; }

  // プロファイル分析セクション（仕入れ・ヘアケア/スタイリング剤開発・広告のリソース）
  function profilePanels(P){
    if(!P) return '';
    var full=' style="grid-column:1/-1"';
    var head='<div class="card panel"'+full+'><h2><span class="eyebrow">Profile</span>診断プロファイル分析 <span class="pill">開発・仕入れ・広告用</span></h2>'+
      '<p class="muted" style="line-height:1.9">期間内のプロファイル付き診断完了 <b style="color:var(--ink);font-size:14px">'+(P.n||0)+'</b> 件を集計 ／ 悩み・仕上がり希望などの複数選択は「選んだ人の率」なので合計は100%を超えます</p></div>';
    if(!P.n){
      return head+'<div class="card panel"'+full+'><div class="empty">プロファイル付きのデータはこれから溜まります（本更新以降の診断完了から自動で蓄積）</div></div>';
    }
    var topConcerns=Object.keys(P.concernTotal||{}).sort(function(a,b){return P.concernTotal[b]-P.concernTotal[a];}).slice(0,10);
    var texKeys=['moist','glossy','firm','smooth','airy','soft'].filter(function(k){return (P.textureTotal||{})[k];});
    return head+
      panel('Age','年代 分布', objRows(P.byAge, AGE, P.n, AGE_ORDER)) +
      panel('Concern','悩み 選択率（複数選択）', objRows(P.concernTotal, CONCERN, P.n) + noteLine('診断で選ばれた悩みの「選択した人の率」— 仕入れ・開発の優先順位の一次指標')) +
      '<div class="card panel"'+full+'><h2><span class="eyebrow">Concern × Age</span>悩み × 年代（各年代内の選択率）</h2>'+heatTable(topConcerns, CONCERN, P.concernByAge, P.byAge)+noteLine('色が濃いほど その年代で選ばれている悩み — 年代別の棚づくり・広告ターゲティングに')+'</div>' +
      panel('Texture','求める質感（理想の仕上がり）', objRows(P.textureTotal, TEXTURE, P.n) + noteLine('ヘアケア開発の「目指す官能」— 広告の約束ワードにもそのまま使えます')) +
      '<div class="card panel"'+full+'><h2><span class="eyebrow">Texture × Age</span>求める質感 × 年代</h2>'+heatTable(texKeys, TEXTURE, P.textureByAge, P.byAge)+'</div>' +
      panel('Goal','髪の目標', objRows(P.goalTotal, GOAL, P.n)) +
      panel('Wave','くせ・うねりの実態', objRows(P.waveTotal, WAVE, P.n) +
        subhead('くせあり率 × 年代（湿気広がり〜全体くせ）') + rateByAge(P.kuseByAge, P.byAge) +
        subhead('縮毛矯正中の率 × 年代') + rateByAge(P.straightenedByAge, P.byAge)) +
      panel('Bleach','ブリーチ', subhead('経験率 × 年代（部分ブリーチ含む）') + rateByAge(P.bleachByAge, P.byAge) +
        subhead('経験の内訳') + objRows((function(){var o={};for(var k in (P.bleachTotal||{}))if(k!=='none')o[k]=P.bleachTotal[k];return o;})(), BLEACH, P.n)) +
      panel('Gray','白髪', subhead('白髪染め中の率 × 年代（白髪染めカラー含む）') + rateByAge(P.grayCareByAge, P.byAge) +
        subhead('悩み「白髪染めの色落ち」選択率 × 年代') + rateByAge(P.grayConcernByAge, P.byAge) +
        subhead('白髪染めの頻度') + objRows(P.grayFreqTotal, GRAYFREQ)) +
      panel('Perm','パーマ・カール', subhead('パーマ現役率 × 年代（定期的にかけている）') + rateByAge(P.permNowByAge, P.byAge) +
        subhead('カール意欲率 × 年代（仕上がり希望に「活かす/キープ」）') + rateByAge(P.curlWantByAge, P.byAge) +
        subhead('パーマ経験率 × 年代（過去・毛先残り含む）') + rateByAge(P.permExpByAge, P.byAge) +
        subhead('種類・持ち') + objRows(P.permTypeTotal, PERMTYPE) + objRows(P.permLooseTotal, PERMLOOSE) +
        noteLine('カール需要の先行指標=「カール意欲」 実績指標=「現役率」— スタイリング剤開発と仕入れの両にらみで')) +
      '<div class="card panel"'+full+'><h2><span class="eyebrow">Trend</span>月次トレンド（該当率の推移）</h2>'+trendSvg(P.monthly)+'</div>' +
      panel('Styling','スタイリングで なりたい仕上がり（複数選択）', objRows(P.stylingFinishTotal, SFIN, P.n) + noteLine('スタイリング剤開発の需要マップ — 「ツヤ・濡れ感」「キープ」等の伸びに注目')) +
      panel('Men','男性のスタイリング剤（使用・気になる）', objRows(P.menStylingTotal, MSTY) + noteLine('男性回答者内の構成比（男性のみに表示される質問）')) +
      panel('Heat','熱ツールの使い方', objRows(P.toolsTotal, TOOLS, P.n) + subhead('設定温度') + objRows(P.tempTotal, TEMPL)) +
      panel('Hair Map','髪質マップ（太さ × くせ）', heatTable(['thin','normal','thick'], THICK, P.thicknessWave,
        (function(){var o={};for(var k in (P.thicknessWave||{})){var row=P.thicknessWave[k];for(var g in row)o[g]=(o[g]||0)+row[g];}return o;})(),
        ['none','kuse','straightened'], WVGRP) + noteLine('列=くせ区分 セル=その区分内での太さ構成比 — 仕入れ(重さ/軽さ)の設計図')) +
      panel('Scalp','頭皮タイプ', objRows(P.scalpTotal, SCALPT, P.n) + subhead('ヘッドスパ興味あり率 × 年代') + rateByAge(P.spaByAge, P.byAge)) +
      panel('Straighten','縮毛矯正の頻度', objRows(P.straightenTotal, STRAIGHTEN, P.n)) +
      '<div class="card panel"'+full+'><h2><span class="eyebrow">Concern → Texture</span>悩み → 求める質感 TOP12（広告コピーの素）</h2>'+pairTable(P.concernTexture, P.n)+'</div>';
  }

  function funnelTable(arr){
    if(!arr||!arr.length) return '<div class="empty">データなし</div>';
    var rows=arr.map(function(x){
      var rate=x.completes>0?Math.round(x.ctas/x.completes*1000)/10:0;
      return '<tr><td>'+esc(REF[x.ref]||x.ref)+'</td><td class="n">'+(x.starts||0)+'</td><td class="n">'+(x.completes||0)+'</td><td class="n">'+(x.ctas||0)+'</td><td class="n"><b>'+rate+'%</b></td></tr>';
    }).join('');
    return '<table class="tbl"><thead><tr><th>流入元</th><th class="n">開始</th><th class="n">完了</th><th class="n">予約CTA</th><th class="n">予約率</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }
  function recentTable(rows){
    if(!rows||!rows.length) return '<div class="empty">データなし</div>';
    var body=rows.map(function(x){
      var t=new Date(x.ts).toLocaleString('ja-JP',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
      var concern=x.advice?(ADVICE[x.advice]||x.advice):'';
      var src=x.ref?(REF[x.ref]||x.ref):'';
      var cta=x.target?(TARGET[x.target]||x.target):'';
      var cmp=x.utm_campaign?' <span class="muted">'+esc(x.utm_campaign)+'</span>':'';
      return '<tr><td class="muted">'+esc(t)+'</td><td>'+esc(EVNAME[x.name]||x.name)+'</td><td>'+esc(x.type||'')+'</td><td>'+esc(concern)+'</td><td>'+esc(src)+cmp+'</td><td>'+esc(cta)+'</td></tr>';
    }).join('');
    return '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>時刻</th><th>種別</th><th>タイプ</th><th>悩み</th><th>流入元</th><th>CTA</th></tr></thead><tbody>'+body+'</tbody></table></div>';
  }

  function render(data){
    var head = data._demo ? '［デモ表示］ ' : '';
    if (data.generatedAt) head += '更新 ' + new Date(data.generatedAt).toLocaleString('ja-JP');
    if (data.windowDays)  head += (data.generatedAt ? ' / ' : '') + '直近' + data.windowDays + '日';
    el('genAt').textContent = head;
    var s=data.summary||{starts:0,completes:0,ctas:0};
    var cr = pct(s.completes, s.starts);
    var cvr = pct(s.ctas, s.completes);
    el('kpis').innerHTML =
      kpi('診断 完了数', s.completes, '件') +
      kpi('診断 開始数', s.starts, '件') +
      kpi('完了率', cr, '%') +
      kpi('予約・CTA遷移率', cvr, '%');

    el('panels').innerHTML =
      panel('Source','流入元（チャネル）', barRows(data.bySource||[], function(x){return REF[x.ref]||x.ref;})) +
      panel('Campaign','キャンペーン（UTM）', barRows(data.byCampaign||[], function(x){return x.u;})) +
      panel('Device','デバイス', barRows(data.byDevice||[], function(x){return DEVICE[x.d]||x.d;})) +
      panel('Country','国・地域', barRows(data.byCountry||[], function(x){return COUNTRY[x.country]||x.country;})) +
      panel('Entry','入口ページ', barRows(data.byLanding||[], function(x){return x.landing;})) +
      panel('Type','27髪格タイプ 分布', barRows(data.byType||[], function(x){return x.t;})) +
      panel('Concern','悩み（主訴）分布', barRows(data.byAdvice||[], function(x){return ADVICE[x.a]||x.a;})) +
      panel('Damage','ダメージ履歴 Tier', barRows(data.byTier||[], function(x){return TIER[x.tier]||('Tier'+x.tier);})) +
      panel('Gender','性別 分布', barRows(data.byGender||[], function(x){return GENDER[x.g]||x.g;})) +
      panel('Mode','診断モード（開始）', barRows(data.byMode||[], function(x){return MODE[x.m]||x.m;})) +
      panel('Funnel','予約・誘導クリック', barRows(data.ctaTarget||[], function(x){return TARGET[x.target]||x.target;})) +
      '<div class="card panel" style="grid-column:1/-1"><h2><span class="eyebrow">Channel</span>チャネル別ファネル（流入→診断→予約）</h2>'+funnelTable(data.sourceFunnel||[])+'</div>' +
      '<div class="card panel" style="grid-column:1/-1"><h2><span class="eyebrow">Trend</span>日次トレンド（診断完了）</h2>'+sparkline(data.daily||[])+'</div>' +
      profilePanels(data.profile) +
      '<div class="card panel" style="grid-column:1/-1"><h2><span class="eyebrow">Log</span>最近のアクティビティ（履歴）</h2>'+recentTable(data.recent||[])+'</div>';

    window.__seamData = data;
  }

  function toCSV(data){
    var rows=[['section','key','count']];
    (data.byType||[]).forEach(function(x){rows.push(['type',x.t,x.c]);});
    (data.byAdvice||[]).forEach(function(x){rows.push(['concern',x.a,x.c]);});
    (data.byTier||[]).forEach(function(x){rows.push(['tier',x.tier,x.c]);});
    (data.byGender||[]).forEach(function(x){rows.push(['gender',x.g,x.c]);});
    (data.byMode||[]).forEach(function(x){rows.push(['mode',x.m,x.c]);});
    (data.ctaTarget||[]).forEach(function(x){rows.push(['cta',x.target,x.c]);});
    (data.bySource||[]).forEach(function(x){rows.push(['source',x.ref,x.c]);});
    (data.byCampaign||[]).forEach(function(x){rows.push(['campaign',x.u,x.c]);});
    (data.byDevice||[]).forEach(function(x){rows.push(['device',x.d,x.c]);});
    (data.byCountry||[]).forEach(function(x){rows.push(['country',x.country,x.c]);});
    (data.byLanding||[]).forEach(function(x){rows.push(['landing',x.landing,x.c]);});
    (data.sourceFunnel||[]).forEach(function(x){rows.push(['funnel:'+x.ref,'starts',x.starts]);rows.push(['funnel:'+x.ref,'completes',x.completes]);rows.push(['funnel:'+x.ref,'ctas',x.ctas]);});
    (data.daily||[]).forEach(function(x){rows.push(['daily',x.d,x.c]);});
    // 診断プロファイル
    var P=data.profile;
    if(P&&P.n){
      rows.push(['profile','n',P.n]);
      var flat={age:P.byAge,concern:P.concernTotal,texture:P.textureTotal,goal:P.goalTotal,wave:P.waveTotal,bleach:P.bleachTotal,grayFreq:P.grayFreqTotal,perm:P.permTotal,permType:P.permTypeTotal,permLoose:P.permLooseTotal,straighten:P.straightenTotal,thickness:P.thicknessTotal,stylingFinish:P.stylingFinishTotal,menStyling:P.menStylingTotal,tools:P.toolsTotal,temp:P.tempTotal,scalp:P.scalpTotal,concernTexture:P.concernTexture};
      for(var sec in flat){var o=flat[sec]||{};for(var k in o)rows.push(['profile:'+sec,k,o[k]]);}
      var byAgeMaps={kuse:P.kuseByAge,straightened:P.straightenedByAge,bleach:P.bleachByAge,grayCare:P.grayCareByAge,grayConcern:P.grayConcernByAge,permNow:P.permNowByAge,permExp:P.permExpByAge,curlWant:P.curlWantByAge,spa:P.spaByAge};
      for(var mk in byAgeMaps){var mo=byAgeMaps[mk]||{};for(var a in mo)rows.push(['profileRate:'+mk,a,mo[a]]);}
      var mats={concernByAge:P.concernByAge,textureByAge:P.textureByAge,thicknessWave:P.thicknessWave};
      for(var mn in mats){var mat=mats[mn]||{};for(var rk in mat){for(var ck in mat[rk])rows.push([mn+':'+rk,ck,mat[rk][ck]]);}}
      for(var ym in (P.monthly||{})){var mrow=P.monthly[ym];for(var f in mrow)rows.push(['profileMonthly:'+ym,f,mrow[f]]);}
    }
    return '﻿'+rows.map(function(r){return r.join(',');}).join('\n');
  }

  function showApp(){ el('loginOverlay').style.display='none'; el('app').hidden=false; }
  function showLogin(msg){ el('app').hidden=true; el('loginOverlay').style.display='flex'; if(msg)el('loginErr').textContent=msg; }

  function load(){
    if(DEMO){ showApp(); render(demoData()); return; }
    var key = sessionStorage.getItem(KEY_LS);
    if(!key){ showLogin(''); return; }
    var days = (el('rangeSel')&&el('rangeSel').value) || '90';
    el('notice').innerHTML='';
    fetch('/api/admin/stats?days='+days, { headers:{ 'x-seam-key': key } })
      .then(function(r){ if(r.status===401){ sessionStorage.removeItem(KEY_LS); throw {auth:true}; } return r.json(); })
      .then(function(d){
        if(d.configured===false){
          showApp();
          el('genAt').textContent='保存先(D1)が未接続です';
          el('kpis').innerHTML=''; el('panels').innerHTML='';
          el('notice').innerHTML='<div class="card setup"><h2 class="serif" style="font-size:15px;margin:0 0 8px">あと少しで集計が始まります（Cloudflare 設定）</h2><ol>'+
            '<li>Cloudflare → Workers&amp;Pages → <b>D1</b> →「Create」で <code>seam-db</code> を作成</li>'+
            '<li>作成したD1のコンソールに <code>db/schema.sql</code> の内容を貼って実行</li>'+
            '<li>Pages → seam-website → Settings → Functions → <b>D1 database bindings</b> に 変数名 <code>DB</code> = <code>seam-db</code> を追加</li>'+
            '<li>同 Settings → Environment variables に <code>ADMIN_KEY</code>（このパスキー）を追加</li>'+
            '<li>再デプロイ → ここに診断データが溜まり始めます</li></ol>'+
            '<p class="muted">※ 設定はオーナー様のCFダッシュボード操作です（このページは設定が済めば自動で表示されます）</p></div>';
          return;
        }
        if(d.error){ el('notice').innerHTML='<div class="card"><span style="color:#b4453a">エラー: '+esc(d.error)+'</span></div>'; }
        showApp(); render(d);
      })
      .catch(function(e){ if(e&&e.auth){ showLogin('パスキーが違います'); } else { showLogin('読み込みに失敗しました'); } });
  }

  // events
  el('loginBtn').addEventListener('click', function(){
    var v=el('keyInput').value.trim(); if(!v){el('loginErr').textContent='入力してください';return;}
    sessionStorage.setItem(KEY_LS, v); el('loginErr').textContent=''; load();
  });
  el('keyInput').addEventListener('keydown', function(e){ if(e.key==='Enter') el('loginBtn').click(); });
  el('logoutBtn').addEventListener('click', function(){ sessionStorage.removeItem(KEY_LS); location.href='admin.html'; });
  el('reloadBtn').addEventListener('click', load);
  el('rangeSel').addEventListener('change', load);
  el('csvBtn').addEventListener('click', function(){
    var d=window.__seamData; if(!d) return;
    var blob=new Blob([toCSV(d)],{type:'text/csv;charset=utf-8'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='seam_diag_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  });

  load();
})();
</script>
</body>
