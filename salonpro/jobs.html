<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1b1b1d">
  <title>誠実な求人サイト（学生・学校）｜SalonPro</title>
  <link rel="stylesheet" href="assets/css/tokens.css?v=78">
  <link rel="stylesheet" href="assets/css/base.css?v=78">
  <link rel="stylesheet" href="assets/css/components.css?v=78">
  <style>
    body { background: var(--surface-2); padding-bottom: 40px; }
    .pa-top { position: sticky; top: 0; z-index: 10; background: var(--dark); color: #fff; }
    .pa-top__in { display: flex; align-items: center; gap: 10px; height: 54px; padding: 0 16px; max-width: 720px; margin-inline: auto; }
    .pa-top__logo { font-size: 17px; font-weight: 800; } .pa-top__logo b { color: var(--gold); }
    .pa-top__tag { font-size: 12px; color: rgba(255,255,255,.6); border-left: 1px solid rgba(255,255,255,.2); padding-left: 10px; }
    .pa-wrap { max-width: 720px; margin-inline: auto; padding: 16px; }
    .pa-note { font-size: 10.5px; color: var(--ink-3); line-height: 1.7; margin-top: 12px; }
    .pa-btn { width: 100%; height: 48px; border: 0; border-radius: var(--r-md); background: #fff; color: var(--ink); border: 1px solid var(--line-3); font-size: 13.5px; font-weight: 900; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }

    /* 信頼バナー */
    .jb-trust { display: flex; align-items: center; gap: 10px; background: #eef6f0; border: 1px solid #cfead9; border-radius: var(--r-md); padding: 12px 14px; margin-bottom: 14px; }
    .jb-trust__ic { width: 30px; height: 30px; border-radius: 50%; background: var(--stock-in); color: #fff; display: flex; align-items: center; justify-content: center; flex: none; }
    .jb-trust__ic svg { width: 17px; height: 17px; }
    .jb-trust__t { font-size: 12.5px; font-weight: 800; color: #1f7a4d; } .jb-trust__s { font-size: 10.5px; color: var(--ink-2); margin-top: 1px; }

    /* 並び替え */
    .jb-sort { display: flex; gap: 6px; background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 5px; margin-bottom: 10px; }
    .jb-sort button { flex: 1; height: 38px; border: 0; border-radius: 999px; background: transparent; font-size: 12px; font-weight: 800; color: var(--ink-2); cursor: pointer; }
    .jb-sort button.on { background: var(--dark); color: #fff; }

    /* フィルタ */
    .jb-filt { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; }
    .jb-filt button { height: 34px; padding: 0 13px; border: 1px solid var(--line-3); border-radius: 999px; background: #fff; font-size: 11.5px; font-weight: 800; color: var(--ink-2); cursor: pointer; }
    .jb-filt button.on { border-color: var(--gold); background: var(--gold-soft); color: var(--gold-strong); }

    .jb-count { font-size: 11.5px; color: var(--ink-3); font-weight: 700; margin: 0 2px 10px; }

    /* 求人カード */
    .jb-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 15px 16px; margin-bottom: 12px; }
    .jb-card__hd { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .jb-card__n { font-size: 15px; font-weight: 900; } .jb-card__a { font-size: 11.5px; color: var(--ink-3); margin-top: 1px; }
    .jb-card__role { font-size: 11px; color: var(--ink-2); font-weight: 700; margin-top: 4px; }
    .jb-score { text-align: center; flex: none; border-radius: 12px; padding: 7px 11px; min-width: 78px; }
    .jb-score.hi { background: #e3f4ea; } .jb-score.mid { background: var(--gold-soft); } .jb-score.lo { background: var(--surface-3); }
    .jb-score__v { font-family: var(--font-num); font-size: 20px; font-weight: 900; line-height: 1; }
    .jb-score.hi .jb-score__v { color: #1f8f53; } .jb-score.mid .jb-score__v { color: var(--gold-strong); } .jb-score.lo .jb-score__v { color: var(--ink-2); }
    .jb-score__l { font-size: 9px; font-weight: 800; color: var(--ink-2); margin-top: 2px; }
    .jb-nums { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; margin: 12px 0 6px; }
    .jb-num { display: flex; justify-content: space-between; font-size: 12px; border-bottom: 1px solid var(--line-2); padding-bottom: 5px; }
    .jb-num .k { color: var(--ink-3); } .jb-num .v { font-weight: 800; font-family: var(--font-num); }
    .jb-real { display: inline-flex; align-items: center; gap: 4px; font-size: 9.5px; font-weight: 800; color: #1f8f53; margin-top: 6px; }
    .jb-real svg { width: 11px; height: 11px; }
    .jb-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
    .jb-chip { font-size: 10px; font-weight: 700; background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px; padding: 3px 9px; color: var(--ink-2); }
    .jb-card__act { display: flex; gap: 8px; margin-top: 12px; }
    .jb-card__act a { flex: 1; height: 40px; border-radius: 10px; font-size: 12px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; }
    .jb-card__act .prim { background: var(--gold); color: #fff; } .jb-card__act .sec { background: #fff; color: var(--ink); border: 1px solid var(--line-3); }
    .toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%); }
  </style>
</head>
<body>
  <div class="pa-top"><div class="pa-top__in"><span class="pa-top__logo">Salon<b>Pro</b></span><span class="pa-top__tag">誠実な求人サイト ・ 学生／学校</span></div></div>
  <div class="pa-wrap">
    <div class="jb-trust">
      <span class="jb-trust__ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
      <span><span class="jb-trust__t">すべて実データ認証。盛られていません。</span><span class="jb-trust__s">給与・休日・残業・定着は各サロンの運営データ。求人票と現実の乖離がありません。</span></span>
    </div>

    <div class="jb-sort" id="sort">
      <button class="on" data-s="disc">誠実さ順（開示率）</button>
      <button data-s="salary">初任給順</button>
      <button data-s="off">休日順</button>
    </div>

    <div class="jb-filt" id="filt">
      <button data-f="visit">見学あり</button>
      <button data-f="hoken">社保完備</button>
      <button data-f="off2">週休2日以上</button>
      <button data-f="train">研修充実</button>
      <button data-f="care">相談体制あり</button>
    </div>

    <div class="jb-count" id="count"></div>
    <div id="list"></div>

    <a class="pa-btn" href="recruit.html" style="margin-top:6px">サロンの方：求人を出す（実データで“盛れない”求人）</a>
    <div class="pa-note" style="margin-top:12px">※ 掲載内容はデモです。給与・休日・残業・定着は各サロンのSalonPro運営データに基づく想定値。本番は学校アカウントで、盛られていない実データを求人担当が確認できます。エリアは北海道（菊地の営業圏）を想定。</div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="assets/js/components.js?v=78"></script>
  <script>
    (function () {
      var $ = function (id) { return document.getElementById(id); };
      var yen = function (n) { return '¥' + Math.round(n || 0).toLocaleString('ja-JP'); };
      var SALONS = [
        { name: 'hair studio LIEN', area: '札幌・大通', role: 'スタイリスト／アシスタント', salary: 190000, off: 8, ot: 12, debut: 26, turn: 9, tenure: 6.1, disc: 92, chips: ['見学OK', '社保完備', '研修充実', '相談体制'], f: ['visit', 'hoken', 'off2', 'train', 'care'] },
        { name: 'Atelier COMO', area: '札幌・円山', role: 'スタイリスト／アシスタント', salary: 185000, off: 8, ot: 14, debut: 28, turn: 12, tenure: 5.2, disc: 83, chips: ['社保完備', '研修充実', '相談体制'], f: ['hoken', 'off2', 'train', 'care'] },
        { name: 'GRACE hair', area: '札幌・すすきの', role: 'アシスタント', salary: 180000, off: 7, ot: 18, debut: 30, turn: 15, tenure: 4.3, disc: 75, chips: ['見学OK', '研修充実'], f: ['visit', 'train'] },
        { name: 'SALON DE Belle', area: '旭川', role: 'スタイリスト', salary: 175000, off: 8, ot: 16, debut: 32, turn: 14, tenure: 4.8, disc: 67, chips: ['見学OK', '社保完備'], f: ['visit', 'hoken', 'off2'] },
        { name: 'modo hair', area: '函館', role: 'スタイリスト／スパニスト', salary: 178000, off: 8, ot: 15, debut: 30, turn: 13, tenure: 5.0, disc: 58, chips: ['社保完備', '相談体制'], f: ['hoken', 'off2', 'care'] },
        { name: "K's hair", area: '帯広', role: 'アシスタント', salary: 172000, off: 7, ot: 20, debut: 34, turn: 18, tenure: 3.9, disc: 50, chips: ['研修充実'], f: ['train'] }
      ];
      var sortKey = 'disc', filters = {};

      function scoreCls(d) { return d >= 80 ? 'hi' : d >= 65 ? 'mid' : 'lo'; }
      function render() {
        var rows = SALONS.filter(function (s) {
          return Object.keys(filters).every(function (k) { return !filters[k] || s.f.indexOf(k) >= 0; });
        });
        rows.sort(function (a, b) { return sortKey === 'disc' ? b.disc - a.disc : sortKey === 'salary' ? b.salary - a.salary : b.off - a.off; });
        $('count').textContent = rows.length + '件 ・ ' + ({ disc: '誠実さ（開示率）順', salary: '初任給の高い順', off: '休日の多い順' }[sortKey]);
        $('list').innerHTML = rows.map(function (s) {
          return '<div class="jb-card"><div class="jb-card__hd"><div><div class="jb-card__n">' + s.name + '</div><div class="jb-card__a">' + s.area + '</div><div class="jb-card__role">' + s.role + '</div></div>'
            + '<div class="jb-score ' + scoreCls(s.disc) + '"><div class="jb-score__v">' + s.disc + '%</div><div class="jb-score__l">開示率</div></div></div>'
            + '<div class="jb-nums">'
            + '<div class="jb-num"><span class="k">初任給</span><span class="v">' + yen(s.salary) + '</span></div>'
            + '<div class="jb-num"><span class="k">休日/月</span><span class="v">' + s.off + '日</span></div>'
            + '<div class="jb-num"><span class="k">残業</span><span class="v">' + s.ot + 'h</span></div>'
            + '<div class="jb-num"><span class="k">デビュー</span><span class="v">' + s.debut + 'ヶ月</span></div>'
            + '<div class="jb-num"><span class="k">離職率</span><span class="v">' + s.turn + '%</span></div>'
            + '<div class="jb-num"><span class="k">平均勤続</span><span class="v">' + s.tenure + '年</span></div>'
            + '</div><div class="jb-real"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg> 数字はSalonProの実データ認証（盛れない）</div>'
            + '<div class="jb-chips">' + s.chips.map(function (c) { return '<span class="jb-chip">' + c + '</span>'; }).join('') + '</div>'
            + '<div class="jb-card__act"><a class="prim" href="recruit.html">求人票を見る</a><a class="sec" data-visit="' + s.name + '">見学を申し込む</a></div></div>';
        }).join('') || '<div style="text-align:center;color:var(--ink-3);font-size:12.5px;padding:30px 0">条件に合う求人がありません</div>';
      }
      $('sort').addEventListener('click', function (e) {
        var b = e.target.closest('[data-s]'); if (!b) return; sortKey = b.dataset.s;
        [].forEach.call(this.children, function (x) { x.classList.toggle('on', x === b); }); render();
      });
      $('filt').addEventListener('click', function (e) {
        var b = e.target.closest('[data-f]'); if (!b) return; var k = b.dataset.f;
        filters[k] = !filters[k]; b.classList.toggle('on', filters[k]); render();
      });
      $('list').addEventListener('click', function (e) {
        var b = e.target.closest('[data-visit]'); if (!b) return; e.preventDefault();
        var t = $('toast'); t.innerHTML = (window.SP && SP.svg ? SP.svg('checkc') : '✓') + b.dataset.visit + ' に見学を申し込みました（デモ）';
        t.classList.add('is-visible'); clearTimeout(t._t); t._t = setTimeout(function () { t.classList.remove('is-visible'); }, 2200);
      });
      render();
    })();
  </script>
</body>
</html>
