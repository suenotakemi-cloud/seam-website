<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>在庫管理・棚卸し｜SalonPro</title>
  <link rel="stylesheet" href="assets/css/tokens.css?v=26">
  <link rel="stylesheet" href="assets/css/base.css?v=26">
  <link rel="stylesheet" href="assets/css/components.css?v=26">
  <link rel="stylesheet" href="assets/css/pages.css?v=26">
  <link rel="stylesheet" href="assets/css/reorder.css?v=26">
  <style>
    .inv-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--s-2); margin-bottom: var(--s-4); }
    .inv-stat { padding: var(--s-3); border: 1px solid var(--line); border-radius: var(--r-md); text-align: center; background: var(--surface); }
    .inv-stat__n { font-family: var(--font-num); font-size: var(--fs-22); font-weight: 800; }
    .inv-stat__l { font-size: var(--fs-11); color: var(--ink-2); }
    .inv-stat--alert .inv-stat__n { color: var(--stock-order); }
    .inv-stat--out .inv-stat__n { color: var(--stock-low); }
    .inv-stepper { display: inline-flex; align-items: center; border: 1px solid var(--line-3); border-radius: var(--r-sm); overflow: hidden; flex: none; }
    .inv-stepper button { width: 36px; height: 40px; display: flex; align-items: center; justify-content: center; color: var(--ink-2); }
    .inv-stepper button:hover { background: var(--surface-2); }
    .inv-stepper button svg { width: 16px; height: 16px; }
    .inv-stepper input { width: 40px; height: 40px; border: 0; border-inline: 1px solid var(--line); text-align: center; font-family: var(--font-num); font-weight: 800; font-size: var(--fs-16); -moz-appearance: textfield; }
    .inv-stepper input::-webkit-outer-spin-button, .inv-stepper input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .inv-row__ctrl { display: flex; align-items: center; gap: var(--s-2); margin-top: var(--s-2); }
    .inv-row__ctrl .btn { height: 40px; flex: none; padding: 0 14px; }
    .stk-badge { display: inline-flex; align-items: center; height: 20px; padding: 0 8px; border-radius: var(--r-pill); font-size: 11px; font-weight: 700; }
    .stk-badge--in { background: #f1faf4; color: var(--stock-in); }
    .stk-badge--low { background: #fdf4e7; color: var(--stock-order); }
    .stk-badge--out { background: #fdeceb; color: var(--stock-low); }
  </style>
</head>
<body class="page">

  <header class="site-header">
    <div class="container site-header__inner">
      <a class="brand" href="home.html" aria-label="SalonPro ホーム"><span class="brand__logo">Salon<b>Pro</b></span></a>
      <form class="header-search" id="searchForm" role="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="headerSearch" placeholder="商品名・ブランド・型番で検索" autocomplete="off">
      </form>
      <nav class="header-actions">
        <a class="icon-btn" href="cart.html" aria-label="カート"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2.5 3h2.2l2.2 12.4a1.6 1.6 0 0 0 1.6 1.3h8.7a1.6 1.6 0 0 0 1.6-1.3L21.5 7H6"/></svg><span class="icon-btn__badge" id="cartBadge" hidden>0</span></a>
      </nav>
    </div>
  </header>

  <div class="ship-strip" data-ship-strip></div>

  <main class="container">
    <div class="page-hd"><h1 class="page-hd__title">在庫管理・棚卸し</h1><p class="page-hd__sub">店内在庫をリアルタイムで確認。不足分はそのまま発注へ。バーコードで棚卸しもできます。</p></div>

    <div class="inv-summary">
      <div class="inv-stat"><div class="inv-stat__n" id="invTotal">0</div><div class="inv-stat__l">登録点数</div></div>
      <div class="inv-stat inv-stat--alert"><div class="inv-stat__n" id="invLow">0</div><div class="inv-stat__l">要発注</div></div>
      <div class="inv-stat inv-stat--out"><div class="inv-stat__n" id="invOut">0</div><div class="inv-stat__l">在庫切れ</div></div>
    </div>

    <div class="coupon-row" style="margin-bottom:var(--s-2)">
      <input class="input" id="invCode" type="text" placeholder="型番・JANで在庫を検索（例：sh-001）" autocomplete="off" style="height:46px">
      <a class="btn btn--ghost" href="barcode.html" style="height:46px;flex:none;gap:6px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="width:18px;height:18px"><path d="M3 5v14M7 5v14M11 5v14M15 5v14M19 5v14"/></svg>棚卸し</a>
    </div>

    <!-- 発注が必要 -->
    <section class="sec" id="lowSection">
      <div class="sec__head"><h2 class="sec__title">発注が必要な商品</h2></div>
      <div class="lcard">
        <div id="lowList"></div>
        <div class="ro-foot"><span class="ro-foot__sum">不足 <b id="lowCount">0</b> 点</span><button class="btn btn--primary" id="bulkOrder">不足分をまとめて発注</button></div>
      </div>
    </section>

    <!-- すべての在庫 -->
    <section class="sec">
      <div class="sec__head"><h2 class="sec__title">すべての在庫</h2></div>
      <div class="lcard"><div id="stockList"></div></div>
    </section>
  </main>

  <nav class="tabbar" aria-label="メインナビ">
    <div class="tabbar__inner">
      <a class="tab" href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11 12 4l8 7"/><path d="M6 10v10h12V10"/></svg><span class="tab__label">ホーム</span></a>
      <a class="tab" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="m21 21-4.3-4.3"/></svg><span class="tab__label">探す</span></a>
      <a class="tab" href="reorder.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a8 8 0 0 1 13.7-3.5L20 7"/><path d="M20 4v3h-3"/><path d="M20 16a8 8 0 0 1-13.7 3.5L4 17"/><path d="M4 20v-3h3"/></svg><span class="tab__label">再購入</span><span class="icon-btn__badge" id="tabCartBadge" hidden>0</span></a>
      <a class="tab" href="favorites.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 12.6 12 20l-7.5-7.4a5 5 0 1 1 7.1-7.1l.4.4.4-.4a5 5 0 1 1 7.1 7.1Z"/></svg><span class="tab__label">お気に入り</span></a>
      <a class="tab is-active" href="mypage.html" aria-current="page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span class="tab__label">マイページ</span></a>
    </div>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="assets/js/catalog.js?v=26"></script>
  <script src="assets/js/data.js?v=26"></script>
  <script src="assets/js/store.js?v=26"></script>
  <script src="assets/js/salon.js?v=26"></script>
  <script src="assets/js/components.js?v=26"></script>
  <script src="assets/js/nav.js?v=26"></script>
  <script src="assets/js/inventory.js?v=26"></script>
</body>
</html>
