<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>店販レジ（POS）｜SalonPro</title>
  <link rel="stylesheet" href="assets/css/tokens.css?v=47">
  <link rel="stylesheet" href="assets/css/base.css?v=47">
  <link rel="stylesheet" href="assets/css/components.css?v=47">
  <link rel="stylesheet" href="assets/css/pages.css?v=47">
  <link rel="stylesheet" href="assets/css/pos.css?v=47">
</head>
<body class="pos">

  <header class="site-header">
    <div class="container site-header__inner" style="justify-content:space-between">
      <a class="brand" href="home.html" aria-label="SalonPro"><span class="brand__logo">Salon<b>Pro</b></span> <span style="font-size:13px;font-weight:700;color:var(--ink-2);margin-left:6px">店販レジ</span></a>
      <a href="home.html" class="back-link" style="margin:0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6 6 18"/></svg>閉じる</a>
    </div>
  </header>

  <main class="container">
    <div class="pos-summary">
      <div class="pos-summary__item"><div class="l">本日の売上</div><div class="v sales" id="todaySales">¥0</div></div>
      <div class="pos-summary__item"><div class="l">会計数</div><div class="v" id="todayCount">0</div></div>
      <div class="pos-summary__item"><div class="l">点数</div><div class="v" id="todayUnits">0</div></div>
    </div>

    <div class="pos-scan">
      <input id="posCode" type="text" placeholder="型番・JANをスキャン/入力して追加" autocomplete="off">
      <button class="btn btn--ghost" id="posCodeGo">追加</button>
    </div>

    <div class="pos-sec-title">商品をタップして会計に追加</div>
    <div class="pos-grid" id="posGrid"></div>

    <div class="pos-sec-title">会計リスト</div>
    <div id="regList"></div>
  </main>

  <div class="pos-bar">
    <div class="container pos-bar__inner">
      <div class="pos-bar__total"><span class="l">合計（税込）</span><br><span class="v" id="regTotal">¥0</span></div>
      <button class="pos-bar__cta" id="checkoutBtn" disabled>お会計
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><path d="m9 6 6 6-6 6"/></svg>
      </button>
    </div>
  </div>

  <!-- 会計シート -->
  <div class="overlay" id="overlay"></div>
  <div class="pay-sheet" id="paySheet">
    <div class="pay-sheet__total"><div class="l">お会計</div><div class="v" id="payTotal">¥0</div></div>
    <div class="pay-methods">
      <button class="pay-method" data-pay="cash" aria-pressed="true">現金</button>
      <button class="pay-method" data-pay="card" aria-pressed="false">クレジット</button>
    </div>
    <div id="cashArea">
      <div class="cash-row"><span>お預かり</span><input id="cashGiven" type="number" inputmode="numeric" placeholder="0"></div>
      <div class="quick-cash" id="quickCash"></div>
      <div class="cash-row"><span>おつり</span><span class="change" id="cashChange">¥0</span></div>
    </div>
    <button class="btn btn--primary btn--block" id="payDo" style="height:54px;font-size:var(--fs-16);margin-top:var(--s-3)">会計する</button>
    <button class="btn btn--ghost btn--block" id="payCancel" style="margin-top:var(--s-2)">戻る</button>
  </div>

  <!-- 完了 -->
  <div class="pos-done" id="posDone">
    <div class="pos-done__check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m7.5 12 3 3 6-6.5"/></svg></div>
    <div style="font-size:var(--fs-18);font-weight:800">会計完了</div>
    <div class="pos-done__amt" id="doneAmt">¥0</div>
    <div id="doneChange" style="color:var(--ink-2)"></div>
    <div style="font-size:var(--fs-13);color:var(--ink-3)">在庫を自動で更新しました</div>
    <button class="btn btn--primary" id="newSale" style="margin-top:var(--s-4);min-width:200px">次の会計へ</button>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="assets/js/catalog.js?v=47"></script>
  <script src="assets/js/data.js?v=47"></script>
  <script src="assets/js/store.js?v=47"></script>
  <script src="assets/js/salon.js?v=47"></script>
  <script src="assets/js/components.js?v=47"></script>
  <script src="assets/js/nav.js?v=47"></script>
  <script src="assets/js/pos.js?v=47"></script>
</body>
</html>
