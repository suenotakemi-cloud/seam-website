<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>キャンペーン｜SalonPro</title>
  <meta name="description" content="メーカー恒例の「10＋1」など、サロン向けキャンペーン特集。対象から10本選ぶと1本無料。株式会社菊地（KIKUCHI PRODUCE）運営。">
  <link rel="stylesheet" href="assets/css/tokens.css?v=42">
  <link rel="stylesheet" href="assets/css/base.css?v=42">
  <link rel="stylesheet" href="assets/css/components.css?v=42">
  <link rel="stylesheet" href="assets/css/pages.css?v=42">
  <style>
    body { background: #fff; padding-bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom, 0px)); }
    .container { max-width: 940px; }
    .cp-crumb { display: flex; align-items: center; gap: 3px; margin: var(--s-4) 0 0; font-size: 12px; font-weight: 700; }
    .cp-crumb a { color: var(--gold-strong); text-decoration: none; } .cp-crumb__sep { color: var(--ink-3); margin: 0 3px; } .cp-crumb__cur { color: var(--ink-3); }

    /* ハブ */
    .cp-hd { margin-top: var(--s-3); } .cp-hd__t { font-size: clamp(20px,5vw,26px); font-weight: 900; } .cp-hd__s { font-size: 12.5px; color: var(--ink-3); margin-top: 4px; }
    .cp-list { display: grid; grid-template-columns: 1fr; gap: 14px; margin-top: var(--s-4); }
    @media (min-width: 720px) { .cp-list { grid-template-columns: 1fr 1fr; } }
    .cp-banner { display: block; border-radius: var(--r-lg); overflow: hidden; text-decoration: none; color: #fff; position: relative; min-height: 150px; padding: 20px; }
    .cp-banner__badge { display: inline-block; font-size: 12px; font-weight: 900; background: #fff; color: #1b1b1d; border-radius: var(--r-pill); padding: 4px 12px; }
    .cp-banner__t { font-size: 20px; font-weight: 900; margin-top: 12px; line-height: 1.3; }
    .cp-banner__s { font-size: 12.5px; line-height: 1.65; margin-top: 8px; opacity: .95; }
    .cp-banner__go { position: absolute; right: 16px; bottom: 16px; font-size: 12.5px; font-weight: 800; display: inline-flex; align-items: center; gap: 4px; }
    .cp-banner__period { position: absolute; left: 20px; bottom: 16px; font-size: 11px; opacity: .85; }

    /* 詳細（選択） */
    .cp-hero { color: #fff; border-radius: var(--r-lg); padding: 22px 20px; margin-top: var(--s-3); }
    .cp-hero__badge { display: inline-block; font-size: 13px; font-weight: 900; background: #fff; color: #1b1b1d; border-radius: var(--r-pill); padding: 4px 13px; }
    .cp-hero__t { font-size: clamp(20px,5vw,26px); font-weight: 900; margin-top: 11px; }
    .cp-hero__s { font-size: 13px; line-height: 1.75; margin-top: 8px; opacity: .96; }
    .cp-hero__period { font-size: 11.5px; margin-top: 9px; opacity: .85; }
    .cp-how { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 800; color: var(--ink); background: var(--gold-soft); border: 1px solid var(--gold-line); border-radius: var(--r-md); padding: 12px 14px; margin-top: var(--s-4); }
    .cp-how b { color: var(--gold-strong); }
    .cp-how svg { width: 18px; height: 18px; flex: none; color: var(--gold-strong); }

    .cp-count { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; justify-content: space-between; gap: 10px; background: var(--dark); color: #fff; border-radius: var(--r-md); padding: 11px 15px; margin-top: var(--s-4); font-size: 13px; font-weight: 800; }
    .cp-count b { color: var(--gold); }
    .cp-sec__t { font-size: 15px; font-weight: 900; margin: var(--s-5) 0 10px; }

    .cp-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; }
    @media (min-width: 560px) { .cp-grid { grid-template-columns: repeat(3,1fr); } }
    @media (min-width: 880px) { .cp-grid { grid-template-columns: repeat(4,1fr); } }
    .cp-card { border: 1px solid var(--line); border-radius: var(--r-lg); padding: 12px; background: #fff; }
    .cp-card.is-sel { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold) inset; }
    .cp-sw { display: block; height: 40px; border-radius: var(--r-sm); border: 1px solid rgba(0,0,0,.08); }
    .cp-card__n { font-size: 13px; font-weight: 800; margin-top: 8px; } .cp-card__p { font-size: 12px; color: var(--ink-3); font-weight: 700; margin-top: 2px; }
    .cp-step { display: inline-flex; align-items: center; border: 1px solid var(--line-3); border-radius: var(--r-sm); overflow: hidden; margin-top: 9px; width: 100%; }
    .cp-step button { flex: 1; height: 34px; background: #fff; border: 0; font-size: 18px; font-weight: 700; color: var(--ink); cursor: pointer; }
    .cp-step .cp-q { flex: 1; text-align: center; font-family: var(--font-num); font-weight: 800; font-size: 15px; }

    /* 無料ピッカー */
    .cp-free { border: 1px solid var(--gold-line); background: var(--gold-soft); border-radius: var(--r-lg); padding: 15px; margin-top: var(--s-5); }
    .cp-free__h { font-size: 14px; font-weight: 900; } .cp-free__h b { color: var(--gold-strong); }
    .cp-free__s { font-size: 12px; color: var(--ink-2); margin-top: 3px; }
    .cp-fchips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .cp-fc { display: inline-flex; align-items: center; gap: 7px; background: #fff; border: 1px solid var(--line-3); border-radius: var(--r-pill); padding: 6px 12px 6px 8px; font-size: 12.5px; font-weight: 700; cursor: pointer; }
    .cp-fc__sw { width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(0,0,0,.08); }
    .cp-fc.is-on { border-color: var(--gold); background: var(--gold); color: #fff; }
    .cp-fc.is-on .cp-fc__sw { border-color: #fff; }

    .cp-bar { position: fixed; left: 0; right: 0; bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom, 0px)); z-index: 20; background: var(--surface); border-top: 1px solid var(--line); box-shadow: var(--shadow-up); }
    .cp-bar__in { max-width: 940px; margin-inline: auto; display: flex; align-items: center; gap: 12px; padding: 11px 16px; }
    .cp-bar__info { font-size: 12.5px; font-weight: 700; color: var(--ink-2); flex: 1; min-width: 0; } .cp-bar__info b { color: var(--gold-strong); }
    .cp-bar__btn { flex: none; height: 48px; padding: 0 20px; border-radius: var(--r-md); background: var(--gold); color: #fff; font-weight: 800; font-size: 14.5px; border: 0; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
    .cp-bar__btn:hover:not(:disabled) { background: var(--gold-strong); } .cp-bar__btn:disabled { opacity: .45; }
    .cp-bar__btn svg { width: 17px; height: 17px; }

    .cp-done { text-align: center; padding: 40px 20px; }
    .cp-done__ic { width: 62px; height: 62px; margin: 0 auto 14px; border-radius: 50%; background: var(--gold-soft); color: var(--gold-strong); display: flex; align-items: center; justify-content: center; } .cp-done__ic svg { width: 32px; height: 32px; }
    .cp-done__t { font-size: 19px; font-weight: 900; } .cp-done__s { font-size: 13px; color: var(--ink-2); line-height: 1.75; margin-top: 8px; }
    .cp-done__btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 18px; }
    .cp-done__btns a { height: 48px; padding: 0 20px; border-radius: var(--r-md); font-weight: 800; font-size: 14px; display: inline-flex; align-items: center; }
    .cp-done__btns .p { background: var(--gold); color: #fff; } .cp-done__btns .g { background: #fff; color: var(--ink); border: 1px solid var(--line-3); }
  </style>
</head>
<body class="page">

  <header class="site-header">
    <div class="container site-header__inner">
      <a class="brand" href="home.html" aria-label="SalonPro ホーム"><span class="brand__logo">Salon<b>Pro</b></span></a>
      <form class="header-search" id="searchForm" role="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="headerSearch" placeholder="商品名・ブランド・型番で検索" autocomplete="off" aria-label="商品を検索">
      </form>
      <nav class="header-actions">
        <a class="icon-btn" href="news.html" aria-label="お知らせ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="icon-btn__badge" id="notifBadge">2</span></a>
        <a class="icon-btn" href="cart.html" aria-label="カート"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2.5 3h2.2l2.2 12.4a1.6 1.6 0 0 0 1.6 1.3h8.7a1.6 1.6 0 0 0 1.6-1.3L21.5 7H6"/></svg><span class="icon-btn__badge" id="cartBadge" hidden>0</span></a>
      </nav>
    </div>
  </header>

  <main class="container" id="campRoot"></main>

  <nav class="tabbar" aria-label="メインナビ">
    <div class="tabbar__inner">
      <a class="tab" href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11 12 4l8 7"/><path d="M6 10v10h12V10"/></svg><span class="tab__label">ホーム</span></a>
      <a class="tab" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="m21 21-4.3-4.3"/></svg><span class="tab__label">探す</span></a>
      <a class="tab" href="reorder.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a8 8 0 0 1 13.7-3.5L20 7"/><path d="M20 4v3h-3"/><path d="M20 16a8 8 0 0 1-13.7 3.5L4 17"/><path d="M4 20v-3h3"/></svg><span class="tab__label">再購入</span></a>
      <a class="tab" href="favorites.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 12.6 12 20l-7.5-7.4a5 5 0 1 1 7.1-7.1l.4.4.4-.4a5 5 0 1 1 7.1 7.1Z"/></svg><span class="tab__label">お気に入り</span></a>
      <a class="tab" href="mypage.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span class="tab__label">マイページ</span></a>
    </div>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="assets/js/catalog.js?v=42"></script>
  <script src="assets/js/data.js?v=42"></script>
  <script src="assets/js/store.js?v=42"></script>
  <script src="assets/js/components.js?v=42"></script>
  <script src="assets/js/nav.js?v=42"></script>
  <script>
    (function () {
      var svg = SP.svg, yen = SP.fmtYen, CAMPS = SP.CAMPAIGNS || [];
      var root = document.getElementById('campRoot');
      var toast = function (m) { var t = document.getElementById('toast'); t.innerHTML = svg('checkc') + m; t.classList.add('is-visible'); setTimeout(function () { t.classList.remove('is-visible'); }, 2200); };
      var eligible = function (line) { return SP.DATA.products.filter(function (p) { return p.line === line; }); };
      (function () { var c = SP.Store.cartSummary().count + SP.Store.giftCount(), el = document.getElementById('cartBadge'); if (el) { el.textContent = c; el.hidden = c <= 0; } })();

      var id = new URLSearchParams(location.search).get('id');
      var camp = CAMPS.filter(function (c) { return c.id === id; })[0];
      if (camp && camp.kind === 'buyXgetY') { renderCampaign(camp); }
      else { renderHub(); }

      function renderHub() {
        document.title = 'キャンペーン特集｜SalonPro';
        root.innerHTML =
          '<nav class="cp-crumb"><a href="home.html">ホーム</a><span class="cp-crumb__sep">›</span><span class="cp-crumb__cur">キャンペーン</span></nav>' +
          '<div class="cp-hd"><div class="cp-hd__t">キャンペーン特集</div><div class="cp-hd__s">メーカー恒例の「10＋1」など、お得なキャンペーンをまとめてチェック。</div></div>' +
          '<div class="cp-list">' + CAMPS.map(function (c) {
            var href = c.kind === 'buyXgetY' ? ('campaigns.html?id=' + c.id) : (c.href || '#');
            return '<a class="cp-banner" href="' + href + '" style="background:linear-gradient(135deg,' + c.accent + ',' + c.accent + 'cc)">' +
              '<span class="cp-banner__badge">' + c.badge + '</span>' +
              '<div class="cp-banner__t">' + c.title + '</div>' +
              '<div class="cp-banner__s">' + c.lead + '</div>' +
              '<span class="cp-banner__period">' + (c.period || '') + '</span>' +
              '<span class="cp-banner__go">' + (c.kind === 'buyXgetY' ? '対象を選ぶ' : '見る') + ' ›</span></a>';
          }).join('') + '</div>';
      }

      function renderCampaign(c) {
        document.title = c.title + '｜キャンペーン｜SalonPro';
        // サロン別の添付条件（5＋1 / 10＋1 等）でx/yを上書き
        c = Object.assign({}, c);
        var cond = (SP.Store.salonBundleCond ? SP.Store.salonBundleCond(c.id) : { x: c.x, y: c.y, enabled: true });
        c.x = cond.x; c.y = cond.y;
        if (cond.enabled === false) {
          root.innerHTML = '<div style="border:1px solid var(--line);border-radius:var(--r-lg);padding:24px;text-align:center;color:var(--ink-2);font-size:13px;margin-top:var(--s-4)">このサロンは現在この添付キャンペーンの対象外です。担当者にご相談ください。</div>';
          return;
        }
        var items = eligible(c.line);
        var sel = {}; // {pid: qty} 選択（無料込みの合計本数）
        var setSize = c.x + c.y; // 1セット＝x+y本（例：10+1→11、5+1→6、3+1→4、2+1→3）
        root.innerHTML =
          '<nav class="cp-crumb"><a href="home.html">ホーム</a><span class="cp-crumb__sep">›</span><a href="campaigns.html">キャンペーン</a><span class="cp-crumb__sep">›</span><span class="cp-crumb__cur">' + c.line + '</span></nav>' +
          '<div class="cp-hero" style="background:linear-gradient(135deg,' + c.accent + ',' + c.accent + 'cc)">' +
            '<span class="cp-hero__badge">' + c.badge + '</span>' +
            '<div class="cp-hero__t">' + c.title + '</div>' +
            '<div class="cp-hero__s">' + c.lead + '</div>' +
            '<div class="cp-hero__period">対象期間：' + (c.period || '') + '</div>' +
          '</div>' +
          '<div class="cp-how">' + svg('spark') + '<span>' + (c.tempu ? 'メーカー添付：' : '') + '対象を<b>合計' + setSize + '本</b>選ぶと <b>' + c.y + '本</b>が無料' + (c.tempu ? '（無償添付）' : '') + '。<b>お支払いは' + c.x + '本分</b>。色は自由に組み合わせOK。</span></div>' +
          '<div class="cp-count" id="cpCount"></div>' +
          '<h2 class="cp-sec__t">対象商品から選ぶ（' + c.line + '）<span style="font-size:11.5px;color:var(--ink-3);font-weight:600;margin-left:8px">' + setSize + '本ごとに' + c.y + '本無料</span></h2>' +
          '<div class="cp-grid" id="cpGrid">' + items.map(function (p) {
            return '<div class="cp-card" data-pid="' + p.id + '"><span class="cp-sw" style="background:' + ((p.ph && p.ph.tint) || '#999') + '"></span>' +
              '<div class="cp-card__n">' + (p.family ? (p.family + ' ' + p.level) : p.name) + '</div>' +
              '<div class="cp-card__p">' + yen(p.price) + '</div>' +
              '<div class="cp-step"><button data-cp="dec">−</button><span class="cp-q">0</span><button data-cp="inc">＋</button></div></div>';
          }).join('') + '</div>' +
          '<div class="cp-bar"><div class="cp-bar__in"><span class="cp-bar__info" id="cpBarInfo"></span><button class="cp-bar__btn" id="cpAdd" disabled>' + svg('cart') + 'カートに入れる</button></div></div>';

        var grid = document.getElementById('cpGrid');
        function totalSel() { var n = 0; for (var k in sel) n += sel[k]; return n; }
        function freeN() { return Math.floor(totalSel() / setSize) * c.y; } // 合計÷(x+y)セットごとに y本無料

        function update() {
          var T = totalSel(), n = freeN(), pay = T - n;
          document.getElementById('cpCount').innerHTML = '<span>選択 <b>' + T + '</b> 本</span><span>無料 <b>' + n + '</b> 本 ・ お支払い <b>' + pay + '</b> 本分</span>';
          var ready = T >= setSize;
          var info = document.getElementById('cpBarInfo');
          if (T < setSize) info.innerHTML = 'あと <b>' + (setSize - T) + '本</b> 選ぶと ' + c.y + '本無料（合計' + setSize + '本で' + c.x + '本分の価格）';
          else info.innerHTML = '選択' + T + '本 ＝ お支払い<b>' + pay + '本分</b> ＋ <b>無料' + n + '本</b>';
          var add = document.getElementById('cpAdd');
          add.disabled = !ready;
          add.innerHTML = svg('cart') + (ready ? ('カートに入れる（無料' + n + '本込み）') : ('あと' + (setSize - T) + '本で追加できます'));
        }

        grid.addEventListener('click', function (e) {
          var btn = e.target.closest('[data-cp]'); if (!btn) return;
          var card = e.target.closest('[data-pid]'); var pid = card.dataset.pid;
          var q = sel[pid] || 0;
          q = btn.dataset.cp === 'inc' ? Math.min(99, q + 1) : Math.max(0, q - 1);
          if (q === 0) delete sel[pid]; else sel[pid] = q;
          card.querySelector('.cp-q').textContent = q;
          card.classList.toggle('is-sel', q > 0);
          update();
        });

        document.getElementById('cpAdd').addEventListener('click', function () {
          var T = totalSel(), n = freeN(), pay = T - n;
          if (T < setSize) return;
          // 無料n本を選択から割り当て（同価格なので選択順に）。paidMap=お支払い分／freeList=無料分（1本=1要素）
          var remain = n, paidMap = {}, freeList = [];
          Object.keys(sel).forEach(function (pid) {
            var q = sel[pid];
            var f = Math.min(q, remain); remain -= f;
            for (var i = 0; i < f; i++) freeList.push(pid);
            if (q - f > 0) paidMap[pid] = q - f;
          });
          for (var ppid in paidMap) SP.Store.addToCart(ppid, paidMap[ppid]);
          var claimIds = [];
          freeList.forEach(function (fid) {
            SP.Store.addGift(fid, 1);
            // メーカー添付＝無償現品。個別JAN明細でメーカー請求台帳に記録（1本ずつ）
            if ((c.tempu || c.claimMaker) && SP.Store.addClaim) {
              var fp = (SP.DATA.products || []).find(function (p) { return p.id === fid; }) || {};
              var cr = SP.Store.addClaim({ campaign: c.id, maker: c.maker, line: c.line, dealer: c.dealer || 'kikuchi', pid: fid, jan: (fp.jan || fid), name: (fp.family ? (c.line + ' ' + fp.family + ' ' + fp.level) : (fp.name || fid)), qty: 1, at: new Date().toISOString() });
              if (cr && cr.id) claimIds.push(cr.id);
            }
          });
          if (SP.Store.addBundleRec) SP.Store.addBundleRec({ dealer: c.dealer || 'kikuchi', campaign: c.id, maker: c.maker, line: c.line, badge: c.badge || (c.x + '＋' + c.y), x: c.x, y: c.y, paid: paidMap, free: freeList, claimIds: claimIds });
          renderDone(c, pay, n);
        });

        update();
      }

      function renderDone(c, pay, n) {
        var bar = document.querySelector('.cp-bar'); if (bar) bar.remove();
        root.innerHTML =
          '<div class="cp-done"><div class="cp-done__ic">' + svg('checkc') + '</div>' +
          '<div class="cp-done__t">カートに追加しました</div>' +
          '<div class="cp-done__s"><b>' + c.title + '</b><br>合計 ' + (pay + n) + '本（お支払い <b>' + pay + '本分</b> ＋ <b>無料 ' + n + '本</b>＝¥0）をカートに入れました。</div>' +
          '<div class="cp-done__btns"><a class="p" href="cart.html">カートを見る</a><a class="g" href="campaigns.html">他のキャンペーン</a></div></div>';
        toast('お支払い' + pay + '本分＋無料' + n + '本を追加しました');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    })();
  </script>
</body>
</html>
