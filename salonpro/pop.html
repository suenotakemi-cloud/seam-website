<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>店販 販促物ダウンロード｜SalonPro</title>
  <meta name="description" content="店頭販売を後押しするPOP・メニュー表・SNS素材をブランド別にダウンロード。">
  <link rel="stylesheet" href="assets/css/tokens.css?v=70">
  <link rel="stylesheet" href="assets/css/base.css?v=70">
  <link rel="stylesheet" href="assets/css/components.css?v=70">
  <link rel="stylesheet" href="assets/css/pages.css?v=70">
  <style>
    body { background: #fff; padding-bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom, 0px)); }
    .container.lg { max-width: 820px; }
    .pp-intro { margin-top: var(--s-4); background: var(--dark); color: #fff; border-radius: var(--r-lg); padding: 20px 22px; }
    .pp-intro__t { font-size: var(--fs-18); font-weight: 900; line-height: 1.5; } .pp-intro__t .gold { color: var(--gold); }
    .pp-intro__s { font-size: 13px; color: #c9ced8; line-height: 1.8; margin-top: 8px; }
    .pp-brand { border: 1px solid var(--line); border-radius: var(--r-lg); padding: 16px 16px 6px; margin-top: 14px; }
    .pp-brand__h { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .pp-brand__dot { width: 12px; height: 12px; border-radius: 50%; flex: none; }
    .pp-brand__n { font-size: var(--fs-16); font-weight: 900; }
    .pp-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    @media (max-width: 600px) { .pp-grid { grid-template-columns: 1fr; } }
    .pp-card { border: 1px solid var(--line); border-radius: var(--r-md); padding: 13px 13px 14px; margin-bottom: 10px; }
    .pp-card__t { font-size: 13.5px; font-weight: 800; }
    .pp-card__s { font-size: 11px; color: var(--ink-3); line-height: 1.5; margin-top: 3px; min-height: 30px; }
    .pp-card__b { width: 100%; height: 40px; margin-top: 8px; border-radius: 10px; border: 1px solid var(--line-3); background: #fff; font-size: 12.5px; font-weight: 800; color: var(--ink); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
    .pp-card__b svg { width: 15px; height: 15px; }
    .pp-note { font-size: 11px; color: var(--ink-3); line-height: 1.7; margin-top: var(--s-4); }
  </style>
</head>
<body class="page">
  <header class="site-header">
    <div class="container site-header__inner">
      <a class="brand" href="home.html" aria-label="SalonPro ホーム"><span class="brand__logo">Salon<b>Pro</b></span></a>
      <nav class="header-actions">
        <a class="icon-btn" href="cart.html" aria-label="カート"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2.5 3h2.2l2.2 12.4a1.6 1.6 0 0 0 1.6 1.3h8.7a1.6 1.6 0 0 0 1.6-1.3L21.5 7H6"/></svg><span class="icon-btn__badge" id="cartBadge" hidden>0</span></a>
      </nav>
    </div>
  </header>

  <main class="container lg">
    <div class="lg-hd">
      <div class="lg-hd__t">店販 販促物ダウンロード</div>
      <div class="lg-hd__s">サロンの<b>店頭販売（店販）</b>を後押しする販促物を、ブランド別にご用意しました。印刷してそのまま使えます。</div>
    </div>

    <div class="pp-intro">
      <div class="pp-intro__t">店販は、<span class="gold">サロンの第二の売上。</span></div>
      <div class="pp-intro__s">「いい商品でも、お客様に伝わらないと売れない」——POP・メニュー表・SNS素材で"伝わる売り場"を。ダウンロードした素材は価格を書き入れて店頭・SNSにそのまま使えます。</div>
    </div>

    <div id="ppBody"></div>

    <p class="pp-note">※ デモ用のテンプレート（SVG）です。本番では各メーカー公式の商品写真・ブランドロゴを使った販促物（PNG/PDF）をご提供します。利用はメーカー許諾の範囲内でお願いします。</p>
  </main>

  <nav class="tabbar" aria-label="メインナビ">
    <div class="tabbar__inner">
      <a class="tab" href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11 12 4l8 7"/><path d="M6 10v10h12V10"/></svg><span class="tab__label">ホーム</span></a>
      <a class="tab" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="m21 21-4.3-4.3"/></svg><span class="tab__label">探す</span></a>
      <a class="tab" href="reorder.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a8 8 0 0 1 13.7-3.5L20 7"/><path d="M20 4v3h-3"/><path d="M20 16a8 8 0 0 1-13.7 3.5L4 17"/><path d="M4 20v-3h3"/></svg><span class="tab__label">再購入</span></a>
      <a class="tab" href="favorites.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 12.6 12 20l-7.5-7.4a5 5 0 1 1 7.1-7.1l.4.4.4-.4a5 5 0 1 1 7.1 7.1Z"/></svg><span class="tab__label">お気に入り</span></a>
      <a class="tab" href="mypage.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span class="tab__label">マイページ</span></a>
    </div>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="assets/js/catalog.js?v=70"></script>
  <script src="assets/js/data.js?v=70"></script>
  <script src="assets/js/store.js?v=70"></script>
  <script src="assets/js/components.js?v=70"></script>
  <script>
    (function () {
      var cb = SP.Store.cartSummary().count + (SP.Store.giftCount ? SP.Store.giftCount() : 0), el = document.getElementById('cartBadge'); if (el) { el.textContent = cb; el.hidden = cb <= 0; }
      function toast(m) { var t = document.getElementById('toast'); if (!t) return; t.innerHTML = (SP.svg ? SP.svg('checkc') : '✓') + m; t.classList.add('is-visible'); clearTimeout(t._t); t._t = setTimeout(function () { t.classList.remove('is-visible'); }, 1900); }
      var BRANDS = [
        { n: 'ミルボン', a: '#b9923f', tag: '髪を、もっと素敵に。' },
        { n: 'ルベル', a: '#2f6f5e', tag: 'なりたい、を叶える。' },
        { n: 'アリミノ', a: '#caa64a', tag: 'スタイルは、自由だ。' },
        { n: 'ウエラ', a: '#1f6f8c', tag: '透明感を、あなたに。' },
        { n: 'ロレアル', a: '#8a6d2f', tag: 'プロの実力を、自宅でも。' },
        { n: 'シュワルツコフ', a: '#6e2f57', tag: 'ハイトーンも、美しく。' },
        { n: 'ホーユー', a: '#356d8c', tag: '色持ちも、ケアも。' }
      ];
      var TYPES = [
        { k: 'pop', label: '店頭POP（A5）', desc: 'レジ横・棚に置ける卓上POP' },
        { k: 'menu', label: 'メニュー表', desc: '店販メニュー・価格表' },
        { k: 'sns', label: 'SNS投稿テンプレ', desc: 'Instagram用の正方形素材' }
      ];
      function esc(s) { return String(s).replace(/[&<>]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]; }); }
      function makeSvg(b, ty) {
        var sq = ty.k === 'sns', W = sq ? 480 : 420, H = sq ? 480 : 594;
        return '<svg xmlns="http://www.w3.org/2000/svg" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '">'
          + '<rect width="' + W + '" height="' + H + '" fill="#ffffff"/>'
          + '<rect width="' + W + '" height="86" fill="' + b.a + '"/>'
          + '<text x="' + (W / 2) + '" y="38" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="12" letter-spacing="3">SALON 専売 ・ 店頭販売中</text>'
          + '<text x="' + (W / 2) + '" y="68" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-weight="bold" font-size="26">' + esc(b.n) + '</text>'
          + '<text x="' + (W / 2) + '" y="' + Math.round(H * 0.34) + '" text-anchor="middle" fill="#1b1b1d" font-family="sans-serif" font-weight="bold" font-size="22">' + esc(b.tag) + '</text>'
          + '<text x="' + (W / 2) + '" y="' + Math.round(H * 0.34 + 28) + '" text-anchor="middle" fill="#7b7b80" font-family="sans-serif" font-size="13">' + esc(ty.label) + '</text>'
          + '<rect x="' + Math.round(W * 0.18) + '" y="' + Math.round(H * 0.5) + '" width="' + Math.round(W * 0.64) + '" height="64" rx="10" fill="none" stroke="' + b.a + '" stroke-width="2"/>'
          + '<text x="' + (W / 2) + '" y="' + Math.round(H * 0.5 + 41) + '" text-anchor="middle" fill="' + b.a + '" font-family="sans-serif" font-weight="bold" font-size="22">¥ ______</text>'
          + '<text x="' + (W / 2) + '" y="' + (H - 46) + '" text-anchor="middle" fill="#1b1b1d" font-family="sans-serif" font-size="12">おうちでもサロンの仕上がりを。スタッフにご相談ください。</text>'
          + '<text x="' + (W / 2) + '" y="' + (H - 24) + '" text-anchor="middle" fill="#b9923f" font-family="sans-serif" font-weight="bold" font-size="12">SalonPro ・ 株式会社菊地</text>'
          + '</svg>';
      }
      var DL = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 11 5 5 5-5"/><path d="M5 21h14"/></svg>';
      document.getElementById('ppBody').innerHTML = BRANDS.map(function (b, bi) {
        return '<div class="pp-brand"><div class="pp-brand__h"><span class="pp-brand__dot" style="background:' + b.a + '"></span><span class="pp-brand__n">' + esc(b.n) + '</span></div>'
          + '<div class="pp-grid">' + TYPES.map(function (ty, ti) {
            return '<div class="pp-card"><div class="pp-card__t">' + esc(ty.label) + '</div><div class="pp-card__s">' + esc(ty.desc) + '</div>'
              + '<button class="pp-card__b" data-b="' + bi + '" data-t="' + ti + '">' + DL + 'ダウンロード</button></div>';
          }).join('') + '</div></div>';
      }).join('');
      document.getElementById('ppBody').addEventListener('click', function (e) {
        var btn = e.target.closest('[data-b]'); if (!btn) return;
        var b = BRANDS[+btn.dataset.b], ty = TYPES[+btn.dataset.t];
        var a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([makeSvg(b, ty)], { type: 'image/svg+xml' }));
        a.download = b.n + '_' + ty.label + '.svg'; document.body.appendChild(a); a.click(); a.remove();
        toast(b.n + ' の' + ty.label + 'を保存しました');
      });
    })();
  </script>
</body>
</html>
