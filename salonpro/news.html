<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>お知らせ｜SalonPro</title>
  <meta name="description" content="SalonPro のお知らせ。新商品・セミナー・イベント・出荷など、菊地からの最新情報をまとめてご確認いただけます。">
  <link rel="stylesheet" href="assets/css/tokens.css?v=70">
  <link rel="stylesheet" href="assets/css/base.css?v=70">
  <link rel="stylesheet" href="assets/css/components.css?v=70">
  <link rel="stylesheet" href="assets/css/pages.css?v=70">
  <style>
    body { background: #fff; padding-bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom, 0px)); }
    .container { max-width: 820px; }
    .nw-hd { margin-top: var(--s-4); }
    .nw-hd__t { font-size: clamp(20px, 5vw, 26px); font-weight: 900; }
    .nw-hd__s { font-size: 12.5px; color: var(--ink-3); margin-top: 4px; }

    .nw-sec__t { font-size: 15px; font-weight: 900; margin: var(--s-5) 0 10px; }
    .nw-list { border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; background: #fff; }
    .nw-row { display: flex; align-items: center; gap: 12px; padding: 14px 15px; text-decoration: none; color: var(--ink); }
    .nw-row + .nw-row { border-top: 1px solid var(--line-2); }
    .nw-row:hover { background: var(--surface-2); }
    .nw-row__tag { flex: none; align-self: flex-start; font-size: 10px; font-weight: 800; border-radius: var(--r-pill); padding: 3px 9px; margin-top: 2px; }
    .nw-row__tag--live { background: #fde7e9; color: #d8392b; } .nw-row__tag--venue { background: #eaf1fb; color: #34507a; } .nw-row__tag--maker { background: var(--gold-soft); color: var(--gold-strong); } .nw-row__tag--keiei { background: #eef2f7; color: #5b6473; }
    .nw-row__b { flex: 1; min-width: 0; }
    .nw-row__t { font-size: 13.5px; font-weight: 700; line-height: 1.5; }
    .nw-row__m { font-size: 11px; color: var(--ink-3); margin-top: 3px; }
    .nw-row__arr { flex: none; color: var(--ink-3); } .nw-row__arr svg { width: 16px; height: 16px; }

    .nw-sem { display: grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 640px) { .nw-sem { grid-template-columns: 1fr 1fr; } }
    .nw-card { display: flex; gap: 12px; border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; text-decoration: none; color: var(--ink); background: #fff; }
    .nw-card:hover { box-shadow: var(--shadow-md); }
    .nw-card__m { flex: none; width: 104px; position: relative; background: #000; }
    .nw-card__m img { width: 100%; height: 100%; object-fit: cover; opacity: .92; }
    .nw-card__live { position: absolute; top: 7px; left: 7px; font-size: 9px; font-weight: 800; color: #fff; border-radius: var(--r-pill); padding: 2px 7px; }
    .nw-card__live--live { background: #d8392b; } .nw-card__live--venue { background: #34507a; }
    .nw-card__b { padding: 11px 11px 11px 0; flex: 1; min-width: 0; }
    .nw-card__d { font-size: 11.5px; font-weight: 800; color: var(--gold-strong); }
    .nw-card__t { font-size: 13px; font-weight: 800; line-height: 1.4; margin-top: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .nw-card__meta { font-size: 10.5px; color: var(--ink-3); margin-top: 4px; }
  </style>
</head>
<body class="page">

  <header class="site-header">
    <div class="container site-header__inner">
      <a class="brand" href="home.html" aria-label="SalonPro ホーム"><span class="brand__logo">Salon<b>Pro</b></span></a>
      <form class="header-search" id="searchForm" role="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="headerSearch" placeholder="商品名・ブランド・型番で検索" autocomplete="off" aria-label="商品を検索">
      </form>
      <nav class="header-actions">
        <a class="icon-btn" href="news.html" aria-label="お知らせ" aria-current="page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></a>
        <a class="icon-btn" href="cart.html" aria-label="カート"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2.5 3h2.2l2.2 12.4a1.6 1.6 0 0 0 1.6 1.3h8.7a1.6 1.6 0 0 0 1.6-1.3L21.5 7H6"/></svg><span class="icon-btn__badge" id="cartBadge" hidden>0</span></a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="nw-hd">
      <div class="nw-hd__t">お知らせ</div>
      <div class="nw-hd__s">新商品・セミナー・イベント・出荷など、菊地からの最新情報</div>
    </div>
    <div id="newsList"></div>
    <section><h2 class="nw-sec__t">開催予定のセミナー</h2><div class="nw-sem" id="newsSem"></div></section>
  </main>

  <nav class="tabbar" aria-label="メインナビ">
    <div class="tabbar__inner">
      <a class="tab" href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11 12 4l8 7"/><path d="M6 10v10h12V10"/></svg><span class="tab__label">ホーム</span></a>
      <a class="tab" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="m21 21-4.3-4.3"/></svg><span class="tab__label">探す</span></a>
      <a class="tab" href="reorder.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a8 8 0 0 1 13.7-3.5L20 7"/><path d="M20 4v3h-3"/><path d="M20 16a8 8 0 0 1-13.7 3.5L4 17"/><path d="M4 20v-3h3"/></svg><span class="tab__label">再購入</span></a>
      <a class="tab" href="favorites.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 12.6 12 20l-7.5-7.4a5 5 0 1 1 7.1-7.1l.4.4.4-.4a5 5 0 1 1 7.1 7.1Z"/></svg><span class="tab__label">お気に入り</span></a>
      <a class="tab" href="mypage.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span class="tab__label">マイページ</span></a>
    </div>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="assets/js/catalog.js?v=70"></script>
  <script src="assets/js/data.js?v=70"></script>
  <script src="assets/js/store.js?v=70"></script>
  <script src="assets/js/components.js?v=70"></script>
  <script src="assets/js/nav.js?v=70"></script>
  <script>
    (function () {
      var svg = SP.svg, N = SP.NEWS || [], S = SP.SEMINARS || [];
      var arr = '<span class="nw-row__arr"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></span>';
      var md = function (d) { var p = (d || '').split('-'); return p.length === 3 ? (+p[1]) + '/' + (+p[2]) : d; };
      // お知らせ → 行き先（セミナー/イベント→セミナー、新商品→探す、その他→出荷案内など）
      function dest(n) {
        if (n.tag === '新商品') return 'index.html';
        if (n.tag === 'セミナー' || n.tag === 'イベント') return 'seminar.html';
        return null;
      }
      document.getElementById('newsList').innerHTML = '<div class="nw-list">' + N.map(function (n) {
        var to = dest(n);
        var inner = '<span class="nw-row__tag nw-row__tag--' + (n.tcls || 'keiei') + '">' + n.tag + '</span>' +
          '<span class="nw-row__b"><span class="nw-row__t">' + n.t + '</span><span class="nw-row__m">' + (to === 'seminar.html' ? 'セミナー詳細・お申し込み' : to === 'index.html' ? '商品を見る' : '菊地からのお知らせ') + '</span></span>' + (to ? arr : '');
        return to ? '<a class="nw-row" href="' + to + '">' + inner + '</a>' : '<div class="nw-row">' + inner + '</div>';
      }).join('') + '</div>';

      document.getElementById('newsSem').innerHTML = S.filter(function (s) { return s.date; }).map(function (s) {
        var live = s.kind === 'venue' ? 'venue' : 'live';
        return '<a class="nw-card" href="seminar.html?id=' + s.id + '"><div class="nw-card__m"><img src="assets/img/kikuchi/' + s.img + '" alt=""><span class="nw-card__live nw-card__live--' + live + '">' + (s.kind === 'venue' ? '会場' : 'LIVE') + '</span></div>' +
          '<div class="nw-card__b"><div class="nw-card__d">' + md(s.date) + '（' + s.dow + '）</div><div class="nw-card__t">' + s.title + '</div><div class="nw-card__meta">' + s.time + ' ・ ' + s.fee + ' ・ ' + s.seats + '</div></div></a>';
      }).join('');
    })();
  </script>
</body>
</html>
