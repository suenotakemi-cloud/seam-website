<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>スタッフメイト（スタッフ個人 特別価格）｜SalonPro</title>
  <meta name="description" content="メーカーのスタッフ個人向け特別価格プログラム。スタッフ個人の発注でのみ購入できます（店舗発注では購入できません）。">
  <link rel="stylesheet" href="assets/css/tokens.css?v=30">
  <link rel="stylesheet" href="assets/css/base.css?v=30">
  <link rel="stylesheet" href="assets/css/components.css?v=30">
  <link rel="stylesheet" href="assets/css/pages.css?v=30">
  <style>
    body { background: #fff; padding-bottom: calc(var(--tabbar-h) + 64px + env(safe-area-inset-bottom, 0px)); }
    .container { max-width: 860px; }
    .sm-hd { margin-top: var(--s-4); }
    .sm-hd__t { font-size: clamp(20px,5vw,26px); font-weight: 900; display: flex; align-items: center; gap: 9px; }
    .sm-hd__badge { font-size: 11px; font-weight: 900; color: #fff; background: linear-gradient(135deg,#6e2f57,#1f4e8c); border-radius: var(--r-pill); padding: 4px 11px; }
    .sm-hd__s { font-size: 12.5px; color: var(--ink-3); margin-top: 5px; line-height: 1.65; }
    .sm-info { display: flex; gap: 9px; align-items: flex-start; background: var(--gold-soft); border: 1px solid var(--gold-line); border-radius: var(--r-md); padding: 12px 14px; margin-top: var(--s-4); font-size: 12px; color: var(--ink-2); line-height: 1.65; }
    .sm-info svg { width: 17px; height: 17px; flex: none; margin-top: 1px; color: var(--gold-strong); }
    .sm-info b { color: var(--ink); }
    .sm-lock { border: 1px solid var(--line); border-radius: var(--r-lg); padding: 26px 20px; text-align: center; margin-top: var(--s-4); }
    .sm-lock svg { width: 34px; height: 34px; color: var(--ink-3); }
    .sm-lock__t { font-size: 15px; font-weight: 900; margin-top: 10px; }
    .sm-lock__s { font-size: 12.5px; color: var(--ink-3); margin-top: 6px; line-height: 1.7; }
    .sm-lock a { display: inline-flex; align-items: center; height: 44px; padding: 0 18px; border-radius: var(--r-md); background: var(--gold); color: #fff; font-weight: 800; font-size: 14px; margin-top: 14px; }
    .sm-actor { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; border: 1px solid var(--line); border-radius: var(--r-md); padding: 10px 13px; margin-top: var(--s-4); font-size: 12.5px; }
    .sm-actor b { font-weight: 900; } .sm-actor a { margin-left: auto; font-size: 12px; color: var(--gold-strong); font-weight: 800; text-decoration: none; }
    .sm-grid { display: grid; grid-template-columns: 1fr; gap: 11px; margin-top: var(--s-4); }
    @media (min-width: 620px) { .sm-grid { grid-template-columns: 1fr 1fr; } }
    .sm-card { display: flex; gap: 13px; border: 1px solid var(--line); border-radius: var(--r-lg); padding: 13px; }
    .sm-cover { flex: none; width: 56px; height: 64px; border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: 900; text-align: center; padding: 5px; }
    .sm-card__b { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .sm-card__br { font-size: 11px; color: var(--ink-3); font-weight: 700; }
    .sm-card__t { font-size: 13.5px; font-weight: 800; line-height: 1.35; }
    .sm-card__price { margin-top: 5px; font-size: 12px; }
    .sm-card__price b { font-size: 16px; font-weight: 900; color: #b3402f; }
    .sm-card__list { color: var(--ink-3); text-decoration: line-through; margin-left: 6px; font-size: 11.5px; }
    .sm-card__off { color: #b3402f; font-weight: 800; font-size: 11px; margin-left: 4px; }
    .sm-step { display: inline-flex; align-items: center; border: 1px solid var(--line-3); border-radius: var(--r-sm); overflow: hidden; margin-top: 9px; align-self: flex-start; }
    .sm-step button { width: 34px; height: 34px; border: 0; background: #fff; font-size: 18px; font-weight: 700; color: var(--ink); cursor: pointer; }
    .sm-step span { width: 38px; text-align: center; font-weight: 800; }
    .sm-bar { position: fixed; left: 0; right: 0; bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom, 0px)); background: var(--surface); border-top: 1px solid var(--line); box-shadow: var(--shadow-up); z-index: 20; }
    .sm-bar__in { max-width: 860px; margin-inline: auto; display: flex; align-items: center; gap: 12px; padding: 11px 16px; }
    .sm-bar__info { flex: 1; font-size: 12.5px; font-weight: 800; } .sm-bar__info b { color: #b3402f; }
    .sm-bar__btn { flex: none; height: 48px; padding: 0 20px; border-radius: var(--r-md); background: var(--gold); color: #fff; font-weight: 800; font-size: 14.5px; border: 0; cursor: pointer; }
    .sm-bar__btn:disabled { opacity: .45; }
    .sm-hist { margin-top: var(--s-5); } .sm-hist__t { font-size: 15px; font-weight: 900; margin-bottom: 10px; }
    .sm-hrow { border: 1px solid var(--line); border-radius: var(--r-md); padding: 11px 13px; font-size: 12.5px; } .sm-hrow + .sm-hrow { margin-top: 8px; }
    .sm-note { font-size: 11px; color: var(--ink-3); line-height: 1.6; margin: 16px 0 4px; }
  </style>
</head>
<body class="page">

  <header class="site-header">
    <div class="container site-header__inner">
      <a class="brand" href="home.html" aria-label="SalonPro ホーム"><span class="brand__logo">Salon<b>Pro</b></span></a>
      <nav class="header-actions">
        <a class="icon-btn" href="mypage.html" aria-label="マイページ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg></a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="sm-hd">
      <div class="sm-hd__t">スタッフメイト <span class="sm-hd__badge">STAFF ONLY</span></div>
      <div class="sm-hd__s">メーカーの<b>スタッフ個人向け特別価格</b>プログラム。<b>スタッフ個人の発注</b>でのみ購入できます（店舗＝サロンの発注では購入できません）。</div>
    </div>

    <div class="sm-info">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a5 5 0 0 0-5 5v3H6a1 1 0 0 0-1 1v9h14v-9a1 1 0 0 0-1-1h-1V7a5 5 0 0 0-5-5z"/></svg>
      <span><b>個人発注限定</b>：お支払いはスタッフ個人。期間 <b id="smPeriod"></b>。店舗の通常カート・発注には表示されず、店舗発注では購入できません。</span>
    </div>

    <div id="smBody"></div>

    <div class="sm-hist" id="smHistWrap" hidden>
      <div class="sm-hist__t">あなたの個人発注</div>
      <div id="smHist"></div>
    </div>

    <p class="sm-note">※ 商品・価格はプロトタイプのサンプルです。本番ではメーカーのスタッフメイト登録・本人確認と連携します。</p>
  </main>

  <div class="sm-bar" id="smBar" hidden>
    <div class="sm-bar__in">
      <span class="sm-bar__info" id="smBarInfo">個人発注：0点</span>
      <button class="sm-bar__btn" id="smPlace" disabled>個人発注を確定</button>
    </div>
  </div>

  <nav class="tabbar" aria-label="メインナビ">
    <div class="tabbar__inner">
      <a class="tab" href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11 12 4l8 7"/><path d="M6 10v10h12V10"/></svg><span class="tab__label">ホーム</span></a>
      <a class="tab" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="m21 21-4.3-4.3"/></svg><span class="tab__label">探す</span></a>
      <a class="tab" href="reorder.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a8 8 0 0 1 13.7-3.5L20 7"/><path d="M20 4v3h-3"/><path d="M20 16a8 8 0 0 1-13.7 3.5L4 17"/><path d="M4 20v-3h3"/></svg><span class="tab__label">再購入</span></a>
      <a class="tab" href="favorites.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 12.6 12 20l-7.5-7.4a5 5 0 1 1 7.1-7.1l.4.4.4-.4a5 5 0 1 1 7.1 7.1Z"/></svg><span class="tab__label">お気に入り</span></a>
      <a class="tab" href="mypage.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span class="tab__label">マイページ</span></a>
    </div>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="assets/js/catalog.js?v=30"></script>
  <script src="assets/js/data.js?v=30"></script>
  <script src="assets/js/store.js?v=30"></script>
  <script src="assets/js/components.js?v=30"></script>
  <script src="assets/js/nav.js?v=30"></script>
  <script>
    (function () {
      var Store = SP.Store, yen = SP.fmtYen || function (n) { return '¥' + (n || 0).toLocaleString(); };
      var toast = function (m) { if (window.SP_toast) SP_toast(m); };
      var SM = SP.STAFFMATE || { items: [], period: '' };
      document.getElementById('smPeriod').textContent = SM.period || '';
      var qty = {}; // id -> qty

      function actorIsStaff() { var a = Store.getActor(); return a && (a.role === 'staff' || a.role === 'mgr'); }

      function renderHist() {
        var list = (Store.getStaffmateOrders ? Store.getStaffmateOrders() : []);
        var wrap = document.getElementById('smHistWrap');
        if (!list.length) { wrap.hidden = true; return; }
        wrap.hidden = false;
        document.getElementById('smHist').innerHTML = list.map(function (o) {
          return '<div class="sm-hrow"><b>' + o.staff + '</b> ・ ' + (o.count || 0) + '点 ・ <b style="color:#b3402f">' + yen(o.total) + '</b>　<span style="color:var(--ink-3)">個人発注（お支払い：個人）</span></div>';
        }).join('');
      }

      function renderLocked() {
        document.getElementById('smBar').hidden = true;
        document.getElementById('smBody').innerHTML =
          '<div class="sm-lock"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>' +
          '<div class="sm-lock__t">スタッフ個人発注 専用です</div>' +
          '<div class="sm-lock__s">スタッフメイトの特別価格は<b>スタッフ個人の発注</b>でのみ購入できます。<br>「店舗・スタッフ管理」で<b>スタッフとして</b>利用者を切り替えてください。</div>' +
          '<a href="staff.html">発注者を切り替える</a></div>';
      }

      function calc() {
        var items = SM.items.filter(function (p) { return (qty[p.id] || 0) > 0; });
        var pts = items.reduce(function (s, p) { return s + qty[p.id]; }, 0);
        var total = items.reduce(function (s, p) { return s + p.price * qty[p.id]; }, 0);
        document.getElementById('smBarInfo').innerHTML = '個人発注：<b>' + pts + '点</b>　' + yen(total);
        document.getElementById('smPlace').disabled = pts === 0;
        return { items: items, pts: pts, total: total };
      }

      function renderGrid() {
        document.getElementById('smBar').hidden = false;
        document.getElementById('smActor');
        var a = Store.getActor();
        var grid = SM.items.map(function (p) {
          var off = p.list ? Math.round((1 - p.price / p.list) * 100) : 0;
          var q = qty[p.id] || 0;
          return '<div class="sm-card">' +
            '<span class="sm-cover" style="background:' + (p.ph && p.ph.tint || '#6e2f57') + '">' + p.brand + '</span>' +
            '<div class="sm-card__b"><span class="sm-card__br">' + p.brand + '</span><span class="sm-card__t">' + p.name + '</span>' +
            '<span class="sm-card__price"><b>' + yen(p.price) + '</b><span class="sm-card__list">' + yen(p.list) + '</span>' + (off > 0 ? '<span class="sm-card__off">' + off + '%OFF</span>' : '') + '</span>' +
            '<span class="sm-step"><button data-m="' + p.id + '">−</button><span data-q="' + p.id + '">' + q + '</span><button data-p="' + p.id + '">＋</button></span>' +
            '</div></div>';
        }).join('');
        document.getElementById('smBody').innerHTML =
          '<div class="sm-actor">発注者：<b>' + a.name + '</b><span style="color:var(--ink-3)">（個人発注）</span><a href="staff.html">変更</a></div>' +
          '<div class="sm-grid">' + grid + '</div>';
        calc();
      }

      function render() {
        if (actorIsStaff()) renderGrid(); else renderLocked();
        renderHist();
      }

      document.getElementById('smBody').addEventListener('click', function (e) {
        var m = e.target.closest('[data-m]'), p = e.target.closest('[data-p]');
        if (m) { var i = m.dataset.m; qty[i] = Math.max(0, (qty[i] || 0) - 1); }
        else if (p) { var j = p.dataset.p; qty[j] = (qty[j] || 0) + 1; }
        else return;
        var id = (m ? m.dataset.m : p.dataset.p);
        var span = document.querySelector('[data-q="' + id + '"]'); if (span) span.textContent = qty[id] || 0;
        calc();
      });
      document.getElementById('smPlace').addEventListener('click', function () {
        var c = calc(); if (!c.pts) return;
        Store.addStaffmateOrder({ staff: Store.getActor().name, items: c.items.map(function (p) { return { id: p.id, qty: qty[p.id] }; }), count: c.pts, total: c.total });
        qty = {};
        toast('スタッフ個人発注を確定しました（お支払いは個人）');
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });

      render();
    })();
  </script>
</body>
</html>
