<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>業界誌・書籍（定期購読）｜SalonPro</title>
  <meta name="description" content="美容業界誌の定期購読（サブスク）＝毎号自動でお届け。PREPPY・新美容・美容と経営・NAIL MAX ほか。技術書・テキストも購入できます。">
  <link rel="stylesheet" href="assets/css/tokens.css?v=28">
  <link rel="stylesheet" href="assets/css/base.css?v=28">
  <link rel="stylesheet" href="assets/css/components.css?v=28">
  <link rel="stylesheet" href="assets/css/pages.css?v=28">
  <style>
    body { background: #fff; padding-bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom, 0px)); }
    .container { max-width: 980px; }
    .bk-hd { margin-top: var(--s-4); }
    .bk-hd__t { font-size: clamp(20px,5vw,26px); font-weight: 900; }
    .bk-hd__s { font-size: 12.5px; color: var(--ink-3); margin-top: 5px; line-height: 1.65; }
    .bk-info { display: flex; gap: 9px; align-items: flex-start; background: var(--gold-soft); border: 1px solid var(--gold-line); border-radius: var(--r-md); padding: 12px 14px; margin-top: var(--s-4); font-size: 12px; color: var(--ink-2); line-height: 1.65; }
    .bk-info svg { width: 17px; height: 17px; flex: none; margin-top: 1px; color: var(--gold-strong); }
    .bk-info b { color: var(--ink); }
    .bk-sec { margin-top: var(--s-5); }
    .bk-sec__h { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
    .bk-sec__t { font-size: 16px; font-weight: 900; }
    .bk-sec__c { font-size: 12px; color: var(--ink-3); font-weight: 700; }
    .bk-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 560px) { .bk-grid { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 860px) { .bk-grid--mag { grid-template-columns: 1fr 1fr 1fr; } }
    .bk-card { display: flex; gap: 13px; border: 1px solid var(--line); border-radius: var(--r-lg); padding: 13px; background: #fff; }
    .bk-card.is-sub { border-color: var(--gold); background: var(--gold-soft); }
    .bk-cover { flex: none; width: 64px; height: 86px; border-radius: var(--r-sm); display: flex; align-items: center; justify-content: center; text-align: center; color: #fff; font-size: 11px; font-weight: 900; line-height: 1.25; padding: 6px; box-shadow: var(--shadow-sm); }
    .bk-card__b { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .bk-card__tag { font-size: 10px; font-weight: 800; color: var(--gold-strong); }
    .bk-card__t { font-size: 14px; font-weight: 800; line-height: 1.35; margin-top: 2px; }
    .bk-card__m { font-size: 11px; color: var(--ink-3); margin-top: 3px; }
    .bk-card__price { margin-top: auto; padding-top: 8px; font-size: 12px; color: var(--ink-2); }
    .bk-card__price b { font-size: 16px; font-weight: 900; color: var(--ink); }
    .bk-card__price .u { font-size: 11px; color: var(--ink-3); font-weight: 600; }
    .bk-actions { display: flex; gap: 7px; margin-top: 9px; }
    .bk-btn { flex: 1; height: 38px; border-radius: var(--r-md); font-size: 12.5px; font-weight: 800; border: 1px solid var(--line-strong); background: #fff; color: var(--ink); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 5px; }
    .bk-btn--sub { background: var(--gold); border-color: var(--gold); color: #fff; }
    .bk-btn--sub:hover { background: var(--gold-strong); }
    .bk-btn--on { background: #fff; border-color: var(--gold); color: var(--gold-strong); }
    .bk-btn svg { width: 14px; height: 14px; }
    .bk-note { font-size: 11px; color: var(--ink-3); line-height: 1.6; margin: 18px 0 4px; }
  </style>
</head>
<body class="page">

  <header class="site-header">
    <div class="container site-header__inner">
      <a class="brand" href="home.html" aria-label="SalonPro ホーム"><span class="brand__logo">Salon<b>Pro</b></span></a>
      <nav class="header-actions">
        <a class="icon-btn" href="news.html" aria-label="お知らせ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></a>
        <a class="icon-btn" href="cart.html" aria-label="カート"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2.5 3h2.2l2.2 12.4a1.6 1.6 0 0 0 1.6 1.3h8.7a1.6 1.6 0 0 0 1.6-1.3L21.5 7H6"/></svg><span class="icon-btn__badge" id="cartBadge" hidden>0</span></a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="bk-hd">
      <div class="bk-hd__t">業界誌・書籍</div>
      <div class="bk-hd__s">美容業界誌の<b>定期購読（サブスク）</b>＝毎号、発売と同時に自動でお届け。技術書・テキストも単発でご購入いただけます。</div>
    </div>

    <div class="bk-info">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>
      <span><b>定期購読</b>は毎号自動でお届け・買い忘れ防止。請求は毎月のお仕入れにまとめて計上、<b>いつでも解約</b>できます。</span>
    </div>

    <section class="bk-sec">
      <div class="bk-sec__h">
        <span class="bk-sec__t">業界誌（定期購読）</span>
        <span class="bk-sec__c" id="subCount"></span>
      </div>
      <div class="bk-grid bk-grid--mag" id="magGrid"></div>
    </section>

    <section class="bk-sec">
      <div class="bk-sec__h">
        <span class="bk-sec__t">技術書・テキスト</span>
        <span class="bk-sec__c">単発購入</span>
      </div>
      <div class="bk-grid" id="bookGrid"></div>
    </section>

    <p class="bk-note">※ 掲載の誌名・出版社・価格はプロトタイプの仮置きです（実データに差し替え可）。定期購読の開始号・配送サイクルは各誌の発売日に準じます。</p>
  </main>

  <nav class="tabbar" aria-label="メインナビ">
    <div class="tabbar__inner">
      <a class="tab" href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11 12 4l8 7"/><path d="M6 10v10h12V10"/></svg><span class="tab__label">ホーム</span></a>
      <a class="tab" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="m21 21-4.3-4.3"/></svg><span class="tab__label">探す</span></a>
      <a class="tab" href="reorder.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a8 8 0 0 1 13.7-3.5L20 7"/><path d="M20 4v3h-3"/><path d="M20 16a8 8 0 0 1-13.7 3.5L4 17"/><path d="M4 20v-3h3"/></svg><span class="tab__label">再購入</span></a>
      <a class="tab" href="favorites.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 12.6 12 20l-7.5-7.4a5 5 0 1 1 7.1-7.1l.4.4.4-.4a5 5 0 1 1 7.1 7.1Z"/></svg><span class="tab__label">お気に入り</span></a>
      <a class="tab" href="mypage.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span class="tab__label">マイページ</span></a>
    </div>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="assets/js/catalog.js?v=28"></script>
  <script src="assets/js/data.js?v=28"></script>
  <script src="assets/js/store.js?v=28"></script>
  <script src="assets/js/components.js?v=28"></script>
  <script src="assets/js/nav.js?v=28"></script>
  <script>
    (function () {
      var Store = SP.Store;
      var yen = SP.fmtYen || function (n) { return '¥' + (n || 0).toLocaleString(); };
      var toast = function (m) { if (window.SP_toast) SP_toast(m); };
      var books = (SP.DATA.products || []).filter(function (p) { return p.cat === 'book'; });
      var mags = books.filter(function (p) { return p.mag; });
      var texts = books.filter(function (p) { return !p.mag; });

      function cover(p) {
        var t = (p.ph && p.ph.tint) || '#5b6473';
        var label = (p.ph && p.ph.label) || p.name;
        return '<span class="bk-cover" style="background:' + t + '">' + label + '</span>';
      }

      function magCard(p) {
        var on = Store.hasBookSub(p.id);
        return '<div class="bk-card' + (on ? ' is-sub' : '') + '" data-id="' + p.id + '">' +
          cover(p) +
          '<div class="bk-card__b">' +
            '<span class="bk-card__tag">' + (p.cycle || '定期刊行') + (on ? ' ・ 購読中' : '') + '</span>' +
            '<span class="bk-card__t">' + p.name + '</span>' +
            '<span class="bk-card__m">' + (p.brand || '') + '</span>' +
            '<span class="bk-card__price">定期購読 <b>' + yen(p.sub || p.price) + '</b><span class="u">／号（税抜）</span></span>' +
            '<div class="bk-actions">' +
              '<button class="bk-btn ' + (on ? 'bk-btn--on' : 'bk-btn--sub') + '" data-sub="' + p.id + '">' +
                (on
                  ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>購読中'
                  : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>定期購読する') +
              '</button>' +
              '<button class="bk-btn" data-buy="' + p.id + '">1冊 ' + yen(p.price) + '</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      }

      function textCard(p) {
        return '<div class="bk-card" data-id="' + p.id + '">' +
          cover(p) +
          '<div class="bk-card__b">' +
            '<span class="bk-card__tag">書籍</span>' +
            '<span class="bk-card__t">' + p.name + '</span>' +
            '<span class="bk-card__m">' + (p.brand || '') + '</span>' +
            '<span class="bk-card__price"><b>' + yen(p.price) + '</b><span class="u">（税抜）</span></span>' +
            '<div class="bk-actions">' +
              '<button class="bk-btn bk-btn--sub" data-buy="' + p.id + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2.5 3h2.2l2.2 12.4a1.6 1.6 0 0 0 1.6 1.3h8.7a1.6 1.6 0 0 0 1.6-1.3L21.5 7H6"/></svg>カートに追加</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      }

      function syncCart() {
        var n = Store.cartSummary().count + (Store.giftCount ? Store.giftCount() : 0);
        var el = document.getElementById('cartBadge'); if (el) { el.textContent = n; el.hidden = n <= 0; }
      }
      function syncSubCount() {
        var n = Store.getBookSubs().filter(function (id) { return mags.some(function (m) { return m.id === id; }); }).length;
        var el = document.getElementById('subCount'); if (el) el.textContent = n ? ('購読中 ' + n + '誌') : '';
      }

      function render() {
        document.getElementById('magGrid').innerHTML = mags.map(magCard).join('');
        document.getElementById('bookGrid').innerHTML = texts.map(textCard).join('');
        syncSubCount();
      }

      document.querySelector('main').addEventListener('click', function (e) {
        var subBtn = e.target.closest('[data-sub]');
        var buyBtn = e.target.closest('[data-buy]');
        if (subBtn) {
          var id = subBtn.getAttribute('data-sub');
          var nowOn = !Store.hasBookSub(id);
          Store.toggleBookSub(id);
          var p = mags.find(function (m) { return m.id === id; });
          toast(nowOn ? (p ? p.name + ' を定期購読しました' : '定期購読しました') : '定期購読を解除しました');
          render();
        } else if (buyBtn) {
          var bid = buyBtn.getAttribute('data-buy');
          Store.addToCart(bid, 1);
          var bp = books.find(function (b) { return b.id === bid; });
          toast((bp ? bp.name : '商品') + ' をカートに追加しました');
          syncCart();
        }
      });

      Store.subscribe(syncCart);
      render();
      syncCart();
    })();
  </script>
</body>
</html>
