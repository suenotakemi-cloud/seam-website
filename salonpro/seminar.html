<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>セミナー｜SalonPro</title>
  <meta name="description" content="SalonPro のセミナー・イベント詳細とお申し込み。ライブ配信・会場開催のプロ向け講習。株式会社菊地（KIKUCHI PRODUCE）運営。">
  <link rel="stylesheet" href="assets/css/tokens.css?v=25">
  <link rel="stylesheet" href="assets/css/base.css?v=25">
  <link rel="stylesheet" href="assets/css/components.css?v=25">
  <link rel="stylesheet" href="assets/css/pages.css?v=25">
  <style>
    body { background: #fff; padding-bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom, 0px)); }
    .container { max-width: 880px; }
    .sd-crumb { display: flex; align-items: center; gap: 3px; margin: var(--s-4) 0 0; font-size: 12px; font-weight: 700; }
    .sd-crumb a { color: var(--gold-strong); text-decoration: none; } .sd-crumb__sep { color: var(--ink-3); margin: 0 3px; } .sd-crumb__cur { color: var(--ink-3); }

    .sd-hero { position: relative; aspect-ratio: 16/9; max-height: 320px; border-radius: var(--r-lg); overflow: hidden; background: #000; margin-top: var(--s-3); }
    .sd-hero img { width: 100%; height: 100%; object-fit: cover; opacity: .94; }
    .sd-badge { position: absolute; top: 12px; left: 12px; display: flex; align-items: center; gap: 5px; color: #fff; font-size: 11.5px; font-weight: 800; border-radius: var(--r-pill); padding: 5px 12px; }
    .sd-badge--live { background: #d8392b; } .sd-badge--venue { background: #34507a; }
    .sd-badge i { width: 7px; height: 7px; border-radius: 50%; background: #fff; display: inline-block; animation: sdb 1.4s infinite; } @keyframes sdb { 50% { opacity: .3; } }
    .sd-tag { display: inline-block; font-size: 11px; font-weight: 800; color: var(--gold-strong); background: var(--gold-soft); border: 1px solid var(--gold-line); border-radius: var(--r-pill); padding: 3px 11px; margin-top: var(--s-4); }
    .sd-title { font-size: clamp(20px, 5vw, 27px); font-weight: 900; line-height: 1.3; margin-top: 8px; }
    .sd-lead { font-size: 13.5px; color: var(--ink-2); line-height: 1.85; margin-top: 10px; }

    .sd-meta { display: grid; grid-template-columns: 1fr; border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; margin-top: var(--s-5); }
    @media (min-width: 560px) { .sd-meta { grid-template-columns: 1fr 1fr; } }
    .sd-mrow { display: flex; align-items: center; gap: 11px; padding: 13px 15px; }
    .sd-mrow + .sd-mrow { border-top: 1px solid var(--line-2); }
    @media (min-width: 560px) { .sd-meta .sd-mrow:nth-child(even) { border-left: 1px solid var(--line-2); } .sd-meta .sd-mrow:nth-child(2) { border-top: 0; } }
    .sd-mrow__ic { width: 34px; height: 34px; border-radius: var(--r-sm); background: var(--gold-soft); color: var(--gold-strong); display: flex; align-items: center; justify-content: center; flex: none; } .sd-mrow__ic svg { width: 18px; height: 18px; }
    .sd-mrow__l { font-size: 10.5px; color: var(--ink-3); font-weight: 700; } .sd-mrow__v { font-size: 14px; font-weight: 800; } .sd-mrow__v .hot { color: #d8392b; }

    .sd-sec { margin-top: var(--s-6); }
    .sd-sec__t { font-size: 16px; font-weight: 900; margin-bottom: 10px; }
    .sd-agenda { list-style: none; margin: 0; padding: 0; display: grid; gap: 8px; }
    .sd-agenda li { position: relative; padding-left: 24px; font-size: 13px; color: var(--ink-2); line-height: 1.6; }
    .sd-agenda li svg { position: absolute; left: 0; top: 1px; width: 16px; height: 16px; color: var(--gold-strong); }

    /* 申込フォーム */
    .sf { border: 1px solid var(--line); border-radius: var(--r-lg); padding: 18px; margin-top: var(--s-5); background: var(--surface); }
    .sf__h { font-size: 16px; font-weight: 900; }
    .sf__s { font-size: 12px; color: var(--ink-3); margin-top: 3px; }
    .sf__form { display: grid; gap: 13px; margin-top: 15px; }
    .sf__l { display: block; font-size: 12px; font-weight: 800; margin-bottom: 5px; } .sf__l .req { color: #c0392b; margin-left: 3px; }
    .sf__form input, .sf__form textarea { width: 100%; border: 1px solid var(--line-3); border-radius: var(--r-sm); padding: 11px 12px; font-size: 14px; background: #fff; font-family: inherit; }
    .sf__form textarea { min-height: 64px; resize: vertical; }
    .sf__row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .sf__btn { width: 100%; height: 52px; border-radius: var(--r-md); font-weight: 800; font-size: 15px; background: var(--gold); color: #fff; border: 0; display: flex; align-items: center; justify-content: center; gap: 7px; cursor: pointer; }
    .sf__btn:hover:not(:disabled) { background: var(--gold-strong); } .sf__btn:disabled { opacity: .45; }
    .sf__btn svg { width: 18px; height: 18px; }
    .sf__note { font-size: 11px; color: var(--ink-3); line-height: 1.6; margin-top: 10px; }
    .sf__done { text-align: center; padding: 26px 10px; }
    .sf__done__ic { width: 58px; height: 58px; margin: 0 auto 12px; border-radius: 50%; background: var(--gold-soft); color: var(--gold-strong); display: flex; align-items: center; justify-content: center; } .sf__done__ic svg { width: 30px; height: 30px; }
    .sf__done__t { font-size: 18px; font-weight: 900; } .sf__done__s { font-size: 13px; color: var(--ink-2); line-height: 1.75; margin-top: 8px; }

    /* 一覧（id無し時） */
    .sl-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: var(--s-4); }
    @media (min-width: 720px) { .sl-grid { grid-template-columns: 1fr 1fr; } }
    .sl-card { display: flex; gap: 12px; border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; text-decoration: none; color: var(--ink); background: #fff; }
    .sl-card:hover { box-shadow: var(--shadow-md); }
    .sl-card__m { flex: none; width: 116px; position: relative; background: #000; }
    .sl-card__m img { width: 100%; height: 100%; object-fit: cover; opacity: .92; }
    .sl-card__b { padding: 12px 12px 12px 0; flex: 1; min-width: 0; }
    .sl-card__d { font-size: 12px; font-weight: 800; color: var(--gold-strong); }
    .sl-card__t { font-size: 14px; font-weight: 800; line-height: 1.4; margin-top: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .sl-card__meta { font-size: 11px; color: var(--ink-3); margin-top: 5px; }

    .sd-others { margin-top: var(--s-6); }
  </style>
</head>
<body class="page">

  <header class="site-header">
    <div class="container site-header__inner">
      <a class="brand" href="home.html" aria-label="SalonPro ホーム"><span class="brand__logo">Salon<b>Pro</b></span></a>
      <form class="header-search" id="searchForm" role="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="headerSearch" placeholder="商品名・ブランド・型番で検索" autocomplete="off" aria-label="商品を検索">
      </form>
      <nav class="header-actions">
        <a class="icon-btn" href="news.html" aria-label="お知らせ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="icon-btn__badge" id="notifBadge">2</span></a>
        <a class="icon-btn" href="cart.html" aria-label="カート"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2.5 3h2.2l2.2 12.4a1.6 1.6 0 0 0 1.6 1.3h8.7a1.6 1.6 0 0 0 1.6-1.3L21.5 7H6"/></svg><span class="icon-btn__badge" id="cartBadge" hidden>0</span></a>
      </nav>
    </div>
  </header>

  <main class="container" id="semRoot"></main>

  <nav class="tabbar" aria-label="メインナビ">
    <div class="tabbar__inner">
      <a class="tab" href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11 12 4l8 7"/><path d="M6 10v10h12V10"/></svg><span class="tab__label">ホーム</span></a>
      <a class="tab" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="m21 21-4.3-4.3"/></svg><span class="tab__label">探す</span></a>
      <a class="tab" href="reorder.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a8 8 0 0 1 13.7-3.5L20 7"/><path d="M20 4v3h-3"/><path d="M20 16a8 8 0 0 1-13.7 3.5L4 17"/><path d="M4 20v-3h3"/></svg><span class="tab__label">再購入</span></a>
      <a class="tab" href="favorites.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 12.6 12 20l-7.5-7.4a5 5 0 1 1 7.1-7.1l.4.4.4-.4a5 5 0 1 1 7.1 7.1Z"/></svg><span class="tab__label">お気に入り</span></a>
      <a class="tab" href="mypage.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span class="tab__label">マイページ</span></a>
    </div>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="assets/js/catalog.js?v=25"></script>
  <script src="assets/js/data.js?v=25"></script>
  <script src="assets/js/store.js?v=25"></script>
  <script src="assets/js/components.js?v=25"></script>
  <script src="assets/js/nav.js?v=25"></script>
  <script>
    (function () {
      var svg = SP.svg, S = SP.SEMINARS || [];
      var root = document.getElementById('semRoot');
      var md = function (d) { var p = (d || '').split('-'); return p.length === 3 ? (+p[1]) + '/' + (+p[2]) : d; };
      var icon = function (p) { return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">' + p + '</svg>'; };
      var toast = function (m) { var t = document.getElementById('toast'); t.innerHTML = svg('checkc') + m; t.classList.add('is-visible'); setTimeout(function () { t.classList.remove('is-visible'); }, 2200); };
      var id = new URLSearchParams(location.search).get('id');
      var sem = S.filter(function (s) { return s.id === id; })[0];

      function badge(s) {
        return s.kind === 'venue'
          ? '<span class="sd-badge sd-badge--venue"><i style="animation:none"></i>会場開催</span>'
          : '<span class="sd-badge sd-badge--live"><i></i>LIVE配信</span>';
      }

      if (!sem) { renderList(); return; }
      renderDetail(sem);

      function renderDetail(s) {
        document.title = s.title + '｜セミナー｜SalonPro';
        var others = S.filter(function (x) { return x.id !== s.id && x.date; }).slice(0, 4);
        root.innerHTML =
          '<nav class="sd-crumb"><a href="home.html">ホーム</a><span class="sd-crumb__sep">›</span><a href="seminar.html">セミナー</a><span class="sd-crumb__sep">›</span><span class="sd-crumb__cur">詳細</span></nav>' +
          '<div class="sd-hero"><img src="assets/img/kikuchi/' + s.img + '" alt="">' + badge(s) + '</div>' +
          '<span class="sd-tag">' + s.tag + '</span>' +
          '<h1 class="sd-title">' + s.title + '</h1>' +
          '<p class="sd-lead">' + s.lead + '</p>' +
          '<div class="sd-meta">' +
            mrow('<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>', '日時', s.date ? (md(s.date) + '（' + s.dow + '） ' + s.time) : s.time) +
            mrow('<path d="M12 21s-7-5.2-7-11a7 7 0 0 1 14 0c0 5.8-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/>', '形式・会場', s.place) +
            mrow('<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>', '講師', s.host) +
            mrow('<path d="M12 3l7 3v5c0 4.4-3 7.7-7 9-4-1.3-7-4.6-7-9V6z"/>', '参加費・残席', s.fee + ' ／ <span class="hot">' + s.seats + '</span>') +
          '</div>' +
          '<section class="sd-sec"><h2 class="sd-sec__t">このセミナーで学べること</h2><ul class="sd-agenda">' +
            ['最新トレンドと現場での落とし込み', '実演・デモンストレーション（録画視聴も可）', '質疑応答（チャットでリアルタイム相談）', '導入商材・メニュー設計のヒント'].map(function (a) { return '<li>' + svg('checkc') + a + '</li>'; }).join('') +
          '</ul></section>' +
          '<div class="sf" id="sfBox">' +
            '<div class="sf__h">このセミナーに申し込む</div>' +
            '<div class="sf__s">' + s.fee + '・' + s.seats + '。お申し込み後、参加方法を菊地よりご案内します。</div>' +
            '<div class="sf__form">' +
              '<div><span class="sf__l">お名前<span class="req">*</span></span><input type="text" id="sf-name"></div>' +
              '<div><span class="sf__l">サロン名<span class="req">*</span></span><input type="text" id="sf-salon"></div>' +
              '<div class="sf__row2"><div><span class="sf__l">メールアドレス<span class="req">*</span></span><input type="email" id="sf-email"></div><div><span class="sf__l">参加人数</span><input type="number" id="sf-count" value="1" min="1"></div></div>' +
              '<div><span class="sf__l">ご質問・ご要望</span><textarea id="sf-msg"></textarea></div>' +
              '<button class="sf__btn" id="sfSubmit" disabled>' + svg('checkc') + 'この内容で申し込む</button>' +
              '<p class="sf__note">※ プロトタイプのため送信は行われません。本番では申込管理・リマインド配信に連携します。</p>' +
            '</div>' +
          '</div>' +
          (others.length ? '<section class="sd-others"><h2 class="sd-sec__t">他の開催予定</h2><div class="sl-grid">' + others.map(card).join('') + '</div></section>' : '');

        var box = document.getElementById('sfBox');
        if (SP.Store.hasSeminarApp(s.id)) { appliedBox(box, s); return; }
        function chk() {
          var ok = ['sf-name', 'sf-salon', 'sf-email'].every(function (k) { return document.getElementById(k).value.trim(); });
          document.getElementById('sfSubmit').disabled = !ok;
        }
        box.addEventListener('input', chk);
        document.getElementById('sfSubmit').addEventListener('click', function () {
          SP.Store.addSeminarApp({ seminarId: s.id, title: s.title, date: s.date, dow: s.dow, time: s.time, name: document.getElementById('sf-name').value.trim(), salon: document.getElementById('sf-salon').value.trim(), email: document.getElementById('sf-email').value.trim(), count: document.getElementById('sf-count').value, at: Date.now() });
          appliedBox(box, s);
          toast('セミナーに申し込みました');
          box.scrollIntoView({ block: 'center', behavior: 'smooth' });
        });
      }
      function appliedBox(box, s) {
        box.innerHTML = '<div class="sf__done"><div class="sf__done__ic">' + svg('checkc') + '</div><div class="sf__done__t">お申し込み済みです</div>' +
          '<div class="sf__done__s"><b>' + s.title + '</b><br>' + (s.date ? md(s.date) + '（' + s.dow + '） ' + s.time : s.time) + '<br>参加方法は菊地よりメールでご案内します。<br><b>開催前日にリマインド</b>をお送りします。</div></div>';
      }
      function mrow(p, l, v) {
        return '<div class="sd-mrow"><span class="sd-mrow__ic">' + icon(p) + '</span><span><span class="sd-mrow__l">' + l + '</span><span class="sd-mrow__v">' + v + '</span></span></div>';
      }
      function card(s) {
        return '<a class="sl-card" href="seminar.html?id=' + s.id + '"><div class="sl-card__m"><img src="assets/img/kikuchi/' + s.img + '" alt="">' + badge(s) + '</div>' +
          '<div class="sl-card__b"><div class="sl-card__d">' + (s.date ? md(s.date) + '（' + s.dow + '）' : '随時') + '</div><div class="sl-card__t">' + s.title + '</div><div class="sl-card__meta">' + s.time + ' ・ ' + s.fee + ' ・ ' + s.seats + '</div></div></a>';
      }
      function renderList() {
        document.title = 'セミナー一覧｜SalonPro';
        root.innerHTML =
          '<nav class="sd-crumb"><a href="home.html">ホーム</a><span class="sd-crumb__sep">›</span><span class="sd-crumb__cur">セミナー</span></nav>' +
          '<h1 class="sd-title" style="margin-top:14px">セミナー・イベント</h1>' +
          '<p class="sd-lead">ライブ配信・会場開催のプロ向け講習。気になる回をタップしてお申し込みください。</p>' +
          '<div class="sl-grid">' + S.filter(function (s) { return s.date; }).map(card).join('') + '</div>';
      }
    })();
  </script>
</body>
</html>
