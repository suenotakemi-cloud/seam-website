<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>メーカー添付｜SalonPro</title>
  <meta name="description" content="メーカーから貴社へ提供されている添付条件（無償現品）のブランド一覧。選んで発注できます。">
  <link rel="stylesheet" href="assets/css/tokens.css?v=25">
  <link rel="stylesheet" href="assets/css/base.css?v=25">
  <link rel="stylesheet" href="assets/css/components.css?v=25">
  <link rel="stylesheet" href="assets/css/pages.css?v=25">
  <style>
    body { background: #fff; padding-bottom: calc(var(--tabbar-h) + env(safe-area-inset-bottom, 0px)); }
    .container { max-width: 760px; }
    .tp-hd { margin-top: var(--s-4); } .tp-hd__t { font-size: clamp(20px,5vw,26px); font-weight: 900; } .tp-hd__s { font-size: 12.5px; color: var(--ink-3); margin-top: 5px; line-height: 1.65; }
    .tp-info { display: flex; gap: 9px; align-items: flex-start; background: var(--gold-soft); border: 1px solid var(--gold-line); border-radius: var(--r-md); padding: 12px 14px; margin-top: var(--s-4); font-size: 12px; color: var(--ink-2); line-height: 1.65; }
    .tp-info svg { width: 17px; height: 17px; flex: none; margin-top: 1px; color: var(--gold-strong); }
    .tp-info b { color: var(--ink); }
    .tp-list { display: grid; gap: 11px; margin-top: var(--s-4); }
    .tp-card { display: flex; align-items: center; gap: 13px; border: 1px solid var(--line); border-radius: var(--r-lg); padding: 15px; text-decoration: none; color: var(--ink); }
    .tp-card:hover { border-color: var(--gold); background: var(--gold-soft); }
    .tp-card__badge { flex: none; min-width: 48px; height: 44px; border-radius: var(--r-md); background: var(--gold); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 900; padding: 0 8px; }
    .tp-card__b { flex: 1; min-width: 0; }
    .tp-card__t { font-size: 15px; font-weight: 900; }
    .tp-card__s { font-size: 11.5px; color: var(--ink-2); margin-top: 3px; line-height: 1.5; }
    .tp-card__go { flex: none; font-size: 12.5px; font-weight: 800; color: var(--gold-strong); white-space: nowrap; }
    .tp-empty { border: 1px solid var(--line); border-radius: var(--r-lg); padding: 30px 20px; text-align: center; color: var(--ink-3); font-size: 13px; line-height: 1.7; margin-top: var(--s-4); }
    .tp-note { font-size: 11px; color: var(--ink-3); line-height: 1.6; margin-top: 16px; }
  </style>
</head>
<body class="page">

  <header class="site-header">
    <div class="container site-header__inner">
      <a class="brand" href="home.html" aria-label="SalonPro ホーム"><span class="brand__logo">Salon<b>Pro</b></span></a>
      <nav class="header-actions">
        <a class="icon-btn" href="news.html" aria-label="お知らせ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></a>
        <a class="icon-btn" href="cart.html" aria-label="カート"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2.5 3h2.2l2.2 12.4a1.6 1.6 0 0 0 1.6 1.3h8.7a1.6 1.6 0 0 0 1.6-1.3L21.5 7H6"/></svg><span class="icon-btn__badge" id="cartBadge" hidden>0</span></a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tp-hd">
      <div class="tp-hd__t">メーカー添付</div>
      <div class="tp-hd__s">メーカーから貴社へ提供されている「添付（無償現品）」条件のブランドです。ブランドを選んで、条件どおりに発注できます。</div>
    </div>

    <div class="tp-info">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.4-3 7.7-7 9-4-1.3-7-4.6-7-9V6z"/><path d="m9 12 2 2 4-4"/></svg>
      <span>添付条件は<b>メーカーから会社（サロン）ごとに個別</b>に設定されています。条件に応じて<b>無料分（無償現品）が添付</b>されます（貴社のご負担はありません）。</span>
    </div>

    <div class="tp-list" id="tpList"></div>
  </main>

  <nav class="tabbar" aria-label="メインナビ">
    <div class="tabbar__inner">
      <a class="tab" href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11 12 4l8 7"/><path d="M6 10v10h12V10"/></svg><span class="tab__label">ホーム</span></a>
      <a class="tab" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="m21 21-4.3-4.3"/></svg><span class="tab__label">探す</span></a>
      <a class="tab" href="reorder.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a8 8 0 0 1 13.7-3.5L20 7"/><path d="M20 4v3h-3"/><path d="M20 16a8 8 0 0 1-13.7 3.5L4 17"/><path d="M4 20v-3h3"/></svg><span class="tab__label">再購入</span></a>
      <a class="tab" href="favorites.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 12.6 12 20l-7.5-7.4a5 5 0 1 1 7.1-7.1l.4.4.4-.4a5 5 0 1 1 7.1 7.1Z"/></svg><span class="tab__label">お気に入り</span></a>
      <a class="tab" href="mypage.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span class="tab__label">マイページ</span></a>
    </div>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="assets/js/catalog.js?v=25"></script>
  <script src="assets/js/data.js?v=25"></script>
  <script src="assets/js/store.js?v=25"></script>
  <script src="assets/js/components.js?v=25"></script>
  <script src="assets/js/nav.js?v=25"></script>
  <script>
    (function () {
      var list = document.getElementById('tpList');
      var camps = (SP.CAMPAIGNS || []).filter(function (c) { return c.kind === 'buyXgetY'; });
      var rows = camps.map(function (c) {
        var cond = SP.Store.salonBundleCond ? SP.Store.salonBundleCond(c.id) : { x: c.x, y: c.y, enabled: true };
        return { c: c, cond: cond };
      }).filter(function (r) { return r.cond.enabled !== false; });

      if (!rows.length) {
        list.innerHTML = '<div class="tp-empty">現在、添付条件のあるブランドはありません。<br>担当者にご相談ください。</div>';
      } else {
        list.innerHTML = rows.map(function (r) {
          var c = r.c, x = r.cond.x, y = r.cond.y;
          return '<a class="tp-card" href="campaigns.html?id=' + c.id + '">' +
            '<span class="tp-card__badge">' + x + '＋' + y + '</span>' +
            '<span class="tp-card__b"><span class="tp-card__t">' + c.line + '</span>' +
            '<span class="tp-card__s">' + (c.maker || '') + ' ・ ' + x + '本ごとに ' + y + '本 無料添付（価格は' + x + '本分）</span></span>' +
            '<span class="tp-card__go">組む ›</span></a>';
        }).join('');
      }

      (function () { var n = SP.Store.cartSummary().count + (SP.Store.giftCount ? SP.Store.giftCount() : 0), el = document.getElementById('cartBadge'); if (el) { el.textContent = n; el.hidden = n <= 0; } })();
    })();
  </script>
</body>
</html>
