<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>再購入｜SalonPro</title>
  <link rel="stylesheet" href="assets/css/tokens.css?v=65">
  <link rel="stylesheet" href="assets/css/base.css?v=65">
  <link rel="stylesheet" href="assets/css/components.css?v=65">
  <link rel="stylesheet" href="assets/css/home.css?v=65">
  <link rel="stylesheet" href="assets/css/pages.css?v=65">
  <link rel="stylesheet" href="assets/css/reorder.css?v=65">
</head>
<body class="page">

  <header class="site-header">
    <div class="container site-header__inner">
      <a class="brand" href="home.html" aria-label="SalonPro ホーム"><span class="brand__logo">Salon<b>Pro</b></span></a>
      <form class="header-search" id="searchForm" role="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="search" id="headerSearch" placeholder="商品名・ブランド・型番で検索" autocomplete="off" aria-label="商品を検索">
      </form>
      <nav class="header-actions">
        <a class="icon-btn" href="#" data-soon="お知らせ" aria-label="お知らせ"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg><span class="icon-btn__badge" id="notifBadge">2</span></a>
        <a class="icon-btn" href="cart.html" aria-label="カート"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2.5 3h2.2l2.2 12.4a1.6 1.6 0 0 0 1.6 1.3h8.7a1.6 1.6 0 0 0 1.6-1.3L21.5 7H6"/></svg><span class="icon-btn__badge" id="cartBadge" hidden>0</span></a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="page-hd">
      <h1 class="page-hd__title">再購入</h1>
      <p class="page-hd__sub">前回の注文や定番セットから、最短で再注文できます。</p>
    </div>

    <div class="ro-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      前回注文から約2週間が経過しています。そろそろ補充タイミングです。
    </div>

    <button class="btn btn--primary" id="repeatAll" style="width:100%;height:54px;font-size:var(--fs-16);gap:8px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px;height:20px"><path d="M4 8a8 8 0 0 1 13.7-3.5L20 7"/><path d="M20 4v3h-3"/><path d="M20 16a8 8 0 0 1-13.7 3.5L4 17"/><path d="M4 20v-3h3"/></svg>
      前回と同じ内容で再注文（<span id="repeatAllCount">7</span>点）
    </button>
    <a href="barcode.html" class="btn btn--ghost" style="width:100%;margin-top:8px;gap:8px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px"><path d="M3 5v14M7 5v14M11 5v14M15 5v14M19 5v14"/></svg>
      バーコードで発注
    </a>

    <!-- 前回注文 -->
    <section class="sec">
      <div class="sec__head"><h2 class="sec__title">前回の注文（2025/05/10）</h2></div>
      <div class="lcard">
        <div id="prevOrderList"></div>
        <div class="ro-foot">
          <span class="ro-foot__sum">選択 <b id="prevSel">0</b> 点</span>
          <button class="btn btn--primary" id="prevBulk">まとめてカートに入れる</button>
        </div>
      </div>
    </section>

    <!-- 定番セット -->
    <section class="sec">
      <div class="sec__head"><h2 class="sec__title">定番セット</h2><a class="sec__more" href="#" data-soon="セット管理">編集<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></a></div>
      <div id="setList"></div>
    </section>

    <!-- 発注テンプレート（保存したカート） -->
    <section class="sec" id="tplSec" hidden>
      <div class="sec__head"><h2 class="sec__title">発注テンプレート</h2><span style="font-size:11.5px;color:var(--ink-3)">カートを保存→ワンタップ投入</span></div>
      <div id="tplList"></div>
    </section>

    <!-- そろそろ補充（消耗予測） -->
    <section class="sec">
      <div class="sec__head"><h2 class="sec__title">そろそろ補充（消耗予測）</h2></div>
      <div class="lcard"><div id="replenishList"></div></div>
    </section>

    <!-- よく買う商品 -->
    <section class="sec">
      <div class="sec__head"><h2 class="sec__title">よく買う商品</h2><a class="sec__more" href="index.html">すべて見る<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></a></div>
      <div class="h-scroll" id="freqScroll"></div>
    </section>
  </main>

  <nav class="tabbar" aria-label="メインナビ">
    <div class="tabbar__inner">
      <a class="tab" href="home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11 12 4l8 7"/><path d="M6 10v10h12V10"/></svg><span class="tab__label">ホーム</span></a>
      <a class="tab" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="m21 21-4.3-4.3"/></svg><span class="tab__label">探す</span></a>
      <a class="tab is-active" href="reorder.html" aria-current="page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a8 8 0 0 1 13.7-3.5L20 7"/><path d="M20 4v3h-3"/><path d="M20 16a8 8 0 0 1-13.7 3.5L4 17"/><path d="M4 20v-3h3"/></svg><span class="tab__label">再購入</span><span class="icon-btn__badge" id="tabCartBadge" hidden>0</span></a>
      <a class="tab" href="favorites.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 12.6 12 20l-7.5-7.4a5 5 0 1 1 7.1-7.1l.4.4.4-.4a5 5 0 1 1 7.1 7.1Z"/></svg><span class="tab__label">お気に入り</span></a>
      <a class="tab" href="mypage.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span class="tab__label">マイページ</span></a>
    </div>
  </nav>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="assets/js/catalog.js?v=65"></script>
  <script src="assets/js/data.js?v=65"></script>
  <script src="assets/js/store.js?v=65"></script>
  <script src="assets/js/components.js?v=65"></script>
  <script src="assets/js/nav.js?v=65"></script>
  <script src="assets/js/reorder.js?v=65"></script>
  <script>
    (function () {
      var Store = SP.Store, yen = SP.fmtYen || function (n) { return '¥' + (n || 0).toLocaleString(); };
      var toast = function (m) { if (window.SP_toast) SP_toast(m); };
      var prod = function (id) { return (SP.DATA.products || []).find(function (p) { return p.id === id; }); };
      function render() {
        var tpls = Store.getTemplates ? Store.getTemplates() : [];
        var sec = document.getElementById('tplSec'), host = document.getElementById('tplList');
        if (!tpls.length) { sec.hidden = true; return; }
        sec.hidden = false;
        host.innerHTML = tpls.map(function (t) {
          var items = (t.items || []).map(function (it) { return prod(it.id) ? { p: prod(it.id), qty: it.qty } : null; }).filter(Boolean);
          var pts = items.reduce(function (s, x) { return s + x.qty; }, 0);
          var total = items.reduce(function (s, x) { return s + x.p.price * x.qty; }, 0);
          var names = items.slice(0, 3).map(function (x) { return x.p.name; }).join(' / ') + (items.length > 3 ? ' ほか' : '');
          return '<div style="border:1px solid var(--line);border-radius:var(--r-lg);padding:13px 15px;margin-bottom:10px">' +
            '<div style="display:flex;align-items:center;gap:8px"><b style="font-size:14px">' + t.name + '</b>' +
            '<span style="font-size:11px;color:var(--ink-3)">' + items.length + '品目・' + pts + '点・' + yen(total) + '</span>' +
            '<button data-tpl-del="' + t.id + '" style="margin-left:auto;background:none;border:0;color:var(--ink-3);font-size:11.5px;cursor:pointer;text-decoration:underline">削除</button></div>' +
            '<div style="font-size:11.5px;color:var(--ink-3);margin:4px 0 10px;line-height:1.5">' + (names || '—') + '</div>' +
            '<button class="btn btn--primary btn--block" data-tpl-add="' + t.id + '" style="height:44px">このテンプレをカートに入れる</button></div>';
        }).join('');
      }
      document.getElementById('tplList').addEventListener('click', function (e) {
        var add = e.target.closest('[data-tpl-add]'), del = e.target.closest('[data-tpl-del]');
        if (add) { var n = Store.applyTemplate(add.dataset.tplAdd); toast(n + '商品をカートに入れました'); }
        else if (del) { Store.removeTemplate(del.dataset.tplDel); toast('テンプレートを削除しました'); render(); }
      });
      Store.subscribe && Store.subscribe(render);
      render();
    })();
  </script>
</body>
</html>
