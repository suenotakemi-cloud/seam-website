name: Build finder (precompile JSX)

# finder の JSX ソースが変わったら、Babelで素のJSへ事前コンパイルして commit する。
# これにより本番 finder.html はブラウザ内 babel.min.js(2.7MB) を読まずに済む。
on:
  push:
    paths:
      - 'js/finder-app.jsx'
      - '.github/scripts/build-finder.js'
      - '.github/workflows/build-finder.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Babel インストール
        run: npm init -y && npm i --no-save @babel/core@^7 @babel/preset-react@^7

      - name: finder-app.jsx を事前コンパイル
        run: node .github/scripts/build-finder.js

      - name: 生成物をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/finder-app.js
          git diff --staged --quiet && { echo "no change"; exit 0; }
          git commit -m "build: precompile finder-app.js [skip ci]"
          git pull --rebase origin main
          git push
