name: 毎月ランキング自動更新

on:
  schedule:
    # 毎月1日 午前9時（日本時間）= UTC 0:00
    - cron: '0 0 1 * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  update-ranking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: salon.town からランキング取得
        id: fetch
        env:
          SALON_TOWN_MAIL: ${{ secrets.SALON_TOWN_MAIL }}
          SALON_TOWN_PASS: ${{ secrets.SALON_TOWN_PASS }}
        run: node .github/scripts/fetch-ranking.js

      - name: index.html のランキングデータを更新
        run: node .github/scripts/update-index.js

      - name: 変更をコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "ranking: auto-update $(date '+%Y.%m')"
          git push
