<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>ページが見つかりません | SEAM — Global Hair Care Select Shop</title>
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      display: flex; align-items: center; justify-content: center;
      background: #FBF9F5;
      color: #2B2926;
      font-family: "Shippori Mincho", "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", serif;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 480px; }
    .brand {
      font-size: 13px; letter-spacing: 0.42em; text-transform: uppercase;
      color: #9A7438;
    }
    .rule { width: 56px; height: 1px; background: rgba(154,116,56,0.5); margin: 22px auto; }
    .code {
      font-size: 15px; letter-spacing: 0.3em; color: rgba(43,41,38,0.45);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    h1 { font-size: 22px; font-weight: 500; letter-spacing: 0.06em; margin-top: 14px; line-height: 1.7; }
    p.lead { font-size: 13.5px; line-height: 2.0; color: rgba(43,41,38,0.7); margin-top: 14px; }
    .links { margin-top: 34px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
    .links a {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 240px; padding: 13px 26px;
      font-size: 13.5px; letter-spacing: 0.08em; text-decoration: none;
      border-radius: 999px; transition: opacity .2s ease;
    }
    .links a:hover { opacity: 0.85; }
    .primary { background: #B57C5A; color: #fff; }
    .ghost { border: 1px solid rgba(43,41,38,0.25); color: #2B2926; background: #fff; }
    .foot { margin-top: 40px; font-size: 11px; letter-spacing: 0.18em; color: rgba(43,41,38,0.4); }
  </style>
</head>
<body>
  <main class="wrap">
    <p class="brand">SEAM</p>
    <div class="rule" aria-hidden="true"></div>
    <p class="code">— 404 —</p>
    <h1>お探しのページが見つかりません</h1>
    <p class="lead">
      ページが移動したか、アドレスが変更された可能性があります。<br />
      下記より、目的のページへお進みください。
    </p>
    <nav class="links">
      <a class="primary" href="/">トップページへ</a>
      <a class="ghost" href="/finder">髪質診断をはじめる</a>
      <a class="ghost" href="/shop">店舗を探す</a>
    </nav>
    <p class="foot">GLOBAL HAIR CARE SELECT SHOP</p>
  </main>
</body>
</html>
