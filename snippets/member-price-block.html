<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SEAM Member Price Block — 組み込みスニペット</title>

  <!--
  ============================================================================
   SEAM Member Price Block — スタンドアロン版
  ============================================================================
   このファイル単独でブラウザで開くと、メンバー価格カードのプレビューが見られます。

   ▼ 他プロジェクトに組み込むときの3パターン
   ──────────────────────────────────────────────
   1. React (Tailwind使用) の場合
      → 下の <MemberPriceBlock> コンポーネントをそのまま JSX としてコピー
      → tailwind.config.js に「Tailwind 設定追記」セクションの内容を追加
   2. プレーン HTML/CSS の場合
      → 「Vanilla HTML 版」セクションの <article> をコピー
      → 「Vanilla CSS 版」セクションの <style> をコピー
   3. このページ内のサンプルを動かして確認する場合
      → そのままブラウザで開く（CDN経由でReact+Tailwindが読み込まれます）
  ============================================================================
  -->

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    /* ─── Tailwind 設定追記 ─────────────────────────────────────────────────
       Tailwind 設定（カスタムカラー・トラッキング・フォント）。
       既存プロジェクトに同名キーがある場合は、必要な値だけマージしてください。 */
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // SEAM ブランドパレット
            ink:      '#1a1815',  // 本文・見出し
            charcoal: '#3d3833',  // セカンダリテキスト
            cream:    '#f9f5ed',  // 背景アクセント
            ivory:    '#fbf8f1',  // ベース背景
            line:     '#e6e0d4',  // 罫線
            mocha:    '#6b574a',  // やや暗いブラウン
            gold:     '#b8945a',  // アクセント（メンバー価格ラベル）
            goldLight:'#d7bb88',
          },
          fontFamily: {
            serif:   ['"Noto Serif JP"', 'Cormorant Garamond', 'serif'],
            mono:    ['"JetBrains Mono"', 'monospace'],
            display: ['"Cormorant Garamond"', 'serif'],
          },
          letterSpacing: {
            widest2: '0.18em',   // ラベル類で多用
          },
        },
      },
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+JP:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    body { background: #fbf8f1; }
  </style>
</head>
<body class="min-h-screen text-ink">
  <div id="root" class="mx-auto max-w-3xl px-5 sm:px-8 py-12"></div>

  <!-- ────────────────────────────────────────────────────────────────────
       React 18 + Babel (デモ用 CDN) — 本番組み込み時は不要
       ──────────────────────────────────────────────────────────────────── -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    /* =====================================================================
       <MemberPriceBlock> — 本体コンポーネント
       =====================================================================
       公式サイトに遷移する、価格を隠したメンバー価格訴求ブロック。

       Props:
         href        ─ 公式サイトURL（必須・各商品ごとに切り替え）
         sizes       ─ サイズラベルの配列。例: ['250mL', '500mL', '1L パック']
                       size 文字列単体でもOK（内部で配列化）
         noteText    ─ サブテキスト（任意・既定: 価格は会員登録後にご確認いただけます）
         className   ─ 外側に追加するクラス（任意）
    ===================================================================== */
    function MemberPriceBlock({ href, sizes, noteText, className = '' }) {
      const sizeList = Array.isArray(sizes) ? sizes : (sizes ? [sizes] : []);
      if (sizeList.length === 0) return null;
      const note = noteText || '価格は会員登録後にご確認いただけます';
      return (
        <a
          href={href}
          target="_blank"
          rel="noopener noreferrer"
          className={
            'group block border border-gold/40 ' +
            'bg-gradient-to-r from-cream/30 via-white to-cream/30 ' +
            'px-4 py-3 rounded-[2px] hover:border-gold transition-colors ' +
            'no-print ' + className
          }
        >
          <div className="flex items-center justify-between gap-3">
            <div className="min-w-0">
              {/* ─ ¥ + ー SEAM MEMBER PRICE ー ─ */}
              <div className="flex items-baseline gap-2">
                <span className="font-serif text-[18px] sm:text-[20px] text-gold leading-none">¥</span>
                <span className="font-mono tracking-widest2 text-[10px] uppercase text-gold whitespace-nowrap">
                  ー SEAM MEMBER PRICE ー
                </span>
              </div>
              {/* ─ 容量表記（複数サイズは / 区切り） ─ */}
              <div className="mt-1.5 flex items-baseline gap-1.5 flex-wrap">
                <span className="font-serif text-[15px] sm:text-[16px] text-ink leading-snug">
                  {sizeList.join(' / ')}
                </span>
              </div>
              {/* ─ サブテキスト（来店誘導） ─ */}
              <div className="mt-1 text-[10.5px] text-charcoal/60 leading-relaxed">
                {note}
              </div>
            </div>
            {/* ─ 「公式へ ↗」 ─ */}
            <span className="inline-flex items-center gap-1.5 font-mono tracking-widest2 text-[10px] uppercase text-ink shrink-0 group-hover:text-gold transition-colors self-center">
              <span>公式へ</span>
              <span className="text-gold group-hover:translate-x-0.5 transition-transform">↗</span>
            </span>
          </div>
        </a>
      );
    }

    /* =====================================================================
       Demo — 実際の SEAM 商品データでの表示サンプル
       本番組み込み時は不要。コピペ用の使用例。
    ===================================================================== */
    const samples = [
      {
        title: 'オージュア クエンチ シャンプー',
        brand: 'AUJUA',
        line:  'クエンチ',
        href:  'https://www.aujua.com/products/quench.php',
        sizes: ['250mL', '500mL', '1L パック'],
      },
      {
        title: 'アルタイム R シャンプー',
        brand: 'WELLA PROFESSIONALS',
        line:  'アルタイム リペア',
        href:  'https://www.wella.co.jp/ultime/products/repair/shampoo/',
        sizes: ['250mL'],
      },
      {
        title: 'ファイバープレックス ボンド シャンプー',
        brand: 'SCHWARZKOPF',
        line:  'ファイバープレックス',
        href:  'https://www.schwarzkopf-professional.com/jp/ja/care/fibreplex.html',
        sizes: ['250mL', '550mL'],
      },
    ];

    function App() {
      return (
        <main>
          <header className="mb-10 border-b border-line pb-6">
            <p className="font-mono tracking-widest2 text-[11px] uppercase text-gold">— SEAM Components</p>
            <h1 className="mt-3 font-serif text-2xl sm:text-3xl text-ink">
              メンバー価格ブロック
            </h1>
            <p className="mt-3 text-[12.5px] sm:text-[13px] text-charcoal/70 leading-relaxed max-w-xl">
              価格は隠し、容量と「ー SEAM MEMBER PRICE ー」表記で来店登録を促す、商品カード用の組み込みブロック。
              クリックで各商品の公式サイトへ遷移します。
            </p>
          </header>

          <section className="space-y-6">
            {samples.map((s, i) => (
              <article key={i} className="bg-white border border-line p-5 sm:p-6 rounded-[2px]">
                <p className="font-mono tracking-widest2 text-[10px] uppercase text-charcoal/55">
                  {s.brand} <span className="mx-1.5 text-charcoal/30">·</span> {s.line}
                </p>
                <h3 className="mt-1 font-serif text-[17px] sm:text-[18px] text-ink leading-snug">
                  {s.title}
                </h3>
                <MemberPriceBlock
                  href={s.href}
                  sizes={s.sizes}
                />
              </article>
            ))}
          </section>

          {/* ─ 組み込みガイド ─ */}
          <section className="mt-14 border-t border-line pt-6">
            <p className="font-mono tracking-widest2 text-[10px] uppercase text-gold">— Usage</p>
            <h2 className="mt-2 font-serif text-xl text-ink">使い方</h2>
            <pre className="mt-4 bg-cream/40 border border-line p-4 text-[11.5px] leading-[1.7] text-charcoal/85 overflow-x-auto rounded-[2px]">
{`<MemberPriceBlock
  href="https://www.aujua.com/products/quench.php"
  sizes={['250mL', '500mL', '1L パック']}
/>

// 単一サイズは文字列でも可
<MemberPriceBlock
  href="https://example.com/product"
  sizes="120g"
/>

// サブテキストの差し替え
<MemberPriceBlock
  href="https://example.com/product"
  sizes={['250mL']}
  noteText="店頭で会員価格をお見積もりします"
/>`}
            </pre>

            <p className="mt-5 font-mono tracking-widest2 text-[10px] uppercase text-gold">— Required Tailwind Config</p>
            <pre className="mt-2 bg-cream/40 border border-line p-4 text-[11.5px] leading-[1.7] text-charcoal/85 overflow-x-auto rounded-[2px]">
{`theme: {
  extend: {
    colors: {
      ink:      '#1a1815',
      charcoal: '#3d3833',
      cream:    '#f9f5ed',
      line:     '#e6e0d4',
      gold:     '#b8945a',
    },
    fontFamily: {
      serif: ['"Noto Serif JP"', 'serif'],
      mono:  ['"JetBrains Mono"', 'monospace'],
    },
    letterSpacing: {
      widest2: '0.18em',
    },
  },
}`}
            </pre>
          </section>
        </main>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>


  <!--
  ============================================================================
   Vanilla HTML 版（React を使わない場合のコピペ用）
   ──────────────────────────────────────────────────────────────────────────

   <a
     href="https://www.aujua.com/products/quench.php"
     target="_blank" rel="noopener noreferrer"
     class="member-price-block"
   >
     <div class="member-price-inner">
       <div class="member-price-main">
         <div class="member-price-headline">
           <span class="member-price-yen">¥</span>
           <span class="member-price-label">ー SEAM MEMBER PRICE ー</span>
         </div>
         <div class="member-price-sizes">250mL / 500mL / 1L パック</div>
         <div class="member-price-note">価格は会員登録後にご確認いただけます</div>
       </div>
       <span class="member-price-link">
         <span>公式へ</span>
         <span class="member-price-arrow">↗</span>
       </span>
     </div>
   </a>
  ============================================================================
   Vanilla CSS 版（上の HTML 用スタイル）
   ──────────────────────────────────────────────────────────────────────────

   <style>
     .member-price-block {
       display: block;
       border: 1px solid rgba(184, 148, 90, 0.4);
       background: linear-gradient(to right,
         rgba(249, 245, 237, 0.3), #ffffff, rgba(249, 245, 237, 0.3));
       padding: 12px 16px;
       border-radius: 2px;
       text-decoration: none;
       color: #1a1815;
       transition: border-color 200ms;
     }
     .member-price-block:hover { border-color: #b8945a; }
     .member-price-inner {
       display: flex; align-items: center; justify-content: space-between; gap: 12px;
     }
     .member-price-main { min-width: 0; }
     .member-price-headline {
       display: flex; align-items: baseline; gap: 8px;
     }
     .member-price-yen {
       font-family: "Noto Serif JP", serif;
       font-size: 20px; color: #b8945a; line-height: 1;
     }
     .member-price-label {
       font-family: "JetBrains Mono", monospace;
       letter-spacing: 0.18em;
       text-transform: uppercase;
       font-size: 10px; color: #b8945a; white-space: nowrap;
     }
     .member-price-sizes {
       margin-top: 6px;
       font-family: "Noto Serif JP", serif;
       font-size: 16px; color: #1a1815; line-height: 1.4;
     }
     .member-price-note {
       margin-top: 4px;
       font-size: 10.5px; color: rgba(61, 56, 51, 0.6); line-height: 1.5;
     }
     .member-price-link {
       display: inline-flex; align-items: center; gap: 6px;
       font-family: "JetBrains Mono", monospace;
       letter-spacing: 0.18em;
       text-transform: uppercase;
       font-size: 10px; color: #1a1815;
       flex-shrink: 0; align-self: center;
       transition: color 200ms;
     }
     .member-price-block:hover .member-price-link { color: #b8945a; }
     .member-price-arrow {
       color: #b8945a; transition: transform 200ms;
     }
     .member-price-block:hover .member-price-arrow {
       transform: translateX(2px);
     }
   </style>
  ============================================================================
  -->
</body>
</html>
