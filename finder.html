  <style>
    :root { color-scheme: light; }
    /* 見出しの行分けを自動バランス＋本文の孤立行防止＋日本語の語中折り返し防止 */
    h1, h2, h3 { text-wrap: balance; }
    p { text-wrap: pretty; word-break: auto-phrase; }
    html {
      background: #F5F1EA;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    body {
      background: #F5F1EA;
      font-family: 'Noto Sans JP', 'Inter', system-ui, sans-serif;
      color: #1F1D1A;
      font-weight: 400;
      letter-spacing: 0.005em;
      line-height: 1.85;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      font-feature-settings: "palt"; /* 和文プロポーショナル — 行間が美しくなる */
      overscroll-behavior-y: none;
      /* Sticky底部CTAバー (68px) + iPhone safe-area-inset-bottom 分を予約 */
      padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px));
    }
    @media (min-width: 640px) { body { padding-bottom: 0; } }

    /* iOS tap highlight */
    a, button { -webkit-tap-highlight-color: rgba(184,148,90,0.12); }

    /* ─── Apple HIG: prefers-reduced-motion (a11y) ─── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.05ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* ─── Apple HIG: タッチターゲット最小サイズ ─── */
    @media (hover: none) and (pointer: coarse) {
      button, a[role="button"], a.btn,
      input[type="checkbox"], input[type="radio"],
      .seam-tap-target {
        min-height: 44px;
      }
    }

    /* ─── Apple HIG: input フォーカスズーム回避 (font-size ≥ 16px) ─── */
    input[type="text"], input[type="search"], input[type="email"],
    input[type="number"], input[type="tel"], select, textarea {
      font-size: 16px !important;
    }

    /* ─── iOS Native スクロール感 ─── */
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    * { -webkit-overflow-scrolling: touch; }

    /* ─── Apple HIG: スマホでの本文最小サイズ底上げ ─── */
    /* mono uppercase ラベルは tracking で実視認が下がるため除外 */
    @media (max-width: 720px) {
      /* 11px → 12px に底上げ(本文として読みやすい最小) */
      p.text-\[11px\]:not(.font-mono),
      p.text-\[11\.5px\]:not(.font-mono),
      div.text-\[11px\]:not(.font-mono),
      div.text-\[11\.5px\]:not(.font-mono),
      span.text-\[11px\]:not(.font-mono):not(.tracking-widest):not(.tracking-widest2):not(.tracking-widest3),
      span.text-\[11\.5px\]:not(.font-mono):not(.tracking-widest):not(.tracking-widest2):not(.tracking-widest3),
      li.text-\[11px\]:not(.font-mono),
      li.text-\[11\.5px\]:not(.font-mono) {
        font-size: 12.5px !important;
        line-height: 1.7 !important;
      }
      /* 商品説明・カードコピー底上げ */
      p.text-\[12px\]:not(.font-mono),
      p.text-\[12\.5px\]:not(.font-mono) {
        font-size: 13.5px !important;
        line-height: 1.75 !important;
      }
    }

    /* ─── Apple-style 商品カード active 押下感 ─── */
    article[class*="bg-white"]:active,
    article[class*="border-line"]:active {
      transform: scale(0.995);
      transition: transform 0.12s ease-out;
    }

    /* ─── 全装飾SVGに自動aria-hidden付与 ─── */
    svg:not([aria-label]):not([role="img"]) { /* 装飾 */ }

    /* ═══════════════════════════════════════════════════════════════
       App-Fit Container — finderの全画面を「アプリ画面」サイズに固定
       ═══════════════════════════════════════════════════════════════
       全画面（Home / Quiz / Result / Collection / QuizDeep）が、
       モバイルアプリのフレーム内に収まるように max-width を制限。
       スマホでは全画面、デスクトップではセンタリングしてアプリ枠表示。
       ─────────────────────────────────────────────────────────────── */
    :root {
      --app-max-width: 480px;
      --app-frame-color: #EFE6D8;
    }
    #root {
      max-width: var(--app-max-width);
      margin: 0 auto;
      min-height: 100vh;
      min-height: 100svh;
      background: #FAF8F4;
      position: relative;
      overflow-x: hidden;
    }
    /* デスクトップ: アプリ外側のフレーム色を表示 */
    @media (min-width: 720px) {
      html, body {
        background: var(--app-frame-color);
      }
      #root {
        box-shadow: 0 0 80px rgba(26,24,21,0.06), 0 0 1px rgba(184,148,90,0.2);
      }
    }
    /* Fixed要素も app-max-width 内に収まるように center 配置 */
    .fixed.inset-x-0 {
      max-width: var(--app-max-width);
      left: 50% !important;
      right: auto !important;
      transform: translateX(-50%);
      width: 100%;
    }
    /* Modal等 fixed.inset-0 (full-screen overlay) も同様に */
    .fixed.inset-0 {
      max-width: var(--app-max-width);
      left: 50% !important;
      right: auto !important;
      transform: translateX(-50%);
      width: 100%;
    }
    /* 1画面ローダー(z-9100)等の超高 z-index も同様 */
    @media (min-width: 720px) {
      /* スクリーンの中央に枠 */
      body::before {
        content: '';
        position: fixed;
        top: 0; bottom: 0;
        left: 50%; transform: translateX(-50%);
        width: var(--app-max-width);
        pointer-events: none;
        border-left: 1px solid rgba(184,148,90,0.12);
        border-right: 1px solid rgba(184,148,90,0.12);
        z-index: 1;
      }
    }

    /* ─── 黒CTA全廃: bg-ink text-ivory → SEAM warm brown #B57C5A ─── */
    /* nav 等の構造要素は除外。CTA系のアンカー/ボタンのみ対象。 */
    a.bg-ink.text-ivory,
    button.bg-ink.text-ivory,
    a.bg-ink:not(.bg-ink\/60):not(.bg-ink\/80),
    button.bg-ink:not(.bg-ink\/60):not(.bg-ink\/80) {
      background-color: #B57C5A !important;
      color: #ffffff !important;
    }
    a.bg-ink.text-ivory:hover,
    button.bg-ink.text-ivory:hover,
    a.bg-ink:not(.bg-ink\/60):not(.bg-ink\/80):hover,
    button.bg-ink:not(.bg-ink\/60):not(.bg-ink\/80):hover {
      background-color: #9F6A4B !important;
    }
    a.bg-ink.text-ivory:active,
    button.bg-ink.text-ivory:active {
      background-color: #9F6A4B !important;
    }
    /* CTA内ピル/丸 — 黒→白 反転 */
    .bg-ink .bg-ivory.text-ink,
    .bg-ink .bg-ivory {
      background-color: #ffffff !important;
      color: #B57C5A !important;
    }
    /* hover:bg-charcoal も同調 */
    .hover\:bg-charcoal:hover { background-color: #9F6A4B !important; }
    .active\:bg-charcoal:active { background-color: #9F6A4B !important; }
    /* バッジ/ラベルなど小さい bg-ink は黒のまま許容（章バッジ等） */
    /* ─────────────────────────────────────────────
       ★ タイポグラフィの統一: Serif は H1〜H2 主役だけ
       小さい見出し/カード見出しは sans (Noto Sans JP) に
       ───────────────────────────────────────────── */
    .font-serif { letter-spacing: 0.005em; font-weight: 400; }
    .font-display { letter-spacing: 0.01em; }
    /* mono ラベルは weight 控えめ + tracking 抑え */
    .font-mono { font-weight: 400; letter-spacing: 0.04em; }
    .font-mono.tracking-widest2 { letter-spacing: 0.14em; }
    /* ★ 小サイズ Serif は読みづらいので sans へ自動降格 */
    h4.font-serif, h5.font-serif, h6.font-serif,
    .font-serif.text-\[12px\], .font-serif.text-\[12\.5px\],
    .font-serif.text-\[13px\], .font-serif.text-\[13\.5px\],
    .font-serif.text-\[14px\], .font-serif.text-\[14\.5px\],
    .font-serif.text-\[15px\], .font-serif.text-\[15\.5px\] {
      font-family: 'Noto Sans JP', 'Inter', system-ui, sans-serif !important;
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .bg-finder {
      background:
        radial-gradient(40% 28% at 88% -6%, rgba(184,148,90,0.08) 0%, rgba(184,148,90,0) 70%),
        radial-gradient(36% 26% at -6% 102%, rgba(60,55,48,0.05) 0%, rgba(60,55,48,0) 70%),
        linear-gradient(180deg, #FAF8F4 0%, #F2EEE6 100%);
    }

    /* Editorial graph paper overlay — extremely subtle (デスクトップ限定でモバイル負荷削減) */
    @media (min-width: 720px) {
      .bg-finder::before {
        content: "";
        position: fixed; inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(to right, rgba(60,55,48,0.025) 1px, transparent 1px);
        background-size: 96px 96px;
        mask-image: linear-gradient(180deg, rgba(0,0,0,0.6), rgba(0,0,0,0.1));
        -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,0.6), rgba(0,0,0,0.1));
        z-index: 0;
      }
    }

    .hairline { background: linear-gradient(90deg, transparent, #B8945A 50%, transparent); height: 1px; }

    /* Game-style Profile Cards — タロット/ガチャ風 */
    .game-card {
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), box-shadow 0.35s ease;
      will-change: transform;
    }
    .game-card:hover {
      transform: translateY(-4px) scale(1.005);
    }
    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(120% 80% at 0% 0%, rgba(255,255,255,0.5), transparent 60%);
      pointer-events: none;
      border-radius: inherit;
      z-index: 1;
    }
    .game-card > * { position: relative; z-index: 2; }
    @media (prefers-reduced-motion: reduce) {
      .game-card, .game-card:hover { transition: none; transform: none; }
    }

    /* Quiz question transitions */
    @keyframes seamQuizIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-quiz { animation: seamQuizIn 420ms cubic-bezier(0.22, 0.61, 0.36, 1) both; }

    @keyframes seamMilestonePulse {
      0%   { transform: scale(1); opacity: 0.6; }
      50%  { transform: scale(1.4); opacity: 0; }
      100% { transform: scale(1.4); opacity: 0; }
    }
    .milestone-pulse {
      position: relative;
    }
    .milestone-pulse::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 9999px;
      border: 1px solid #B8945A;
      animation: seamMilestonePulse 1400ms ease-out;
      pointer-events: none;
    }

    @keyframes seamProgressFill {
      from { width: 0%; }
    }
    .progress-anim { animation: seamProgressFill 600ms cubic-bezier(0.22, 0.61, 0.36, 1) both; }

    /* Karte animal reveal */
    @keyframes karte-mark-in {
      0%   { opacity: 0; transform: scale(0.86); filter: blur(2px); }
      60%  { opacity: 0.9; filter: blur(0); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes karte-glow {
      0%, 100% { opacity: 0.18; }
      50%      { opacity: 0.35; }
    }
    @keyframes karte-evolve-ring {
      0%   { transform: scale(0.6); opacity: 0; }
      40%  { opacity: 0.55; }
      100% { transform: scale(2.0); opacity: 0; }
    }
    .karte-mark-anim { animation: karte-mark-in 1100ms cubic-bezier(0.22, 0.61, 0.36, 1) both; }
    @keyframes karte-target-fade {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes karte-evo-origin-out {
      0%   { opacity: 1; transform: scale(1) translateX(0); }
      100% { opacity: 0.35; transform: scale(0.7) translateX(-12px); }
    }
    @keyframes karte-evo-goal-in {
      0%   { opacity: 0; transform: scale(0.85) translateX(12px); filter: blur(2px); }
      60%  { opacity: 0.95; filter: blur(0); }
      100% { opacity: 1; transform: scale(1) translateX(0); }
    }
    @keyframes karte-evo-arrow {
      0%   { opacity: 0; transform: scaleX(0); transform-origin: left center; }
      50%  { opacity: 0.7; transform: scaleX(1); }
      100% { opacity: 0.45; }
    }
    .karte-evo-origin { animation: karte-evo-origin-out 1600ms cubic-bezier(0.22, 0.61, 0.36, 1) 800ms both; }
    .karte-evo-goal   { animation: karte-evo-goal-in   1800ms cubic-bezier(0.22, 0.61, 0.36, 1) 1100ms both; }
    .karte-evo-arrow  { animation: karte-evo-arrow     1400ms ease-out 600ms both; }
    .karte-mark-accent { position: relative; }
    .karte-mark-accent::before,
    .karte-mark-accent::after {
      content: ''; position: absolute; inset: 0;
      border-radius: 9999px; border: 1px solid #B8945A;
      pointer-events: none;
    }
    .karte-mark-accent::before { animation: karte-evolve-ring 2400ms ease-out 200ms infinite; }
    .karte-mark-accent::after  { animation: karte-evolve-ring 2400ms ease-out 1300ms infinite; }
    .karte-mark-glow {
      position: absolute; inset: -16%;
      background: radial-gradient(circle, rgba(217,190,147,0.30) 0%, rgba(217,190,147,0) 65%);
      border-radius: 9999px; pointer-events: none;
      animation: karte-glow 4200ms ease-in-out infinite;
    }

    /* Editorial divider with center mark */
    .hairline-center {
      display: flex; align-items: center; gap: 12px;
      color: #B8945A;
    }
    .hairline-center::before, .hairline-center::after {
      content: ""; flex: 1; height: 1px; background: #E2DDD3;
    }

    .seam-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;

      background: #E2DDD3;

    }
    .seam-slider::-webkit-slider-thumb {

    .snap-x-row > * { scroll-snap-align: center; }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    /* ===== VISIT SEAM — Apple-style ambient glow ===== */
    @keyframes visitGlow {
      0%, 100% { opacity: 0.55; transform: translate3d(0,0,0) scale(1); }
      50%      { opacity: 1;    transform: translate3d(0,-10px,0) scale(1.05); }

    /* ═══════════════════════════════════════════════════════════════

    /* Sparkle (subtle gold dot pulse) */
    @keyframes karteSparkle {
      0%, 100% { opacity: 0.4; transform: scale(0.9); }
      50%      { opacity: 1;   transform: scale(1.15); }
    }
    .karte-sparkle { animation: karteSparkle 2.6s ease-in-out infinite; transform-origin: center; display:inline-block; }

    /* Live counter — number gentle drift */
    @keyframes karteLiveDot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(168,116,86,0.45); }
      50%      { box-shadow: 0 0 0 6px rgba(168,116,86,0); }
    }
    .karte-live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #A87456;
      animation: karteLiveDot 1.8s ease-out infinite;
      flex-shrink: 0;
    }

    /* Character ticker — horizontal infinite drift */
    @keyframes karteTicker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }
    .karte-ticker-track {
      display: flex; gap: 12px;
      animation: karteTicker 50s linear infinite;
      will-change: transform;
    }
    .karte-ticker:hover .karte-ticker-track { animation-play-state: paused; }

    /* Character chip — Apple Photos memory tile vibe */
    .karte-char-chip {
      width: 64px; height: 84px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      border-radius: 14px;
      background: linear-gradient(180deg, #F0EBE2 0%, #EAE0D2 100%);
      box-shadow: 0 1px 3px rgba(26,24,21,0.05), inset 0 0 0 1px rgba(184,148,90,0.10);
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(.2,.7,.2,1), box-shadow 0.3s;
    }
    .karte-char-chip:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 6px 18px rgba(26,24,21,0.10), inset 0 0 0 1px rgba(168,116,86,0.30);
    }
    .karte-char-chip img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center 25%;
    }
    .karte-char-chip .karte-char-label {
      position: absolute; bottom: 4px; left: 0; right: 0;
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 8px;
      letter-spacing: 0.12em;
      font-weight: 600;
      color: #ffffff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    }

    /* CTA hover bounce — subtle Aesop-y, not cartoon */
    @keyframes karteCtaHover {
      0%   { transform: translateY(0); }
      50%  { transform: translateY(-2px); }
      100% { transform: translateY(0); }
    }
    .karte-cta-playful:hover { animation: karteCtaHover 0.6s ease-in-out 1; }

    /* Share chips */
    .karte-share-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      border-radius: 100px;
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(168,116,86,0.18);
      font-family: 'Inter', sans-serif;
      font-size: 10px; letter-spacing: 0.1em;
      font-weight: 500;
      color: #2E2C28;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }
    .karte-share-chip:hover {
      background: rgba(255,255,255,0.95);
      border-color: rgba(168,116,86,0.45);
      transform: translateY(-1px);
    }
    .karte-share-chip svg { width: 12px; height: 12px; }

    /* Today bar — soft app strip */
    .karte-today-bar {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 14px;
      border-radius: 100px;
      background: linear-gradient(90deg, rgba(255,255,255,0.5) 0%, rgba(234,224,210,0.7) 100%);
      border: 1px solid rgba(184,148,90,0.18);
      font-family: 'Inter', sans-serif;
      font-size: 10.5px;
      letter-spacing: 0.12em;
      color: #2E2C28;
      backdrop-filter: blur(8px);
    }
    .karte-today-bar .nums { font-weight: 500; color: #171614; }

    /* ===== Print karte ===== */
    @media print {
      @page { size: A4; margin: 14mm 14mm; }

      html, body { background: #ffffff !important; color: #1A1815 !important; }
      .bg-finder { background: #ffffff !important; }
      .bg-finder::before { display: none !important; }

      .no-print, .no-print * { display: none !important; }

      /* Reset shadows + animations */
      * {
        box-shadow: none !important;
        text-shadow: none !important;
        animation: none !important;
        transition: none !important;
        backdrop-filter: none !important;
      }

      /* Dark CTA block becomes white framed for print */
      .print-frame { background: #ffffff !important; color: #1A1815 !important; border: 1px solid #1A1815 !important; }
      .print-frame * { color: #1A1815 !important; }

      /* Tone down translucent backgrounds */
      .bg-white\/70, .bg-white\/80 { background: #ffffff !important; }
      .bg-cream { background: #F4F0E8 !important; }

      /* Karte print header (hidden on screen) */
      .print-only { display: block !important; }

      /* Keep colors readable */
      .text-ivory { color: #1A1815 !important; }
      .text-goldLight { color: #B8945A !important; }

      /* Forced black on important text */
      h1, h2, h3, h4 { color: #1A1815 !important; }

      /* Avoid breaks inside sections */
      section, article { break-inside: avoid; page-break-inside: avoid; }

      /* Print page header line */
      .print-page-header {
        border-bottom: 1px solid #1A1815;
        padding-bottom: 6mm;
        margin-bottom: 8mm;
      }

      /* Compact bar charts */
      .anim-bar { width: var(--print-width, 100%) !important; }
    }
    .print-only { display: none; }
  </style>

// age/gender はキャラ判定ではなく属性なのでキャラ既知時もスキップしない(SH/TR/エッセンスの処方に効くため必要)
const CHARACTER_DISCOVERY_IDS = new Set(['thickness','density','rootVolume','wave','scalpType','scalpSensitivity']);
function buildModeBSequence(answers) {
  const isKnown = !!(answers && answers._knownOriginId);
  return MODE_B_ORDER.filter(entry => {
    // キャラ既知ならキャラ判定系をスキップ
    if (isKnown && CHARACTER_DISCOVERY_IDS.has(entry.id)) return false;
    if (typeof entry.when !== 'function') return true;
    try { return !!entry.when(answers); } catch (e) { return true; }
  });
}


/* ---------- bleach 派生 (color質問から導出) ---------- */
function deriveBleach(answers){
  if (!answers) return null;
  if (answers.bleach && answers.bleach !== 'none') return answers.bleach;
  const c = answers.color;
  if (c === 'multi_bleach')  return 'multi';
  if (c === 'bleach_recent') return 'within3m';
  if (c === 'bleach_past')   return 'within1y';
  if (c === 'highlight')     return 'highlight';
  return null;
}

/* ---------- スコアリング ---------- */
const EMPTY_SCORES = {
  dryness: 0, damage: 0, bleachHistory: 0, colorFade: 0,
  frizz: 0, curl: 0, heatDamage: 0, scalpDryness: 0,
  scalpOiliness: 0, volumeLoss: 0, aging: 0,
  longHairHistory: 0, smoothness: 0,
};

const LONG_LENGTHS = new Set(['shoulderDown', 'chestUp', 'long']);

function addScore(target, add) {
  if (!add) return;
  for (const k in add) target[k] = (target[k] || 0) + add[k];
}

function computeScores(answers) {
  const s = { ...EMPTY_SCORES };
  const allQuestions = [...Q, ...(typeof Q_DEEP_NEW !== 'undefined' ? Q_DEEP_NEW : [])];

  for (const q of allQuestions) {
    const a = answers[q.id];
    if (a == null) continue;

    // 通常のスコア加算
    if (q.type === 'heat-tools') {
      const tools = (a && a.tools) || [];
      const temp  = a && a.temp;
      for (const v of tools) {
        const opt = q.toolOptions.find(o => o.v === v);
        if (opt) addScore(s, opt.score);
      }
      if (temp) {
        const opt = q.tempOptions.find(o => o.v === temp);
        if (opt) addScore(s, opt.score);
      }
    } else if (Array.isArray(a)) {
      for (const v of a) {
        const opt = q.options.find(o => o.v === v);
        if (opt) addScore(s, opt.score);
      }
    } else {
      const opt = q.options.find(o => o.v === a);
      if (opt) addScore(s, opt.score);
    }
  }

  const length     = answers.length;
  const bleach     = answers.bleach || (
    answers.color === 'multi_bleach' ? 'multi'   :
    answers.color === 'bleach_recent' ? 'within3m' :
    answers.color === 'bleach_past'   ? 'within1y' :
    answers.color === 'highlight'     ? 'highlight' :
    'none'
  );
  const color      = answers.color;
  const straighten = answers.straighten;
  const stylingAns = answers.styling || {};
  const tools      = stylingAns.tools || [];
  const temp       = stylingAns.temp;
  const items      = answers.items || [];

  // ロング × ブリーチ／カラー残り
  if (LONG_LENGTHS.has(length)) {
    if (bleach && bleach !== 'none') { s.longHairHistory += 2; s.damage += 1; }
    if (color && !['none', 'over1y'].includes(color)) { s.longHairHistory += 1; }
  }
  if (bleach === 'over1y' && LONG_LENGTHS.has(length)) {
    s.longHairHistory += 2; s.damage += 1;
  }

  // 縮毛矯正が3ヶ月以上前 → 根元うねり対策強化
  if (['within6m', 'within1y', 'over1y'].includes(straighten)) {
    s.frizz += 2; s.heatDamage += 1;
  }

  // 毎日アイロン／コテ → 熱ダメージ強化
  const dailyHeat = tools.includes('ironDaily') || tools.includes('curlerDaily');
  if (dailyHeat) { s.heatDamage += 2; s.dryness += 1; }

  // 高温 × 履歴の警告フラグ
  const hot180  = temp === 't180' || temp === 't200';
  const hot200  = temp === 't200';
  const hasColor      = color && color !== 'none';
  const hasBleach     = bleach && bleach !== 'none';
  const hasStraighten = straighten && straighten !== 'none';
  const usesHeat      = tools.length > 0 && !tools.includes('rare');

  const heatColorWarning  = hot180 && hasColor && usesHeat;
  const heatBleachWarning = hot200 && (hasBleach || hasStraighten) && usesHeat;

  // 高温×ブリーチ／縮毛の場合は damage を追加加算
  if (heatBleachWarning) { s.damage += 2; s.heatDamage += 1; }

  const onlyOil     = items.includes('oil') && !items.includes('milk') && !items.includes('mask');
  const maskMissing = !items.includes('mask') && s.damage >= 5;

  return { scores: s, flags: { onlyOil, maskMissing, heatColorWarning, heatBleachWarning, temp, dailyHeat } };
}

function determineType(scores, answers) {
  const s = scores;
  const straighten = answers.straighten;
  const perm       = answers.perm;

  if (s.scalpDryness   >= 4) return 'scalpDry';
  if (s.scalpOiliness  >= 4) return 'scalpOily';
  if (s.bleachHistory  >= 5 || s.longHairHistory >= 3) return 'bleachEnds';

  const hasStraighten = straighten && straighten !== 'none';
  if (hasStraighten && (s.frizz >= 3 || s.heatDamage >= 4)) return 'straightFrizz';

  if (s.heatDamage     >= 5) return 'heat';

  const hasPerm = perm && perm !== 'none' && perm !== 'past';
  if (hasPerm && s.curl >= 3) return 'permLoose';

  if (s.colorFade      >= 4) return 'colorFade';
  if (s.volumeLoss + s.aging >= 5) return 'aging';
  if (s.dryness >= 4 || s.damage >= 4) return 'dry';

  const total = Object.values(s).reduce((a,b)=>a+b,0);
  if (total < 6) return 'beginner';

  const proxy = {
    bleachEnds: s.bleachHistory + s.longHairHistory,
    heat: s.heatDamage,
    colorFade: s.colorFade,
    dry: s.dryness,
    aging: s.aging + s.volumeLoss,
    straightFrizz: s.frizz,
    permLoose: s.curl,
    scalpDry: s.scalpDryness,
    scalpOily: s.scalpOiliness,
  };
  return Object.keys(proxy).sort((a,b)=>proxy[b]-proxy[a])[0];
}

function concernMatches(c, productConcernTags) {
  const tags = CONCERN_TO_TAGS[c] || (CONCERN_TO_TAG[c] ? [CONCERN_TO_TAG[c]] : []);
  for (const t of tags) {
    if (productConcernTags.includes(t)) return true;
  }
  return false;
}
// 並び順スコア: タグが先頭に近いほど "そのラインの主要悩み" として強くマッチング
function concernPositionBoost(c, productConcernTags) {
  const tags = CONCERN_TO_TAGS[c] || (CONCERN_TO_TAG[c] ? [CONCERN_TO_TAG[c]] : []);
  let bestIdx = -1;
  for (const t of tags) {
    const idx = productConcernTags.indexOf(t);
    if (idx !== -1 && (bestIdx === -1 || idx < bestIdx)) bestIdx = idx;
  }
  if (bestIdx === -1) return 0;
  // 先頭(idx=0) → +15, 2番目 → +12, 3番目 → +9, 4番目 → +6, 5番目以降 → +3
  return [15, 12, 9, 6, 3][Math.min(bestIdx, 4)] || 3;
}

function getProductChips(p, max = 4) {
  if (!p) return [];
  const tags = p.functionTags || [];
  // 優先度順に並べる
  const ordered = [
    ...PRIMARY_TAG_PRIORITY.filter(t => tags.includes(t)),
    ...tags.filter(t => !PRIMARY_TAG_PRIORITY.includes(t)),
  ];
  // 日本語ラベル化（未定義は空にスキップ）
  const chips = [];
  const seen = new Set();
  for (const t of ordered) {
    const label = FUNCTION_TAG_JP[t];
    if (!label || seen.has(label)) continue;
    seen.add(label);
    chips.push(label);
    if (chips.length >= max) break;
  }
  return chips;
}

/* ---------- buildUserTags — Mode B 回答からタグセットを生成 ---------- */
function buildUserTags(answers, scores) {
  const a = answers || {};
  const s = scores || {};
  const tags = { base:[], state:[], goal:[], scalp:[], heat:[], color:[], perm:[], age:[] };

  // 髪の太さ
  if (a.thickness === 'thin')   tags.base.push('fine_hair');
  if (a.thickness === 'normal') tags.base.push('medium_hair');
  if (a.thickness === 'thick')  tags.base.push('coarse_hair');

  // 髪の量・密度
  if (a.density === 'low')    tags.base.push('low_density');
  if (a.density === 'normal') tags.base.push('medium_density');
  if (a.density === 'high')   tags.base.push('high_density');

  // クセ
  if (['none','straightened'].includes(a.wave)) tags.base.push('straight');
  else if (['humid','surface','midEnd','root'].includes(a.wave)) tags.base.push('wave');
  else if (a.wave === 'whole') tags.base.push('curl');

  // 根元ボリューム
  if (a.rootVolume === 'flat' || a.rootVolume === 'tendFlat') tags.scalp.push('top_volume_low');

  // 頭皮
  if (a.scalpType === 'dry'       || a.scalpType === 'tendDry')     tags.scalp.push('scalp_dry');
  if (a.scalpType === 'normal')                                       tags.scalp.push('scalp_normal');
  if (a.scalpType === 'oily'      || a.scalpType === 'tendOily')    tags.scalp.push('scalp_oily');
  if (a.scalpSensitivity === 'veryHigh' || a.scalpSensitivity === 'high') tags.scalp.push('scalp_sensitive');

  // 年代
  if (a.age) tags.age.push(`age_${a.age}`);
  if (a.age === '40s' || a.age === '50plus') tags.state.push('aging');

  // 薄毛・抜け毛(頭皮ケア系のニーズ)
  if ((a.concerns || []).includes('thinning')) {
    tags.state.push('hair_thinning');
    tags.scalp.push('scalp_growth_need');
  }

  // 男性・30歳以上は「薄くなってからでは遅い」— 自覚症状が無くても、
  // 早めの予防として頭皮・育毛・守るケアを積極的に提案する。
  const AGE_ORDER = { teen:0, '20s':1, '30s':2, '40s':3, '50plus':4 };
  if (a.gender === 'male' && (AGE_ORDER[a.age] ?? -1) >= 2) {
    tags.state.push('male_scalp_prevention');
    tags.scalp.push('scalp_growth_need');  // 育毛剤ゲートを開け、スカルプ枠を後押し
  }

  // 女性・30歳以降で「細毛 または 薄毛」→ プレセディア(育毛・守るエッセンス)を必ず指名で提案。
  if (a.gender === 'female' && (AGE_ORDER[a.age] ?? -1) >= 2 &&
      (a.thickness === 'thin' || (a.concerns || []).includes('thinning'))) {
    tags.state.push('female_precedia_must');
  }
  // 白髪染め × 太い髪 → グランケア(白髪世代の頭皮エッセンス)を必ず指名で提案。
  if (a.color === 'gray' && a.thickness === 'thick') {
    tags.state.push('gray_thick_grancare_must');
  }
  if ((a.concerns || []).includes('volumeDown') || (a.concerns || []).includes('topFlat')) {
    tags.scalp.push('top_volume_low');
  }

  // ととのえたい時間(wellness)
  const wellness = a.wellness || [];
  if (wellness.length > 0 && !wellness.includes('well')) {
    tags.state.push('headspa_need');
  }

  // カラー
  if (a.color && a.color !== 'none') {
    tags.color.push('color_history');
    if (a.colorFreq === 'monthly' || a.colorFreq === 'six') {
      tags.color.push('color_freq_high');
      tags.state.push('scalp_load_color');
    }
  }
  if (a.grayHair === 'yes') {
    tags.color.push('gray_color');
    if (['half','three','monthly'].includes(a.grayFreq)) {
      tags.color.push('gray_color_freq_high');
      tags.state.push('scalp_load_color');
    }
  }

  // ブリーチ — color質問から派生(旧 bleach 質問は廃止済み)
  const bleachLevel = (typeof deriveBleach === 'function') ? deriveBleach(a) : (a.bleach || null);
  if (bleachLevel) {
    tags.state.push('bleach_history');
    if (a.bleachLocation === 'ends' || a.bleachLocation === 'midEnds') {
      tags.state.push('bleach_residual', 'bleach_ends');
    } else if (a.bleachLocation === 'whole') {
      tags.state.push('bleach_residual', 'bleach_high');
    } else if (a.bleachLocation === 'partial') {
      tags.state.push('bleach_partial');
    }
    // 連続ブリーチ / 直近ブリーチ → bleach_high
    if (bleachLevel === 'multi' || bleachLevel === 'within3m' || bleachLevel === 'within1m') {
      tags.state.push('bleach_high');
    }
    // ハイライト / インナーカラー
    if (bleachLevel === 'highlight') tags.state.push('bleach_partial');
  }
  // 黒染め (color === 'dark_strong') — 色抜けにくい・ベース重め扱い
  if (a.color === 'dark_strong') tags.color.push('black_dye');

  // 矯正
  if (a.straighten && a.straighten !== 'none') tags.state.push('straight_residual');

  // パーマ
  // 「past」(過去にパーマしていたが今はストレート) は perm 系商品の推奨対象外
  if (a.perm && a.perm !== 'none' && a.perm !== 'past') {
    tags.perm.push('perm_history');
    if (a.permType === 'digital' || a.permType === 'both') tags.perm.push('perm_digital');
    else if (a.permType === 'normal') tags.perm.push('perm_normal');
    if (a.permLoose === 'veryEasy' || a.permLoose === 'easy') tags.perm.push('perm_loose');
  }

  // 熱
  const tools = (a.styling?.tools) || [];
  const temp  = a.styling?.temp;
  if (tools.includes('ironDaily') || tools.includes('curlerDaily')) tags.heat.push('heat_daily');
  if (tools.includes('ironWeekly') || tools.includes('curlerWeekly')) tags.heat.push('heat_weekly');
  if (temp === 't200') tags.heat.push('heat_high', 'heat_extreme');
  else if (temp === 't180') tags.heat.push('heat_high');
  // heatProtect は配列になった。'none' だけ選んでいる or 何も入っていなければ無防備
  const hpArr = Array.isArray(a.heatProtect) ? a.heatProtect : (a.heatProtect ? [a.heatProtect] : []);
  if ((hpArr.length === 0 || hpArr.includes('none')) && tags.heat.length) tags.heat.push('heat_unprotected');

  // ゴール (Mode A の goalTexture から)
  const goalMap = {
    smooth:'goal_silky_straight', moist:'goal_moist_gloss',
    glossy:'goal_moist_gloss',    firm:'goal_soft_volume',
    airy:'goal_soft_volume',      soft:'goal_repair_smooth',
  };
  if (a.goalTexture && goalMap[a.goalTexture]) tags.goal.push(goalMap[a.goalTexture]);

  // 集計
  return tags;
}

/* ---------- HARD RULES — 7つの強制表示ルール ---------- */
function checkHardRules(userTags, answers, scores) {
  const fired = [];
  const a = answers || {};
  const s = scores || {};

  // A: カラー高頻度 → 頭皮ケア強化
  if (userTags.color.includes('color_freq_high') || userTags.color.includes('gray_color_freq_high')) {
    fired.push({ id:'colorHighFreq', boostCategory:'scalp-essence', boost: 40, message:'カラー後数日間の頭皮保湿ケアをおすすめ' });
  }

  // B: 白髪染め高頻度 × 頭皮敏感 → 頭皮美容液最優先
  if (userTags.color.includes('gray_color_freq_high') && userTags.scalp.includes('scalp_sensitive')) {
    fired.push({ id:'graySensitive', boostCategory:'scalp-essence', boost: 60, message:'頭皮環境の整備を優先' });
  }

  // C: アイロン高温×高頻度 → 熱保護必須
  if (userTags.heat.includes('heat_high') && (userTags.heat.includes('heat_daily') || userTags.heat.includes('heat_weekly'))) {
    fired.push({ id:'heatHigh', boostFunction:'heat-protect', boost: 50, message:'熱保護アイテムを毎日のルーティンに' });
  }

  // D: ブリーチ残存 → 毛先集中ケア
  if (userTags.state.includes('bleach_residual')) {
    fired.push({ id:'bleachResidual', boostConcern:'bleach', boost: 45, message:'毛先集中ケアの優先度を上げる' });
  }

  // E: 細毛×熱×ぺたん → 軽量ミスト/ミルク優先
  if (userTags.base.includes('fine_hair') && userTags.scalp.includes('top_volume_low') &&
      (userTags.heat.includes('heat_daily') || userTags.heat.includes('heat_weekly'))) {
    fired.push({ id:'fineFlatHeat', boostCategory:'leave-in-mist', boost: 35, penaltyTexture:'rich', message:'軽さを保つアイテムを優先' });
  }

  // F: パーマだれ → カール維持優先
  if (userTags.perm.includes('perm_loose')) {
    fired.push({ id:'permLoose', boostFunction:'perm-keep', boost: 30, penaltyFinish:'moist-heavy', message:'カール維持を優先、しっとり重め減点' });
  }

  // G: トップ気になる → スカルプ強化
  if (userTags.scalp.includes('top_volume_low') || (s.volumeLoss || 0) >= 3 || (s.aging || 0) >= 3) {
    fired.push({ id:'topVolume', boostCategory:'scalp-essence', boost: 25, boostFunction:'aging-care', message:'根元立ち上がりとハリ・コシを強化' });
  }

  // H: 薄毛・抜け毛 → 頭皮ケア系スカルプエッセンス最優先
  if (userTags.state.includes('hair_thinning')) {
    fired.push({
      id:'hairThinning',
      boostCategory:'scalp-essence',
      boostFunction:'hair-growth',
      boostConcern:'thinning',
      boost: 70,
      message:'頭皮環境を整えるスカルプエッセンスを最優先',
    });
  }

  return fired;
}

/* ---------- PENALTY RULES — 減点ルール ---------- */
function applyPenalties(product, userTags) {
  let penalty = 0;
  const finishArr = Array.isArray(product.finishTags) ? product.finishTags : (product.finishTags?.finish || []);
  const concernArr = product.concernTags || [];
  const cautionArr = product.cautionTags || [];
  const weight = product.finishTags?.weight;

  // 細毛 × 重め/オイル系
  if (userTags.base.includes('fine_hair')) {
    if (weight === 'rich' || weight === 'heavy') penalty += 15;
    if (finishArr.includes('rich')) penalty += 8;
    if (cautionArr.includes('may_flatten_fine_hair')) penalty += 20;
  }

  // オイリー頭皮 × 乾燥特化
  if (userTags.scalp.includes('scalp_oily') &&
      concernArr.includes('scalp-dry') && !concernArr.includes('scalp-oily')) {
    penalty += 12;
  }

  // デジパ × ストレート特化
  if (userTags.perm.includes('perm_digital') && cautionArr.includes('not_for_perm')) penalty += 15;

  // ブリーチ多 × ダメージタグ弱い
  if (userTags.state.includes('bleach_high') && !concernArr.includes('damage') && !concernArr.includes('bleach')) {
    penalty += 18;
  }

  // トップぺたん × 根元フラット注意
  if (userTags.scalp.includes('top_volume_low') && cautionArr.includes('root_flatten')) penalty += 15;

  return penalty;
}

/* ---------- scoreProductDeep — userTagsで追加スコア ---------- */
function scoreProductDeep(product, userTags, hardRules) {
  let boost = 0;
  const concernArr = product.concernTags || [];
  const functionArr = product.functionTags || [];
  const finishArr = Array.isArray(product.finishTags) ? product.finishTags : (product.finishTags?.finish || []);

  // ハードルール適用
  for (const rule of (hardRules || [])) {
    if (rule.boostCategory && product.category === rule.boostCategory) boost += rule.boost;
    if (rule.boostFunction && functionArr.includes(rule.boostFunction)) boost += rule.boost;
    if (rule.boostConcern  && concernArr.includes(rule.boostConcern))   boost += rule.boost;
  }

  // ベース一致
  if (userTags.base.includes('fine_hair') && functionArr.includes('lightweight')) boost += 8;
  if (userTags.base.includes('coarse_hair') && finishArr.includes('rich'))         boost += 6;

  // 太さの逆ミスマッチ抑制: 専用設計(hairType.thickness が単一値)の商品が、
  // 真逆の太さのユーザーに当たった場合は減点する(細毛専用→太毛 / 太毛専用→細毛)。
  const htThick = product.hairType && product.hairType.thickness;
  if (Array.isArray(htThick) && htThick.length === 1) {
    if (userTags.base.includes('coarse_hair') && htThick[0] === 'thin')  boost -= 30;
    if (userTags.base.includes('fine_hair')   && htThick[0] === 'thick') boost -= 30;
  }

  // 細毛 × ブリーチ — 軽量×補修の両立ボトル(BYKARTE FH+ 等)を優先する
  // (bond-care +35 の重力に対抗して、細毛向け補修商品を上位に押し上げる)
  if (userTags.base.includes('fine_hair') &&
      (userTags.state.includes('bleach_residual') || userTags.state.includes('bleach_high'))) {
    if (functionArr.includes('for-fine-hair'))                       boost += 28;
    if (functionArr.includes('for-thin-hair'))                       boost += 22;
    if (functionArr.includes('lightweight') &&
        (functionArr.includes('damage-repair') || functionArr.includes('protein-care'))) boost += 25;
  }

  // ゴール一致
  if (userTags.goal.includes('goal_moist_gloss') && finishArr.includes('glossy'))  boost += 10;
  if (userTags.goal.includes('goal_moist_gloss') && finishArr.includes('moist'))   boost += 8;
  if (userTags.goal.includes('goal_silky_straight') && finishArr.includes('smooth')) boost += 10;
  if (userTags.goal.includes('goal_soft_volume') && finishArr.includes('airy'))    boost += 10;
  if (userTags.goal.includes('goal_repair_smooth') && concernArr.includes('damage')) boost += 8;

  // 頭皮タグ
  if (userTags.scalp.includes('scalp_dry')       && concernArr.includes('scalp-dry'))  boost += 12;
  if (userTags.scalp.includes('scalp_oily')      && concernArr.includes('scalp-oily')) boost += 12;
  if (userTags.scalp.includes('scalp_sensitive') && functionArr.includes('low-irritation')) boost += 8;

  // 状態タグ
  if (userTags.state.includes('bleach_residual') && (concernArr.includes('bleach') || concernArr.includes('damage'))) boost += 15;
  if (userTags.state.includes('aging')           && functionArr.includes('aging-care')) boost += 10;

  // ブリーチ毛・ハイダメージ専用ケアの強ブースト(Miracle / Bond / Lipid / Fibreplex 系)
  if (userTags.state.includes('bleach_residual') || userTags.state.includes('bleach_high')) {
    const productName = ((product.name || '') + ' ' + (product.line || '')).toLowerCase();
    const isBondCare =
      /miracle|bond|lipid\s*booster|fibreplex|fiberplex|olaplex|hahonico\s*lala|tokio.*ie|inkarami|sublimic\s*adapt|ke?rastase\s*blond/i.test(productName) ||
      (functionArr.includes('bond-care') || functionArr.includes('lipid-care'));
    if (isBondCare) boost += 35;
    // ブリーチ専用アウトバス
    if ((product.category === 'leave-in-oil' || product.category === 'leave-in-milk' || product.category === 'leave-in-mist') &&
        (concernArr.includes('bleach') || /bleach|ブリーチ|ハイトーン|highlift/i.test(productName))) {
      boost += 22;
    }
    // 集中マスクは最強
    if ((product.category === 'hair-mask' || product.category === 'mask') &&
        (concernArr.includes('bleach') || concernArr.includes('damage'))) {
      boost += 28;
    }
  }

  // 薄毛・抜け毛
  if (userTags.state.includes('hair_thinning')) {
    if (concernArr.includes('thinning'))                            boost += 25;
    if (product.category === 'scalp-essence')                       boost += 20;
    if (functionArr.includes('hair-growth') || functionArr.includes('scalp-anti-aging') || functionArr.includes('aging-care')) boost += 15;
  }

  // 育毛剤(医薬部外品)ゲート: 薄毛・抜け毛・エイジングの明確なニーズがある人にのみ推奨する。
  // それ以外のユーザーには強く減点し、スカルプ枠を一般のスカルプ美容液(保湿・整肌)に譲る。
  if (functionArr.includes('hair-growth') || functionArr.includes('hairloss-care')) {
    const growthNeed = userTags.state.includes('hair_thinning')
      || userTags.state.includes('aging')
      || userTags.scalp.includes('scalp_growth_need');
    if (!growthNeed) boost -= 150;  // affinity(+45)等を確実に上回る減点で、ニーズなしには出さない
  }

  // セグメント別「必ず提案」エッセンス(指名処方) — 該当層には指定エッセンスをスカルプ枠の最上位に固定する。
  // ・女性30歳以降 × 細毛/薄毛 → プレセディア インテンシブパーフェクター
  // ・白髪染め × 太い髪       → ホーユー グランケアYS 頭皮用美容液
  if (userTags.state.includes('female_precedia_must')     && product.id === 'aujua-precedia-perfector') boost += 300;
  if (userTags.state.includes('gray_thick_grancare_must') && product.id === 'hoyu-grancare-essence')    boost += 300;

  // 男性・30歳以上の予防ケア: 「守る」アイテム(頭皮・育毛・抜け毛予防・ダメージ保護)を強く後押しする。
  if (userTags.state.includes('male_scalp_prevention')) {
    if (product.category === 'scalp-essence')                                         boost += 32;
    if (functionArr.includes('hair-growth') || functionArr.includes('hairloss-care')) boost += 42; // 早期の育毛・抜け毛予防を強く
    if (functionArr.includes('scalp-anti-aging') || functionArr.includes('scalp-care')) boost += 22;
    if (functionArr.includes('scalp-clean') || functionArr.includes('scalp-moisture')) boost += 14;
    if (functionArr.includes('heat-protect') || functionArr.includes('damage-repair') || functionArr.includes('for-color-damage')) boost += 10; // 髪を守る
  }

  // 熱タグ
  if (userTags.heat.includes('heat_high')        && functionArr.includes('heat-protect')) boost += 15;
  if (userTags.heat.includes('heat_unprotected') && functionArr.includes('heat-protect')) boost += 10;

  // パーマタグ
  if (userTags.perm.includes('perm_loose')       && functionArr.includes('perm-keep'))  boost += 12;

  return boost;
}

};

function blockForProduct(p, hardRules) {
  // ハードルールに引っかかっている product は urgent に昇格
  for (const rule of (hardRules || [])) {
    if (rule.boostCategory && p.category === rule.boostCategory) return 'urgent';
    if (rule.boostFunction && (p.functionTags || []).includes(rule.boostFunction)) return 'urgent';
    if (rule.boostConcern  && (p.concernTags  || []).includes(rule.boostConcern))  return 'urgent';
  }
  return CATEGORY_TO_BLOCK[p.category] || 'enhancement';
}

/* ---------- pickMustPlusOne — 必須プラスONE処方の選定 ---------- */
function pickMustPlusOne(products, answers, scores) {
  if (!products || products.length === 0) return [];
  const a = answers || {};
  const s = scores || {};
  const t = buildUserTags(a, s);
  const byId = {};
  for (const p of products) byId[p.id] = p;

  const matched = [];
  for (const rule of MUST_PLUS_ONE_RULES) {
    let fired = false;
    try { fired = !!rule.match({ a, t, s }); } catch (e) { fired = false; }
    if (!fired) continue;
    const matchedProducts = (rule.productIds || []).map(id => byId[id]).filter(Boolean);
    if (matchedProducts.length === 0) continue;
    matched.push({ rule, products: matchedProducts });
  }
  return matched;
}

/* ---------- pickDeepProducts — カテゴリ別ケア処方 (ルーティン順) ---------- */
function pickDeepProducts(products, answers, scores, flags, opts = {}) {
  const userTags  = buildUserTags(answers, scores);

  const maxPerBrand = opts.maxPerBrand || 3;

  // キャラクター由来の商品アフィニティ(27キャラごとの最適商品)

  const concernAffinityCount = {}; // 商品IDが何件の悩みにマッチしたか
  for (const c of ((answers || {}).concerns || [])) {
    const ids = CONCERN_PRODUCT_AFFINITY[c] || [];
    for (const id of ids) {
      concernAffinityCount[id] = (concernAffinityCount[id] || 0) + 1;
    }
  }

  // 必須プラスONE商品(MUST_PLUS_ONE_RULES)に登場する商品IDは、ケア処方からは除外
  // (重複表示を避けるため。プラスONEセクションで既に強く打ち出されている)
  const a = answers || {};
  const t = userTags;
  const sscores = scores || {};
  const mustIds = new Set();
  for (const rule of MUST_PLUS_ONE_RULES) {
    let fired = false;
    try { fired = !!rule.match({ a, t, s: sscores }); } catch (e) { fired = false; }
    if (fired) {
      for (const id of (rule.productIds || [])) mustIds.add(id);
    }
  }

  // 仕上げカテゴリ向け追加スコア (Color, Perm, Curl などの条件で 仕上げ商品を強化)
  const finishBoost = (p) => {
    const cat = deepCategoryForProduct(p);
    if (cat !== 'finish') return 0;
    let b = 8; // 仕上げ商品はベースで +8 (ルーティンの最後に1本は必要)
    // パーマ・カール持ちには クリエイティブスタイル 6番 を強く推奨
    if ((t.perm.includes('perm_history') || t.perm.includes('perm_loose') || t.perm.includes('perm_digital')) &&
        p.id === 'milbon-creativestyle-mediumhold-6') b += 20;
    // 巻き髪・スタイル維持には ジェミールフラン
    if ((a.styling?.tools || []).some(x => /curler/i.test(x)) && p.id === 'milbon-jemilefran-spray-sd') b += 18;
    // 毛先パサつき・ツヤ求める方には ニゼル ブライトアップ
    if ((t.goal.includes('goal_moist_gloss') || (a.concerns || []).includes('dryness') || (a.concerns || []).includes('damage')) &&
        p.id === 'milbon-nigelle-brightup-veil') b += 15;
    // カラーしている方には カラーモーション ルミナススプレー
    if ((t.color.includes('color_history') || t.color.includes('color_freq_high') || t.color.includes('gray_color')) &&
        p.id === 'colormotion-luminous-spray') b += 18;
    return b;
  };

  // ★ Fix #3: BLEACH RESCUE BOOST — bleachHistory>=4 で集中補修商品を強制的に上位へ
  //    Tokio Premium / Aujua Aquavia / Elujuda Extrarepair / Wella Ultime Smooth など
  //    キャラの affinity に無くても、強ブリーチユーザーには必ず2本入れる
  const BLEACH_RESCUE_IDS = new Set([
    'tokio-premium-sh','tokio-premium-tr','tokio-premium-limited-sh',
    'aujua-aquavia-sh','aujua-aquavia-tr','aujua-aquavia-mask','aujua-aquavia-out',
    'elujuda-extrarepair-serum','elujuda-extrarepair-milky',
    'viequalite-uh-sh','viequalite-serum-tr',
    'wella-ultimesmooth-sh','wella-ultimesmooth-mask',
  ]);
  const bleachHigh = (sscores.bleachHistory || 0) >= 4;
  const bleachRescueBoost = (p) => {
    if (!bleachHigh) return 0;
    return BLEACH_RESCUE_IDS.has(p.id) ? 40 : 0;
  };

  // ★ Fix #9: DAMAGE RESCUE BOOST — damage>=7 で集中補修商品を必ず上位に
  //    SEAM厳選 38SKU を 4サブセット に分割し、ユーザー状態にミスマッチしないよう発火制御
  //    UNIVERSAL : 履歴問わず高ダメージ全般に効く汎用補修 (常に発火)
  //    BLEACH    : ブリーチ毛専用 (bleachHistory >= 2 で発火)
  //    HEAT      : 熱ダメージ専用 (アイロン日常 / 高温 / 縮毛矯正で発火)
  //    WAVE      : くせ毛専用    (wave軸 = C で発火)
  const DAMAGE_RESCUE_UNIVERSAL = new Set([
    // Global Milbon リペア (汎用ダメージ補修)
    'globalmilbon-repair-sh','globalmilbon-repair-tr','globalmilbon-repair-mask',
    // System Professional LUXEOIL リュクス (ケラチン補修)
    'syspro-luxeoil-sh','syspro-luxeoil-tr','syspro-luxeoil-mask','syspro-luxeoil-elixir','syspro-luxeoil-boost',
    // System Professional REPAIR (R)
    'syspro-repair-sh','syspro-repair-co','syspro-repair-mask',
    // Kérastase クロノロジスト (エイジング/最高峰)
    'kerastase-chronologiste-sh','kerastase-chronologiste-mask','kerastase-chronologiste-oil',
    // Kérastase プルミエール (ダメージリペア)
    'kerastase-premiere-concentre','kerastase-premiere-masque',
    // Wella アルタイム リペア (ボンドケア)
    'wella-ultimerepair-sh','wella-ultimerepair-mask','wella-ultimerepair-treatment',
    'wella-ultimerepair-nighttreatment','wella-ultimerepair-oil',

  const DAMAGE_RESCUE_BLEACH = new Set([
    'aujua-ultia-sh','aujua-ultia-tr','aujua-ultia-essence',           // アルティール (エイジングブリーチ)
    'aujua-repairity-sh','aujua-repairity-tr',                          // リペアリティ (空洞化ブリーチ)
    'globalmilbon-blondeplus-sh','globalmilbon-blondeplus-tr',          // ブロンドプラス (ハイトーン)
    'kerastase-blondabsolu-sh','kerastase-blondabsolu-mask','kerastase-blondabsolu-oil', // ブロンドアブソリュ

    'globalmilbon-repairheat-sh','globalmilbon-repairheat-tr',          // リペアヒート (熱凝集補修)
  ]);

    'aujua-inmetry-sh','aujua-inmetry-tr','aujua-inmetry-mask','aujua-inmetry-out',  // インメトリィ (くせ毛)

  const _straighten  = !!answers?.straighten && answers.straighten !== 'none';
  const heatExp      = _toolsHeat || _tempHigh || _straighten;
  const isWaveC      = (sscores.waveLevel === 'curly') || (answers?.waveLevel === 'curly');
  const damageRescueBoost = (p) => {
    if (!damageHigh) return 0;
    if (DAMAGE_RESCUE_UNIVERSAL.has(p.id)) return 35;
    if (DAMAGE_RESCUE_BLEACH.has(p.id) && bleachExp) return 35;
    if (DAMAGE_RESCUE_HEAT.has(p.id)    && heatExp)  return 35;
    if (DAMAGE_RESCUE_WAVE.has(p.id)    && isWaveC)  return 35;
    return 0;
  };

  const scored = (products || []).map(p => {
    const base    = scoreSeamProduct(p, answers, scores, flags);
    const deep    = scoreProductDeep(p, userTags, hardRules);
    const penalty = applyPenalties(p, userTags);
    const finish  = finishBoost(p);
    const bleach  = bleachRescueBoost(p); // ★ Fix #3
    const dmgrep  = damageRescueBoost(p); // ★ Fix #9
    const supp    = isSupplementary(p); // 補助ブランド判定
    // キャラクター別アフィニティ: メインは +45、補助ブランドは +12 (おまけ枠)
    let affinity = 0;
    if (affinityIds.has(p.id)) affinity = supp ? 12 : 45;
    // 悩み別アフィニティ: メインは +25/悩み (max+60)、補助は +8/悩み (max+20)
    const concernHits = concernAffinityCount[p.id] || 0;
    const concernUnit = supp ? 8 : 25;
    const concernCap  = supp ? 20 : 60;
    const concernAffinity = Math.min(concernCap, concernHits * concernUnit);
    // 補助ブランド全体に微小な減点(メインブランドを優先するため)
    const supplementPenalty = supp ? 6 : 0;
    return {
      p,
      s: Math.max(0, base + deep + finish + bleach + dmgrep + affinity + concernAffinity - penalty - supplementPenalty),
      deepCat: deepCategoryForProduct(p),
      isAffinity: affinity > 0 || concernAffinity > 0 || bleach > 0,
      isSupplementary: supp,
      affinityReason: [
        affinity > 0 ? 'character' : null,
        concernAffinity > 0 ? `concern×${concernHits}` : null,
        bleach > 0 ? 'bleach-rescue' : null,
      ].filter(Boolean).join('+'),
    };
  }).filter(x => x.s > 0 && x.deepCat && !mustIds.has(x.p.id))
    .sort((a, b) => b.s - a.s);

  // カテゴリ別バケット
  const blocks = {};
  const catSubUsed = {}; // 各バケット内で seam-master.json category の重複を避ける(legacy)
  const suppCountInBucket = {}; // 各バケット内の補助ブランド本数(おまけ枠制限)
  const brandCountInBucket = {}; // 各バケット内の同ブランド本数(バケット内多様性)
  for (const id of Object.keys(DEEP_CATEGORY_DEFS)) {
    blocks[id] = [];
    catSubUsed[id] = new Set();
    suppCountInBucket[id] = 0;
    brandCountInBucket[id] = {};
  }

  // 同一ブランドが全カテゴリで支配しないようグローバル上限を緩めに設定(各カテゴリ3本×6=18枠中、最大6本まで)
  const globalBrandCap = Math.max(maxPerBrand, 6);
  const brandCount = {};
  for (const item of scored) {
    const bucket = item.deepCat;
    const def = DEEP_CATEGORY_DEFS[bucket];
    if (!def) continue;
    // バケット容量
    if (blocks[bucket].length >= (def.max || 3)) continue;
    // ブランド集中防止 (グローバル: 全カテゴリ合計の上限)
    if ((brandCount[item.p.brand] || 0) >= globalBrandCap) continue;
    // バケット内ブランド集中防止 (各カテゴリ内で同ブランドは最大2本まで)
    if ((brandCountInBucket[bucket][item.p.brand] || 0) >= 2) continue;
    // 補助ブランドの「おまけ枠」: 各バケットに最大1点まで
    //   - finish のみ最大2点(ニゼル/ジェミールフラン両方OK)
    //   - outbath のみ最大2点(Elujuda + HITAなど混在OK)
    if (item.isSupplementary) {
      const suppCap = (bucket === 'finish' || bucket === 'outbath') ? 2 : 1;
      if (suppCountInBucket[bucket] >= suppCap) continue;
    }
    // バケット内では同一商品IDが連続するのを防ぐのみ
    // (シャンプー3本/トリートメント3本などを均等に出すため、カテゴリ重複は許容)
    // ブランド集中防止 (maxPerBrand) で1ブランドが独占しないよう既に制限済み
    blocks[bucket].push(item);
    brandCount[item.p.brand] = (brandCount[item.p.brand] || 0) + 1;
    brandCountInBucket[bucket][item.p.brand] = (brandCountInBucket[bucket][item.p.brand] || 0) + 1;
    catSubUsed[bucket].add(item.p.category);
    if (item.isSupplementary) suppCountInBucket[bucket]++;
  }

  // ── セグメント別「必ず提案」エッセンスの確実注入 ──
  // ブランド上限やアフィニティ競合で弾かれても、指定エッセンスをスカルプ枠の先頭に固定する。
  // ・女性30歳以降 × 細毛/薄毛 → プレセディア インテンシブパーフェクター
  // ・白髪染め × 太い髪       → ホーユー グランケアYS 頭皮用美容液
  const scoredById = {};
  for (const it of scored) scoredById[it.p.id] = it;
  const forcedScalpIds = [];
  if (userTags.state.includes('female_precedia_must'))     forcedScalpIds.push('aujua-precedia-perfector');
  if (userTags.state.includes('gray_thick_grancare_must')) forcedScalpIds.push('hoyu-grancare-essence');
  if (forcedScalpIds.length && blocks.scalp) {
    const scalpMax = (DEEP_CATEGORY_DEFS.scalp && DEEP_CATEGORY_DEFS.scalp.max) || 4;
    for (const fid of forcedScalpIds) {
      const already = blocks.scalp.some(it => (it.p ? it.p.id : it.id) === fid);
      if (already) continue;
      const item = scoredById[fid];
      if (!item) continue;
      blocks.scalp.unshift(item);                 // 先頭に固定
      if (blocks.scalp.length > scalpMax) blocks.scalp.length = scalpMax; // 末尾を切り詰め
    }
  }

  return { blocks, userTags, hardRules };
}

/* ---------- SEAM全164商品マスター（seam-master.json）対応 ---------- */
// FWBUZR7u.xlsx 由来の164商品マスターを使用
function scoreSeamProduct(p, answers, scores, flags) {
  let s = 0;
  // 新schema互換: finishTags が {finish:[],weight,texture:[]} の場合に対応
  const finishArr = Array.isArray(p.finishTags) ? p.finishTags : (p.finishTags?.finish || []);
  const concernArr = p.concernTags || [];
  const functionArr = p.functionTags || [];
  // ── 髪質プロファイル一致(キャラクターごとの差別化) ──
  // 「ターゲットが絞られた商品」を「万能商品」より優先(narrowness bonus)
  const ht = p.hairType || {};
  const tList = ht.thickness || [];
  const dList = ht.density   || [];
  const wList = ht.wave      || [];
  // 髪の太さ
  if (answers.thickness && tList.length > 0) {
    if (tList.includes(answers.thickness)) {
      // base + specialty bonus(候補が少ないほど+α)
      s += 12 + (tList.length === 1 ? 8 : tList.length === 2 ? 4 : 0);
    } else {
      s -= 8;
    }
  }
  // 毛量
  if (answers.density && dList.length > 0) {
    if (dList.includes(answers.density)) {
      s += 10 + (dList.length === 1 ? 6 : dList.length === 2 ? 3 : 0);
    } else {
      s -= 6;
    }
  }
  // くせ
  if (answers.wave && wList.length > 0) {
    if (wList.includes(answers.wave)) {
      s += 8 + (wList.length <= 2 ? 4 : 0);
    } else if (answers.wave !== 'none' && answers.wave !== 'straightened') {
      s -= 4;
    }
  }
  for (const c of (answers.concerns || [])) {
    if (concernMatches(c, concernArr)) {
      // 基本マッチ +20
      s += 20;
      // 順序ボーナス: 製品の主要悩み(先頭ほど)に一致すると +6〜+15
      s += concernPositionBoost(c, concernArr);
    }
  }
  // スカルプマスクのブースト: 頭皮の悩みがある人に scalp-mask を強くマッチ
  const scalpConcerns = (answers.concerns || []).filter(c => ['scalpDry','scalpOily','thinning'].includes(c));
  if (scalpConcerns.length > 0 && functionArr.includes('scalp-mask')) s += 18;
  // 頭皮のべたつき/匂い特化: scalp-odor / buildup / dandruff があれば追加ブースト
  if ((scores.scalpOiliness || 0) >= 3) {
    if (concernArr.includes('scalp-odor')) s += 14;
    if (concernArr.includes('buildup')) s += 10;
    if (concernArr.includes('dandruff')) s += 8;
  }
  if (answers.goalTexture && finishArr.includes(answers.goalTexture)) s += 15;
  if (deriveBleach(answers)) {
    const bo = p.damageTags?.bleachOk;
    if (bo === 'multi-bleach') s += 30;
    else if (bo === 'heavy')   s += 22;
    else if (bo === 'medium')  s += 12;
  }
  const temp = answers.styling?.temp;
  if (temp === 't200' && (p.functionTags || []).includes('heat-protect')) s += 25;
  if (temp === 't180' && (p.functionTags || []).includes('heat-protect')) s += 15;

  // ── 熱保護: 普段使うアイテム種別を優先 ──
  // ミスト / ミルク / オイル のうちユーザーが選んだ種別の商品(熱保護タグ持ち)を強くプッシュ
  const heatProtectChoice = Array.isArray(answers.heatProtect) ? answers.heatProtect : (answers.heatProtect ? [answers.heatProtect] : []);
  const pCat = p.category || '';
  const hasHeatProtectTag = (p.functionTags || []).includes('heat-protect');
  if (heatProtectChoice.includes('mist') && /mist|water/.test(pCat)) {
    s += hasHeatProtectTag ? 22 : 14;
  }
  if (heatProtectChoice.includes('milk') && /milk|cream|emulsion/.test(pCat)) {
    s += hasHeatProtectTag ? 22 : 14;
  }
  if (heatProtectChoice.includes('oil') && /oil|butter/.test(pCat)) {
    s += hasHeatProtectTag ? 22 : 14;
  }
  if ((scores.scalpDryness  || 0) >= 3 && (p.concernTags || []).includes('scalp-dry'))  s += 12;
  if ((scores.scalpOiliness || 0) >= 3 && (p.concernTags || []).includes('scalp-oily')) s += 12;
  if ((scores.aging         || 0) >= 3 && (p.functionTags || []).includes('aging-care')) s += 10;

  // ── 頭皮悩みの優先ルーティング(エッセンス+シャンプー基軸) ──
  // 設計方針:
  //  - 頭皮悩みは「エッセンス + シャンプー」で処方
  //  - トリートメント / アウトバス(オイル・ミルク・ミスト) は "髪質の悩み" で処方
  //    (ダメージ・くせ・パサつき・ツヤ不足等)
  //  - フケ/かゆみは履歴問わずスキャルプ系シャンプー OK
  //  - 男性: シャンプー寄せはそのまま、TR/leave-in は髪質悩みに従う
  //  - 30歳以上: グランケアをエイジングケアとしてプッシュ(SH/エッセンスのみ)
  //  - 優先度: 薄毛 > 白髪/エイジング > 頭皮乾燥/フケ
  const concerns = answers.concerns || [];
  const isThinning  = concerns.includes('thinning') || (scores.volumeLoss || 0) >= 4;
  const isGrayHair  = answers.grayHair === 'yes' || answers.color === 'gray' || (scores.aging || 0) >= 3;
  const isScalpDry  = concerns.includes('scalpDry') || concerns.includes('scalpOily') || (scores.scalpDryness || 0) >= 2;
  const isAge30Plus = ['30s','40s','50plus'].includes(answers.age);
  const isMale      = answers.gender === 'male';
  const hasChemHistory = (answers.color && answers.color !== 'none')
                      || (answers.straighten && answers.straighten !== 'none')
                      || (answers.perm && answers.perm !== 'none');
  const line  = p.line || '';
  const cat   = p.category || '';
  const isEssence  = cat === 'scalp-essence';
  const isShampoo  = cat === 'shampoo' || cat === 'scalp-shampoo' || cat === 'scalp-cleanser';
  const isTreatment= cat === 'treatment' || cat === 'hair-mask' || cat === 'mask';
  const isLeaveIn  = /leave-in|out-?bath|outbath|booster/.test(cat);
  // 頭皮ブーストの対象: シャンプー + エッセンス のみ。
  // TR / leave-in は対象外(髪質悩みベースで素直にスコアリング)
  const isScalpRoutableCat = isShampoo || isEssence;
  const isAdenoOrPrecedia = /アデノバイタル|プレセディア/.test(line);
  const isAgingSpa        = /エイジングスパ/.test(line);
  const isGranCare        = /グランケア|プロマスター/.test(line);
  const isMoistCalm       = /モイストカーム/.test(line);

  // (A) 薄毛/抜け毛 — エッセンス+シャンプー
  if (isThinning && isScalpRoutableCat) {
    if (isEssence && isAdenoOrPrecedia) s += 70;
    if (isEssence && isAgingSpa)        s += 40;
    if (isShampoo && isAdenoOrPrecedia) s += 28;
    if (isShampoo && isAgingSpa)        s += 16;
  }
  // (B) 白髪 — グランケア エッセンス+シャンプー
  else if (isGrayHair && isScalpRoutableCat) {
    if (isEssence && isGranCare) s += 60;
    if (isShampoo && isGranCare) s += 26;
  }
  // (C) 頭皮乾燥/フケ/かゆみ — モイストカーム エッセンス + スカルプ系SH
  else if (isScalpDry && isScalpRoutableCat) {
    if (isEssence && isMoistCalm) s += 80;  // 頭皮乾燥はモイストカーム強プッシュ
    if (isShampoo && isMoistCalm) s += 26;
    // フケ/かゆみは履歴問わずスキャルプ系SHもOK
    if (isShampoo && (cat === 'scalp-shampoo' || cat === 'scalp-cleanser')) s += 18;
    if (isShampoo && (p.functionTags || []).includes('scalp-care')) s += 10;
  }

  // ── 30歳以上のエイジングケア必須プッシュ ──
  // エッセンス: 履歴問わず必ずグランケアをトップに
  // シャンプー: 履歴ナシ女性 or 男性のみ(履歴アリ女性はごわつき防止で除外)
  if (isAge30Plus && isGranCare && isScalpRoutableCat && !isThinning && !isScalpDry) {
    if (isEssence) s += 75;
    if (isShampoo && (!hasChemHistory || isMale)) s += 18;
  }

  // ── ごわつき防止 ──
  // 履歴アリ女性が頭皮ケアブランドのシャンプーに当たるのを軽減
  if (isShampoo && hasChemHistory && !isMale && (isGranCare || isAdenoOrPrecedia || isAgingSpa)) {
    s -= 20;
  }

  // ── タグ準拠の素直なブースト(以前の挙動を保持) ──
  if ((p.concernTags || []).includes('hairloss')) s += isThinning ? 8 : 0;
  if ((p.concernTags || []).includes('graying'))  s += isGrayHair ? 6 : 0;

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // ── セグメントタグ発火(for-fine-hair / for-wave-hair / for-color-damage 等) ──
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const fn = p.functionTags || [];
  // (1) 細毛用 — thickness:thin
  if (answers.thickness === 'thin' && fn.includes('for-fine-hair')) s += 20;
  // (2) 癖毛用 — wave is anything except none/straightened
  const hasWave = answers.wave && answers.wave !== 'none' && answers.wave !== 'straightened';
  if (hasWave && fn.includes('for-wave-hair')) s += 22;
  // (3) カラーダメージ用 — color !== none
  const hasColor = answers.color && answers.color !== 'none';
  if (hasColor && fn.includes('for-color-damage')) s += 18;
  // (4) ブリーチダメージ用 — bleach系のcolor or deriveBleach
  const hasBleach = /^(bleach_recent|bleach_past|multi_bleach|highlight)$/.test(answers.color || '') || !!deriveBleach(answers);
  if (hasBleach && fn.includes('for-bleach-damage')) s += 25;
  // (5) パーマダメージ用 — perm !== none/past
  const hasPerm = answers.perm && answers.perm !== 'none' && answers.perm !== 'past';
  if (hasPerm && fn.includes('for-perm-damage')) s += 18;
  // (6) 縮毛矯正ダメージ用 — straighten !== none
  const hasStraighten = answers.straighten && answers.straighten !== 'none';
  if (hasStraighten && fn.includes('for-straighten-damage')) s += 22;
  // (7) 熱ダメージ用 — temp >= 180 or daily iron use
  const tools = (answers.styling?.tools || []);
  const dailyHeat = tools.includes('ironDaily') || tools.includes('curlerDaily');
  const hotTemp = answers.styling?.temp === 't180' || answers.styling?.temp === 't200';
  if ((dailyHeat || hotTemp) && fn.includes('for-heat-damage')) s += 22;
  // (8) スカルプ用 — 頭皮悩み(乾燥/オイリー/薄毛/フケ)
  const hasScalpConcern = isScalpDry || isThinning || (answers.concerns || []).some(c => ['scalpDry','scalpOily','thinning','dandruff'].includes(c));
  if (hasScalpConcern && fn.includes('for-scalp')) s += 18;
  // (9) エイジングケア用 — 30歳以上は必ず発火
  if (isAge30Plus && fn.includes('for-aging')) s += 22;

  // ── ブロンドアブソリュ厳格化: 名前通りブリーチ毛にのみ発火 ──
  if (/ブロンドアブソリュ/.test(line) && !hasBleach) s -= 30;

  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // ── ブリーチ毛のセグメント別ルーティング ──
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  if (hasBleach) {
    // (1) 必須商品(リピッドブースター/アルタイムリペア)は最強プッシュ
    if (p.mustShowForBleach) s += 60;
    // (2) 白髪+ブリーチ → アルティールが最適(+80で他のブリーチ補修より優先)
    if (isGrayHair && /アルティール/.test(line)) s += 80;
    // (3) 細毛 + ブリーチ → ブロンドアブソリュが最適(+50で他に優先)
    if (answers.thickness === 'thin' && /ブロンドアブソリュ/.test(line)) s += 50;
    // (4) 普通毛/くせ毛広がり + ブリーチ → BYKARTE HS / リペアリティ / インメトリィ
    const isNormalOrWavy = answers.thickness === 'normal' || hasWave;
    if (isNormalOrWavy) {
      if (/リペアリティ/.test(line))   s += 35;
      if (/インメトリィ/.test(line))   s += 30;
      // BYKARTE HS+ や UH+(高ダメージ向け)
      if (p.brand === 'BYKARTE' && /HS\+|UH\+|CH\+/.test(p.name || '')) s += 30;
    }
  }

  // ── アクアヴィアはくせ毛 Top に来ないように軽ペナルティ(ミラジェリィ/インメトリィに譲る) ──
  if (/アクアヴィア/.test(line) && hasWave) s -= 8;

  // ── ブランド優先度調整 ──
  // BYKARTE は優先表示(+20)、Kérastase / Davines は積極的に出さない(-15)
  const brand = p.brand || '';
  if (brand === 'BYKARTE')          s += 20;
  else if (brand === 'Kérastase')   s -= 15;
  else if (brand === 'Davines')     s -= 15;
  if (answers.color && answers.color !== 'none' && (p.functionTags || []).includes('color-lock')) s += 10;
  if ((scores.damage      || 0) >= 3 && (p.concernTags || []).includes('damage'))      s += 10;
  if ((scores.volumeLoss  || 0) >= 3 && (p.concernTags || []).includes('volume-down')) s += 8;
  if ((scores.heatDamage  || 0) >= 3 && (p.concernTags || []).includes('heat-damage')) s += 10;
  // 価格懸念
  if ((answers.concernsItem || []).includes('price') && p.priceTier === 'luxury') s -= 10;
  return s;
}

function pickSeamProducts(products, answers, scores, flags, opts = {}) {
  const maxPerBrand = opts.maxPerBrand || 2;
  const scored = products
    .map(p => ({ p, s: scoreSeamProduct(p, answers, scores, flags) }))
    .filter(x => x.s > 0)
    .sort((a, b) => b.s - a.s);
  // カテゴリごとに最高スコア。同ブランドが上限を超えないよう調整
  const byCategory = {};
  const brandCount = {};
  for (const { p, s } of scored) {
    if (byCategory[p.category]) continue;
    if ((brandCount[p.brand] || 0) >= maxPerBrand) continue;
    byCategory[p.category] = { p, s };
    brandCount[p.brand] = (brandCount[p.brand] || 0) + 1;
  }
  return Object.values(byCategory).sort((a, b) => (a.p.routineStep || 99) - (b.p.routineStep || 99));
}

function pickHeadSpaRecs(answers) {

  // ヘッドスパに興味がない場合は提案しない(薄毛も含めて)
  if (a.headSpaInterest === 'no') return null;

  // 薄毛・抜け毛があれば、スカルプ(頭皮環境ケア)を最優先で
  // ※ ただし headSpaInterest が 'yes' か未回答のときのみ
  if (concerns.includes('thinning')) {
    const sp = HEAD_SPA_RECS.find(x => x.id === 'scalp-growth');
    if (sp) recs.push({ ...sp, matchCount: 99 });
  }

  // ヘッドスパに興味あり + ウェルネス未回答 のときは、デフォルトコースを提案
  if (a.headSpaInterest === 'yes' && (w.length === 0 || (w.length === 1 && w.includes('well')))) {
    const refresh = HEAD_SPA_RECS.find(x => x.id === 'refresh');
    if (refresh && !recs.some(r => r.id === refresh.id)) recs.push({ ...refresh, matchCount: 1 });
    return recs;
  }

  // ウェルネス傾向で推奨
  if (w.length === 0 || (w.length === 1 && w.includes('well'))) {
    return recs.length ? recs : null;
  }

  const scored = HEAD_SPA_RECS
    .filter(s => !s.forThinning)
    .map(spa => ({ ...spa, matchCount: spa.triggers.filter(t => w.includes(t)).length }))
    .filter(s => s.matchCount > 0)
    .sort((a, b) => b.matchCount - a.matchCount);

  // 3つ以上の悩みがあるなら、Deep + 個別2つ
  if (w.length >= 3) {
    const deep = HEAD_SPA_RECS.find(s => s.fullCare);
    const others = scored.filter(s => !s.fullCare).slice(0, 2);
    recs.push(...(deep ? [{ ...deep, matchCount: w.length }] : []), ...others);
  } else {
    // 1〜2個 → 該当する専門スパを優先表示(Deep は出さない)
    const individualSpas = scored.filter(s => !s.fullCare).slice(0, 2);
    recs.push(...individualSpas);
  }

  // 重複除去
  const seen = new Set();
  return recs.filter(s => { if (seen.has(s.id)) return false; seen.add(s.id); return true; });
}

/* ---------- pickHomeTools — Home Tools(美容家電)おすすめロジック ---------- */
function pickHomeTools(tools, answers, scores) {
  if (!tools || !tools.length) return [];
  const a = answers || {};
  const s = scores || {};
  const concerns = a.concerns || [];
  const tools_used = (a.styling && a.styling.tools) || [];
  const temp = a.styling && a.styling.temp;
  const usesIron = tools_used.some(t => /^iron|bangs/i.test(t)) || ['t180','t200'].includes(temp);
  const usesCurler = tools_used.some(t => /curler/i.test(t));
  const isBleached = a.bleach && a.bleach !== 'none';
  const length = a.length || '';
  const isLong = ['shoulderDown', 'chestUp', 'long'].includes(length);
  const isShort = ['short', 'bob', 'shoulderUp'].includes(length);
  const isCoarse = a.thickness === 'thick' || (s.frizz || 0) >= 3;
  const hasScalpOdor = (s.scalpOiliness || 0) >= 3 || concerns.includes('scalpOily');
  const hasScalpDry = (s.scalpDryness || 0) >= 3 || concerns.includes('scalpDry');
  const hasThinning = concerns.includes('thinning') || concerns.includes('topFlat') || concerns.includes('volumeDown') || (s.aging || 0) >= 3;

  const scored = tools.map(t => {
    let score = 0;
    const m = t.match || {};
    // ベース重み
    score += m.weight || 0;
    // 全員向けフラグ
    if (m.anyone) score += 4;
    // 関心タグ一致
    for (const c of concerns) {
      if ((m.concerns || []).includes(c)) score += 6;
    }
    // アイロン使用者
    if (usesIron && m.iron) score += 15;
    if (usesCurler && m.curler) score += 15;
    // ブリーチ毛 → 低ダメージプロ仕様優先
    if (isBleached && m.bleached) score += 12;
    if (isBleached && t.subtype === 'professional') score += 6;
    // 長さマッチ(カールアイロン径選択)
    if (length && (m.length || []).includes(length)) score += 10;
    // 剛毛 → パワーストレート
    if (isCoarse && m.coarseHair) score += 12;
    // 頭皮ニオイ/ベタつき → シャワーヘッド
    if (hasScalpOdor && m.scalpOdor) score += 14;
    // 薄毛・抜け毛 → 頭皮系
    if (hasThinning && (t.category === 'tool-headspa' || t.subtype === 'scalp-care' || t.subtype === 'scalp-massage')) score += 12;
    // 頭皮乾燥/オイリー → headspa
    if ((hasScalpOdor || hasScalpDry) && t.category === 'tool-headspa') score += 8;
    return { t, score };
  }).filter(x => x.score > 0).sort((a, b) => b.score - a.score);

  // カテゴリ別 (ドライヤー1 + アイロン1 + α) で多様性確保 - 最大4個
  const picks = [];
  const usedCategories = new Set();
  const maxByCat = { 'tool-dryer': 1, 'tool-iron-straight': 1, 'tool-iron-curl': 1, 'tool-iron-2way': 1, 'tool-iron-brush': 1, 'tool-shower': 1, 'tool-headspa': 1, 'tool-brush': 1 };
  for (const { t, score } of scored) {
    if (picks.length >= 4) break;
    const cat = t.category;
    if (usedCategories.has(cat) && (maxByCat[cat] || 1) <= 1) continue;
    picks.push({ ...t, _score: score });
    usedCategories.add(cat);
  }
  return picks;
}

function isRefillImage(src) {
  if (!src) return false;
  const s = src.toLowerCase();
  // 直接的な詰め替え/パウチ表記のみフィルター
  return /refill|pouch|リフィル|レフィル|詰め?替え?|詰替|パウチ|sachet/i.test(s);
}

/* sizeLabels から詰め替え/パウチサイズを除去 (本体サイズのみ表示) */
function filterNonRefillSizes(sizeLabels) {
  if (!sizeLabels || !sizeLabels.length) return [];
  return sizeLabels.filter(label => {
    const s = (label || '').toLowerCase();
    return !/refill|pouch|リフィル|レフィル|詰め?替え?|詰替|パウチ|sachet|パック|pack/i.test(s);
  });
}

/* ---------- カルテ保存/共有 ---------- */
// PDFファイル名: SEAM_HAIR_FINDER_KARTE_YYYY-MM-DD.pdf
// ブラウザの印刷ダイアログを利用して、iOS/Android/PC全てで「保存・共有」を提供する。
//   - iOS Safari: 印刷プレビュー → 共有シート（AirDrop / ファイル / LINE 等）
//   - Android Chrome: 印刷プレビュー → "PDF として保存" → 共有
//   - PC: 印刷ダイアログから "PDF として保存"
function saveOrShareKarte() {
  const date = new Date().toISOString().slice(0,10);
  const filename = `SEAM_HAIR_FINDER_KARTE_${date}`;
  const originalTitle = document.title;
  document.title = filename;
  setTimeout(() => {
    window.print();
    setTimeout(() => { document.title = originalTitle; }, 800);
  }, 10);
}

// Web Share API が使える端末ではURL共有のオプションも提供（補助的）
function buildChart(scores, answers) {
  const items = answers.items || [];
  const moistureUsage = items.includes('mask') || items.includes('milk') || items.includes('treatment');

  return {
    '水分不足':     clamp(scores.dryness, 5),
    '内部補修不足': clamp(scores.damage + (moistureUsage ? 0 : 1), 5),
    '熱ダメージ':   clamp(scores.heatDamage, 5),
    '毛先履歴':     clamp(scores.bleachHistory * 0.7 + scores.longHairHistory, 5),
    '頭皮環境':     clamp(scores.scalpDryness + scores.scalpOiliness, 5),
    'ボリューム':   clamp(scores.volumeLoss + scores.aging * 0.5, 5),
    'うねり':       clamp(scores.frizz, 5),
    'ツヤ':         clamp(scores.dryness * 0.5 + scores.damage * 0.5 + scores.colorFade * 0.5, 5),
  };
}

/* ---------- ProgressBar ---------- */
function ProgressBar({ current, total }) {
  const pct = Math.max(0, Math.min(100, (current / total) * 100));
  return (
    <div className="w-full">
      <div className="h-px w-full bg-line/70 overflow-hidden">
        <div className="h-full bg-gold transition-all duration-500 ease-out" style={{ width: `${pct}%` }} aria-hidden />
      </div>
    </div>
  );
}

/* ---------- QuestionCard router ---------- */
function QuestionCard({ question, value, onChange }) {
  const { type } = question;
  if (type === 'chip-multi')      return <ChipMulti q={question} value={value} onChange={onChange} />;
  if (type === 'card-single')     return <CardSingle q={question} value={value} onChange={onChange} />;
  if (type === 'card-multi')      return <CardMulti q={question} value={value} onChange={onChange} />;
  if (type === 'slider')          return <SliderChoice q={question} value={value} onChange={onChange} />;
  if (type === 'check-multi')     return <CheckMulti q={question} value={value} onChange={onChange} />;
  if (type === 'carousel-single') return <CarouselSingle q={question} value={value} onChange={onChange} />;
  if (type === 'heat-tools')      return <HeatTools q={question} value={value || {}} onChange={onChange} />;
  if (type === 'card-history')    return <CardHistory q={question} value={value} onChange={onChange} />;
  return null;
}

/* ---- Chip multi (max N) — editorial square chips ---- */
function ChipMulti({ q, value = [], onChange }) {
  const max = q.max || 99;
  const toggle = (v) => {
    if (value.includes(v)) return onChange(value.filter(x => x !== v));
    if (value.length >= max) return;
    onChange([...value, v]);
  };
  return (
    <div>
      <div className="mt-1 flex items-baseline justify-between">
        <p className="font-mono tracking-widest2 text-[10.5px] uppercase text-charcoal/55">最大 {max} つまで</p>
        <p className="font-mono tracking-widest2 text-[10.5px] uppercase text-ink nums">
          <span className="text-ink">{String(value.length).padStart(2,'0')}</span>
          <span className="text-charcoal/35"> / {String(max).padStart(2,'0')}</span>
        </p>
      </div>
      <div className="mt-5 flex flex-wrap gap-1.5">
        {q.options.map(o => {
          const active = value.includes(o.v);
          const disabled = !active && value.length >= max;
          return (
            <button
              key={o.v}
              type="button"
              disabled={disabled}
              onClick={() => toggle(o.v)}
              className={[
                'group inline-flex items-center gap-2 px-3.5 py-2 text-[12.5px] sm:text-[13px] border transition-all rounded-[2px]',
                active
                  ? 'bg-ink text-ivory border-ink'
                  : 'bg-white/70 text-charcoal border-line hover:border-ink hover:text-ink',
                disabled ? 'opacity-35 cursor-not-allowed' : '',
              ].join(' ')}
            >
              <span
                className={[
                  'w-3 h-3 border inline-flex items-center justify-center rounded-[1px]',
                  active ? 'border-ivory bg-ivory' : 'border-line group-hover:border-ink',
                ].join(' ')}
                aria-hidden
              >
                {active && (
                  <svg viewBox="0 0 12 12" className="w-2.5 h-2.5">
                    <path d="M2 6.5 L 5 9 L 10 3" stroke="#1A1815" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                )}
              </span>
              {o.label}
            </button>
          );
        })}
      </div>
    </div>
  );
}

              className={[

/* ---- Card history (Yes/No → detail) ---- */
function CardHistory({ q, value, onChange }) {
  // value: undefined | 'none' | <detail value>
  const [yesIntent, setYesIntent] = useState(() => value && value !== 'none');
  const noneOpt = q.options.find(o => o.v === 'none');
  const detailOptions = q.options.filter(o => o.v !== 'none');

  const showDetails = yesIntent || (value && value !== 'none');
  const noActive    = value === 'none';
  const yesActive   = showDetails;

  const handleYes = () => {
    setYesIntent(true);
    if (value === 'none') onChange(undefined);
  };
  const handleNo = () => {
    setYesIntent(false);
    onChange('none');
  };

  return (
    <div className="mt-5">
      {/* Yes / No */}
      <div className="grid grid-cols-2 gap-1.5">
        <button
          type="button"
          onClick={handleYes}
          className={[
            'group px-4 sm:px-5 py-4 border transition-all flex items-center justify-between gap-3 rounded-[2px] text-left',
            yesActive ? 'bg-ink text-ivory border-ink' : 'bg-white/70 text-charcoal border-line hover:border-ink',
          ].join(' ')}
        >
          <span>
            <span className={['block font-mono tracking-widest2 text-[10.5px] uppercase mb-1',
              yesActive ? 'text-goldLight' : 'text-charcoal/45'].join(' ')}>Yes</span>
            <span className={['block font-serif text-[15.5px] sm:text-[16.5px]',
              yesActive ? 'text-ivory' : 'text-ink'].join(' ')}>履歴がある</span>
          </span>
          <span
            className={[
              'w-4 h-4 border inline-flex items-center justify-center shrink-0 rounded-[1px]',
              yesActive ? 'border-ivory bg-ivory' : 'border-line group-hover:border-ink',
            ].join(' ')}
            aria-hidden
          >
            {yesActive && (
              <svg viewBox="0 0 12 12" className="w-2.5 h-2.5">
                <path d="M2 6.5 L 5 9 L 10 3" stroke="#1A1815" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            )}
          </span>
        </button>

        <button
          type="button"
          onClick={handleNo}
          className={[
            'group px-4 sm:px-5 py-4 border transition-all flex items-center justify-between gap-3 rounded-[2px] text-left',
            noActive ? 'bg-ink text-ivory border-ink' : 'bg-white/70 text-charcoal border-line hover:border-ink',
          ].join(' ')}
        >
          <span>
            <span className={['block font-mono tracking-widest2 text-[10.5px] uppercase mb-1',
              noActive ? 'text-goldLight' : 'text-charcoal/45'].join(' ')}>No</span>
            <span className={['block font-serif text-[15.5px] sm:text-[16.5px]',
              noActive ? 'text-ivory' : 'text-ink'].join(' ')}>{(noneOpt && noneOpt.label) || 'していない'}</span>
          </span>
          <span
            className={[
              'w-4 h-4 border inline-flex items-center justify-center shrink-0 rounded-[1px]',
              noActive ? 'border-ivory bg-ivory' : 'border-line group-hover:border-ink',
            ].join(' ')}
            aria-hidden
          >
            {noActive && (
              <svg viewBox="0 0 12 12" className="w-2.5 h-2.5">
                <path d="M2 6.5 L 5 9 L 10 3" stroke="#1A1815" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            )}
          </span>
        </button>
      </div>

      {/* Detail options (only when Yes) */}
      {showDetails && (
        <div className="mt-6 anim-fade-up">
          <div className="flex items-center gap-3 mb-3">
            <span className="font-mono tracking-widest2 text-[10px] uppercase text-gold">— Detail</span>
            <span className="h-px flex-1 bg-line" />
          </div>
          {q.yesPrompt && (
            <p className="text-[12.5px] text-charcoal/70 mb-3 leading-relaxed">{q.yesPrompt}</p>
          )}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-1.5">
            {detailOptions.map((o, i) => {
              const active = value === o.v;
              return (
                <button
                  key={o.v}
                  type="button"
                  onClick={() => onChange(o.v)}
                  className={[
                    'group text-left px-4 sm:px-5 py-3.5 border transition-all flex items-center gap-4 rounded-[2px]',
                    active
                      ? 'bg-ink text-ivory border-ink'
                      : 'bg-white/70 text-charcoal border-line hover:border-ink',
                  ].join(' ')}
                >
                  <span className={['font-mono tracking-widest2 text-[10.5px] nums shrink-0',
                    active ? 'text-goldLight' : 'text-charcoal/35'].join(' ')}>
                    {String(i+1).padStart(2,'0')}
                  </span>
                  <span className={['flex-1 min-w-0 font-serif text-[15px] sm:text-[16px] leading-snug',
                    active ? 'text-ivory' : 'text-ink'].join(' ')}>
                    {o.label}
                  </span>
                  <span
                    className={[
                      'w-4 h-4 border inline-flex items-center justify-center shrink-0 rounded-[1px]',
                      active ? 'border-ivory bg-ivory' : 'border-line group-hover:border-ink',
                    ].join(' ')}
                    aria-hidden
                  >
                    {active && (
                      <svg viewBox="0 0 12 12" className="w-2.5 h-2.5">
