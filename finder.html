/* ---------- 章立て ---------- */
const QUIZ_CHAPTERS = [
  { id:'now',     index:1, title:'髪の悩みと特徴',     subTitle:'まず、いまの悩みと髪のタイプを伺います。',         startIdx:0,  endIdx:4  },
  { id:'history', index:2, title:'髪の履歴',           subTitle:'これまでの施術と、アイロンの使い方を伺います。',   startIdx:5,  endIdx:9  },
  { id:'daily',   index:3, title:'いまの生活',         subTitle:'普段の習慣と、まわりの環境を伺います。',           startIdx:10, endIdx:13 },
  { id:'goal',    index:4, title:'目指したい仕上がり', subTitle:'これから目指したい髪を伺います。',                 startIdx:14, endIdx:15 },
  { id:'salon',   index:5, title:'サロンでの相談',     subTitle:'ヘッドスパなど、サロンでのご提案について伺います。', startIdx:16, endIdx:17 },
];
function getChapterFor(idx) {
  return QUIZ_CHAPTERS.find(c => idx >= c.startIdx && idx <= c.endIdx) || QUIZ_CHAPTERS[0];
}
function isChapterStart(idx) {
  return QUIZ_CHAPTERS.some(c => c.startIdx === idx);
}

/* ---------- Quiz ---------- */
function isAnswered(q, val) {
  if (val == null) return false;
  if (q.type === 'heat-tools') {
    const tools = (val && val.tools) || [];
    const temp  = val && val.temp;
    // 「ほとんど使わない」を選んだ場合は温度設定不要
    if (tools.includes('rare')) return true;
    return tools.length > 0 && !!temp;
  }
  if (Array.isArray(val)) return val.length > 0;
  return true;
}

function buildModeASequence(answers) {
  return Q
    .map((q, i) => ({ q, originalIdx: i }))
    .filter(({ q }) => {
      if (typeof q.when !== 'function') return true;
      try { return !!q.when(answers); } catch (e) { return true; }
    });
}

function Quiz({ answers, setAnswers, onComplete, onBackHome }) {
  const sequence = useMemo(() => buildModeASequence(answers), [answers]);
  const total = sequence.length;
  const [idx, setIdx] = useState(0);
  const safeIdx = Math.min(idx, total - 1);
  const entry = sequence[safeIdx];
  const q = entry?.q;
  const value = q ? answers[q.id] : null;
  const valid = q ? isAnswered(q, value) : false;
  const chapter = entry ? getChapterFor(entry.originalIdx) : QUIZ_CHAPTERS[0];

  // この設問が章の最初に表示されるかを、現在のシーケンスから判定
  const showChapterIntro = useMemo(() => {
    if (!entry) return false;
    const firstInChapter = sequence.find(e => getChapterFor(e.originalIdx)?.id === chapter.id);
    return firstInChapter && firstInChapter.q.id === entry.q.id;
  }, [entry, sequence, chapter]);

  const setValue = (v) => setAnswers(prev => ({ ...prev, [q.id]: v }));

  const next = () => {
    if (!valid) return;
    if (safeIdx >= total - 1) onComplete();
    else setIdx(safeIdx + 1);
  };
  const back = () => {
    if (safeIdx === 0) onBackHome();
    else setIdx(safeIdx - 1);
  };

  useEffect(() => { window.scrollTo({ top: 0, behavior: 'instant' }); }, [safeIdx]);

  if (!q) return null;

  return (
    <div className="min-h-[100svh] bg-finder relative pb-32 sm:pb-36">
      <TopBar step={safeIdx + 1} total={total} />
      <div className="pt-[78px]">
        <ProgressBar current={safeIdx + 1} total={total} />
      </div>

      <main className="mx-auto max-w-2xl px-5 sm:px-8 pt-8 sm:pt-14 relative z-10">
        <div key={q.id} className="anim-quiz">
          {/* Chapter marker */}
          <div className="flex items-center gap-3 mb-6 sm:mb-8">
            <span className={`font-mono tracking-widest2 text-[10.5px] uppercase text-gold nums inline-block ${showChapterIntro ? 'milestone-pulse' : ''} px-2 py-0.5`}>
              Chapter {String(chapter.index).padStart(2,'0')}
            </span>
            <span className="h-px w-6 bg-gold/40" />
            <span className="font-serif text-[13px] sm:text-[14px] text-charcoal">
              {chapter.title}
            </span>
          </div>

          {showChapterIntro && (
            <div className="anim-quiz mb-7 sm:mb-9 border-l-2 border-gold pl-4 sm:pl-5" style={{ animationDelay:'120ms' }}>
              <p className="font-mono tracking-widest2 text-[10.5px] uppercase text-charcoal/55">
                ━ {chapter.id === 'now' ? 'はじめに' : `Chapter ${String(chapter.index).padStart(2,'0')}`} ━
              </p>
              <p className="mt-2 text-[13.5px] sm:text-[15px] text-ink leading-[1.85]">
                {chapter.subTitle}
              </p>
            </div>
          )}

          {/* Editorial Q header */}
          <div className="flex items-start gap-5 sm:gap-7">
            <div className="shrink-0 -mt-1">
              <p className="font-mono tracking-widest2 text-[10.5px] uppercase text-charcoal/55 mb-1">Question</p>
              <p className="font-serif text-[44px] sm:text-[58px] leading-none text-ink nums tracking-tight">
                {String(safeIdx + 1).padStart(2,'0')}
              </p>
              <p className="font-mono tracking-widest2 text-[10.5px] uppercase text-charcoal/40 mt-1 nums">
                / {String(total).padStart(2,'0')}
              </p>
            </div>
            <div className="flex-1 min-w-0 pt-1">
              <p className="font-mono tracking-widest2 text-[10.5px] uppercase text-gold mb-2">— {q.eyebrow}</p>
              <h2 className="font-serif text-[22px] sm:text-[28px] leading-[1.4] text-ink">
                {q.title}
              </h2>
            </div>
          </div>
          <div className="mt-5 h-px bg-line" />
          {q.note && <p className="mt-4 text-[12.5px] sm:text-[13px] text-charcoal/70 leading-[1.85]">{q.note}</p>}

          <QuestionCard question={q} value={value} onChange={setValue} />
        </div>
      </main>

      <nav className="fixed bottom-0 inset-x-0 bg-gradient-to-t from-ivory via-ivory/95 to-ivory/0 pt-6 pb-5 sm:pb-7 z-20">
        <div className="mx-auto max-w-2xl px-5 sm:px-8 flex items-center justify-between gap-4">
          <button
            onClick={back}
            className="font-mono tracking-widest2 text-[10.5px] sm:text-[11px] uppercase text-charcoal/65 hover:text-ink transition-colors inline-flex items-center gap-2"
          >
            <span className="inline-block w-5 h-px bg-charcoal/40" />
            {safeIdx === 0 ? 'Home' : 'Back'}
          </button>
          <button
            onClick={next}
            disabled={!valid}
            className={[
              'inline-flex items-center justify-center gap-3 px-6 sm:px-9 py-3.5 sm:py-4 rounded-[2px] font-mono text-[10.5px] sm:text-[11px] tracking-widest2 uppercase transition-all',
              valid
                ? 'bg-ink text-ivory hover:bg-charcoal'
                : 'bg-mist text-charcoal/40 cursor-not-allowed',
            ].join(' ')}
          >
            <span className={valid ? 'text-goldLight' : 'text-charcoal/40'}>
              {safeIdx >= total - 1 ? 'Submit' : 'Next'}
            </span>
            <span className="font-serif normal-case tracking-normal text-[13px] sm:text-[14px]">
              {safeIdx >= total - 1 ? '診断結果を見る' : '次へ'}
            </span>
            <span className={['inline-block w-4 h-px transition-all', valid ? 'bg-ivory' : 'bg-charcoal/30'].join(' ')} />
          </button>
        </div>
      </nav>
    </div>
  );
}

/* ---------- QuizDeep — Mode B 詳しいカルテ ---------- */
function QuizDeep({ answers, setAnswers, onComplete, onBackHome }) {
  // 動的シーケンス: 回答に応じて条件分岐をスキップ
  const sequence = useMemo(() => buildModeBSequence(answers), [answers]);
  const total = sequence.length;
  const [idx, setIdx] = useState(0);
  const safeIdx = Math.min(idx, total - 1);
  const entry = sequence[safeIdx];
  const q = entry ? QUESTION_LOOKUP[entry.id] : null;
  const value = q ? answers[q.id] : null;
  const valid = q ? isAnswered(q, value) : false;

  const stepInfo = MODE_B_STEPS.find(s => s.index === (entry?.step || 1)) || MODE_B_STEPS[0];

  // この設問が、その step の最初に表示される設問かどうか
  const isStepStart = useMemo(() => {
    if (!entry) return false;
    const firstOfStep = sequence.find(e => e.step === entry.step);
    return firstOfStep && firstOfStep.id === entry.id;
  }, [entry, sequence]);

  const setValue = (v) => setAnswers(prev => ({ ...prev, [q.id]: v }));

  const next = () => {
    if (!valid) return;
    if (safeIdx >= total - 1) onComplete();
    else setIdx(safeIdx + 1);
  };
  const back = () => {
    if (safeIdx === 0) onBackHome();
    else setIdx(safeIdx - 1);
  };

  useEffect(() => { window.scrollTo({ top: 0, behavior: 'instant' }); }, [safeIdx]);

  if (!q) return null;

  return (
    <div className="min-h-[100svh] bg-finder relative pb-32 sm:pb-36">
      <TopBar step={safeIdx + 1} total={total} />
      <div className="pt-[78px]">
        <ProgressBar current={safeIdx + 1} total={total} />
      </div>

      <main className="mx-auto max-w-2xl px-5 sm:px-8 pt-8 sm:pt-14 relative z-10">
        <div key={q.id} className="anim-fade-up">
          {/* STEP marker */}
          <div className="flex items-center gap-3 mb-6 sm:mb-8">
            <span className="font-mono tracking-widest2 text-[10.5px] uppercase text-gold nums">
              STEP {String(stepInfo.index).padStart(2,'0')}
            </span>
            <span className="h-px w-6 bg-gold/40" />
            <span className="font-serif text-[13px] sm:text-[14px] text-charcoal">
              {stepInfo.title}
            </span>
            <span className="ml-auto font-mono tracking-widest2 text-[10.5px] uppercase text-charcoal/45">
              詳しいカルテ
            </span>
          </div>

          {isStepStart && (
            <div className="anim-fade-up mb-7 sm:mb-9 border-l-2 border-gold pl-4 sm:pl-5">
              <p className="font-mono tracking-widest2 text-[10.5px] uppercase text-charcoal/55">
                ━ STEP {String(stepInfo.index).padStart(2,'0')} ━
              </p>
              <p className="mt-2 font-serif text-[15px] sm:text-[17px] text-ink leading-[1.85]">
                {stepInfo.desc}
              </p>
            </div>
          )}

          {/* Editorial Q header */}
          <div className="flex items-start gap-5 sm:gap-7">
            <div className="shrink-0 -mt-1">
              <p className="font-mono tracking-widest2 text-[10.5px] uppercase text-charcoal/55 mb-1">Question</p>
              <p className="font-serif text-[44px] sm:text-[58px] leading-none text-ink nums tracking-tight">
                {String(safeIdx + 1).padStart(2,'0')}
              </p>
              <p className="font-mono tracking-widest2 text-[10.5px] uppercase text-charcoal/40 mt-1 nums">
                / {String(total).padStart(2,'0')}
              </p>
            </div>
            <div className="flex-1 min-w-0 pt-1">
              <p className="font-mono tracking-widest2 text-[10.5px] uppercase text-gold mb-2">— {q.eyebrow}</p>
              <h2 className="font-serif text-[22px] sm:text-[28px] leading-[1.4] text-ink">
                {q.title}
              </h2>
            </div>
          </div>
          <div className="mt-5 h-px bg-line" />
          {q.note && <p className="mt-4 text-[12.5px] sm:text-[13px] text-charcoal/70 leading-[1.85]">{q.note}</p>}

          <QuestionCard question={q} value={value} onChange={setValue} />
        </div>
      </main>

      <nav className="fixed bottom-0 inset-x-0 bg-gradient-to-t from-ivory via-ivory/95 to-ivory/0 pt-6 pb-5 sm:pb-7 z-20">
        <div className="mx-auto max-w-2xl px-5 sm:px-8 flex items-center justify-between gap-4">
          <button
            onClick={back}
            className="font-mono tracking-widest2 text-[10.5px] sm:text-[11px] uppercase text-charcoal/65 hover:text-ink transition-colors inline-flex items-center gap-2"
          >
            <span className="inline-block w-5 h-px bg-charcoal/40" />
            {safeIdx === 0 ? 'Home' : 'Back'}
          </button>
          <button
            onClick={next}
            disabled={!valid}
            className={[
              'inline-flex items-center justify-center gap-3 px-6 sm:px-9 py-3.5 sm:py-4 rounded-[2px] font-mono text-[10.5px] sm:text-[11px] tracking-widest2 uppercase transition-all',
              valid
                ? 'bg-ink text-ivory hover:bg-charcoal'
                : 'bg-mist text-charcoal/40 cursor-not-allowed',
            ].join(' ')}
          >
            <span className={valid ? 'text-goldLight' : 'text-charcoal/40'}>
              {safeIdx >= total - 1 ? 'Submit' : 'Next'}
            </span>
            <span className="font-serif normal-case tracking-normal text-[13px] sm:text-[14px]">
              {safeIdx >= total - 1 ? '詳しい結果を見る' : '次へ'}
            </span>
            <span className={['inline-block w-4 h-px transition-all', valid ? 'bg-ivory' : 'bg-charcoal/30'].join(' ')} />
          </button>
        </div>
      </nav>
    </div>
  );
}

/* ---------- HairChart ---------- */
function HairChart({ chart }) {
  const entries = Object.entries(chart);
  return (
    <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-10 gap-y-5">
      {entries.map(([label, v]) => {
        const pct = (v / 5) * 100;
        const level = levelLabel(v);
        const tone = level === 'Keep' ? 'text-charcoal/70' : level === 'Care' ? 'text-roseAccent' : 'text-gold';
        const barColor = level === 'Intensive Care' ? '#B8945A' : level === 'Care' ? '#C9A089' : '#3D3833';
        return (
          <div key={label}>
            <div className="flex items-baseline justify-between">
              <span className="font-serif text-[14.5px] text-ink">{label}</span>
              <span className={`font-mono tracking-widest2 text-[10.5px] uppercase ${tone}`}>{level}</span>
            </div>
            <div className="mt-2 h-px bg-line/80 relative">
              <div
                className="absolute left-0 anim-bar"
                style={{
                  width: `${Math.max(4, pct)}%`,
                  background: barColor,
                  height: '2px',
                  top: '-0.5px',
                }}
              />
            </div>
            <div className="mt-1.5 flex justify-between text-[10px] tracking-widest2 uppercase text-charcoal/35 nums">
              <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function clampVal(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function computeKarteRadar(answers, scores) {
  const a = answers || {};
  const s = scores || {};

  let lightness = 3;
  if (a.thickness === 'thin')   lightness += 1;
  if (a.thickness === 'thick')  lightness -= 1;
  if (a.density === 'low')      lightness += 1;
  if (a.density === 'high')     lightness -= 1;
  if (s.bleachHistory >= 3)     lightness += 1;
  lightness = clampVal(Math.round(lightness), 1, 5);

  let luster = 4;
  if (s.damage >= 5)        luster -= 2;
  else if (s.damage >= 3)   luster -= 1;
  if (s.heatDamage >= 4)    luster -= 1;
  if (s.colorFade >= 3)     luster -= 1;
  if (s.bleachHistory >= 4) luster -= 1;
  luster = clampVal(Math.round(luster), 1, 5);

  let smoothness = 4;
  if (a.wave === 'humid' || a.wave === 'surface') smoothness -= 1;
  if (a.wave === 'root'  || a.wave === 'midEnd')  smoothness -= 2;
  if (a.wave === 'whole')                          smoothness -= 3;
  if (a.wave === 'straightened')                   smoothness += 1;
  if (s.frizz >= 3) smoothness -= 1;
  smoothness = clampVal(Math.round(smoothness), 1, 5);

  let volume = 3;
  if (a.thickness === 'thick') volume += 1;
  if (a.thickness === 'thin')  volume -= 1;
  if (a.density === 'high')    volume += 1;
  if (a.density === 'low')     volume -= 1;
  if (s.volumeLoss >= 2)       volume -= 1;
  if (a.wave === 'humid' || a.wave === 'whole') volume += 1;
  volume = clampVal(Math.round(volume), 1, 5);

  let scalp = 4;
  if (s.scalpDryness  >= 3) scalp -= 2;
  else if (s.scalpDryness  >= 2) scalp -= 1;
  if (s.scalpOiliness >= 3) scalp -= 2;
  else if (s.scalpOiliness >= 2) scalp -= 1;
  scalp = clampVal(Math.round(scalp), 1, 5);

  return [lightness, luster, smoothness, volume, scalp];
}

   Position 1 (太さ): F=Fine(細) / N=Normal(普通) / T=Thick(太)
   Position 2 (多さ): L=Low(少)   / N=Normal(普通) / H=High(多)

  const a = answers || {};
  // Position 1: Thickness
  const t = a.thickness === 'thick' ? 'T' : (a.thickness === 'normal' ? 'N' : 'F');
  // Position 2: Density (L=Low少, N=Normal普通, H=High多)
  const d = a.density === 'high' ? 'H' : (a.density === 'normal' ? 'N' : 'L');
  // Position 3: Wave 統合: straightened/none → S, humid/surface → W, midEnd/root/whole → C
  let w = 'S';
  if (a.wave === 'humid' || a.wave === 'surface')      w = 'W';
  else if (['midEnd','root','whole'].includes(a.wave)) w = 'C';
  return t + d + w;  // 例: NNW = 普通+普通+少しクセ = 木洩れ日
}

const KARTE_GOAL_TEXTURE_TO_DIR = {
  moist:'C', glossy:'B', firm:'D', smooth:'C', airy:'D', soft:'A',
};
const KARTE_GOAL_INTENT_TO_DIR = {
  growLong:'C', keepColor:'A', firm:'D', easy:'C', ends:'C', idle:'A',
};

function selectGoalDirection(answers, radar) {
  const a = answers || {};
  if (a.goalTexture && KARTE_GOAL_TEXTURE_TO_DIR[a.goalTexture]) return KARTE_GOAL_TEXTURE_TO_DIR[a.goalTexture];
  if (a.goal && KARTE_GOAL_INTENT_TO_DIR[a.goal])                return KARTE_GOAL_INTENT_TO_DIR[a.goal];
  // フォールバック: もっとも低い軸を伸ばす
  const order = ['A','B','C','D'];
  const idx = [0,1,2,3].sort((x,y) => radar[x] - radar[y])[0];
  return order[idx];
}

function selectPoeticStates(answers, scores, maxCount = 2) {
  const matched = KARTE_POETIC_STATES
    .filter(st => { try { return st.match(scores, answers); } catch(e){ return false; } })
    .sort((a,b) => b.priority - a.priority);
  // 必ず1つは出す
  const picked = matched.slice(0, maxCount);
  if (picked.length) return picked;
  const fallback = KARTE_POETIC_STATES.find(s => s.id === 'calm') || KARTE_POETIC_STATES[KARTE_POETIC_STATES.length - 1];
  return [fallback];
}

function selectAdviceKey(scores) {
  const s = scores || {};
  if (s.heatDamage >= 4)     return 'heat';
  if (s.damage >= 5)         return 'damage';
  if (s.scalpDryness >= 2 || s.scalpOiliness >= 2) return 'scalp';
  if (s.frizz >= 3)          return 'frizz';
  if (s.colorFade >= 3)      return 'color';
  if (s.dryness >= 3)        return 'dry';
  if (s.volumeLoss >= 2)     return 'volume';
  return 'calm';
}

function deriveTargetRadar(currentRadar, direction) {
  const t = [...currentRadar];
  // 軸: [透明感, 艶, まとまり, 華やぎ, 頭皮]
  const boost = (i, n) => { t[i] = Math.min(5, t[i] + n); };
  if (direction === 'A') { boost(0, 2); boost(1, 1); } // 透明感の道
  if (direction === 'B') { boost(1, 2); boost(2, 1); } // 艶の道
  if (direction === 'C') { boost(2, 2); boost(1, 1); } // まとまりの道
  if (direction === 'D') { boost(3, 2); boost(1, 1); } // 華やぎの道
  // 頭皮は常に少し改善
  boost(4, 1);
  return t;
}

function resolveKarteAnimal(answers, scores) {
  const radar = computeKarteRadar(answers, scores);
  // キャラ既知ショートカット: ユーザーが picker で選んだ id、または共有URLの id を最優先
  const forcedId = answers && (answers._knownOriginId || answers._sharedOriginId);
  const originId = (forcedId && KARTE_ORIGIN_ANIMALS[forcedId])
    ? forcedId
    : selectOriginAnimalId(answers, scores, radar);
  const origin = KARTE_ORIGIN_ANIMALS[originId];

  const direction = selectGoalDirection(answers, radar);
  const mainGoalId = origin.targets[direction];

  const subDirs = ['A','B','C','D'].filter(d => d !== direction);
  const subGoals = subDirs.map(d => ({ dir:d, id: origin.targets[d] }));

  const states = selectPoeticStates(answers, scores, 2);
  const stateText = states.map(s => s.text).join('、');

  const adviceKey = selectAdviceKey(scores);
  const adviceText = KARTE_ADVICE[adviceKey];

  const targetRadar = deriveTargetRadar(radar, direction);

  return {
    radar, targetRadar,
    originId, origin,
    direction,
    mainGoalId, mainGoal: KARTE_GOAL_ANIMALS[mainGoalId],
    subGoals: subGoals.map(g => ({ dir:g.dir, id:g.id, goal: KARTE_GOAL_ANIMALS[g.id] })),
    stateText, states,
    adviceKey, adviceText,
  };
}

function listAnimalsForCollection(filter = 'all') {
  const arr = Object.entries(KARTE_ORIGIN_ANIMALS).map(([id, a]) => ({ id, ...a }));
  if (filter === 'all') {
    return arr.sort((x,y) => (y.rarity || 0) - (x.rarity || 0));
  }
  // 方向フィルタ: その方向にメインの進化先がある動物のうち、レアリティ降順
  return arr
    .filter(a => a.targets && a.targets[filter])
    .sort((x,y) => (y.rarity || 0) - (x.rarity || 0));
}

function buildCurrentCondition(radar) {
  if (!radar || radar.length !== 5) return null;
  const labels = ['透明感', '艶', 'まとまり', '華やぎ', '頭皮'];
  const items = labels.map((l, i) => ({ label: l, score: (radar[i] || 0) * 20 }));
  const sorted = [...items].sort((a, b) => a.score - b.score);
  const lowest = sorted[0];
  if (!lowest) return null;
  if (lowest.score >= 40) {
    return '整いやすい土台ができている、整えるほど映える状態。';
  }
  return CURRENT_CONDITION_BY_AXIS[lowest.label] || '本来の質を取り戻していく時期。';
}

/* ---------- KartePentagon — 5軸レーダーチャート(現在 vs 目標) ---------- */
function KartePentagon({ values, targetValues, palette = 'gold' }) {
  const size = 240;
  const cx = size / 2;
  const cy = size / 2 + 4;
  const maxR = 82;
  const angleFor = i => (-90 + 72 * i) * Math.PI / 180;

  const accent = palette === 'ivory' ? '#D9BE93' : '#B8945A';
  const targetAccent = '#D9BE93';
  const labelColor = palette === 'ivory' ? '#E7E4DE' : '#3D3833';
  const valueColor = palette === 'ivory' ? '#D9BE93' : '#B8945A';
  const gridColor  = palette === 'ivory' ? 'rgba(217,190,147,0.25)' : '#E7E4DE';
  const outerGrid  = palette === 'ivory' ? 'rgba(217,190,147,0.45)' : '#D6C7B0';

  const vertex = (val, i) => {
    const r = (val / 5) * maxR;
    const a = angleFor(i);
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  };
  const dataPts  = values.map((v,i) => vertex(v,i));
  const dataStr  = dataPts.map(p => p.join(',')).join(' ');
  const targetPts = (targetValues || []).map((v,i) => vertex(v,i));
  const targetStr = targetPts.map(p => p.join(',')).join(' ');
  const gridStr  = [1,2,3,4,5].map(lv => values.map((_,i) => vertex(lv,i).join(',')).join(' '));
  const axisEnd  = (i) => vertex(5, i);
  const labels   = KARTE_AXES.map(x => x.label);
  const labelPos = (i) => {
    const a = angleFor(i);
    const r = maxR + 22;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  };

  return (
    <svg viewBox={`0 0 ${size} ${size}`} className="w-full h-auto max-w-[260px] mx-auto" aria-hidden>
      {gridStr.map((pts, i) => (
        <polygon key={i} points={pts} fill="none" stroke={i === 4 ? outerGrid : gridColor} strokeWidth={i === 4 ? 0.9 : 0.7} />
      ))}
      {values.map((_, i) => {
        const end = axisEnd(i);
        return <line key={`ax${i}`} x1={cx} y1={cy} x2={end[0]} y2={end[1]} stroke={gridColor} strokeWidth="0.7" />;
      })}

      {/* 目標値(あれば)を点線で薄く描く */}
      {targetValues && (
        <>
          <polygon
            points={targetStr}
            fill={targetAccent}
            fillOpacity={palette === 'ivory' ? 0.10 : 0.08}
            stroke={targetAccent}
            strokeWidth="1.2"
            strokeDasharray="3 3"
            style={{ animation: 'karte-target-fade 1600ms ease-out 400ms both' }}
          />
          {targetPts.map((p, i) => (
            <circle key={`tpt${i}`} cx={p[0]} cy={p[1]} r="2.0" fill={targetAccent} opacity="0.7" />
          ))}
        </>
      )}

      {/* 現在値 */}
      <polygon
        points={dataStr}
        fill={accent} fillOpacity={palette === 'ivory' ? 0.22 : 0.16}
        stroke={accent} strokeWidth="1.4"
      />
      {dataPts.map((p, i) => (
        <circle key={`pt${i}`} cx={p[0]} cy={p[1]} r="2.6" fill={accent} />
      ))}

      {labels.map((lb, i) => {
        const [x,y] = labelPos(i);
        return (
          <g key={`lb${i}`}>
            <text x={x} y={y - 6} textAnchor="middle"
                  style={{ fontFamily:'"Inter", "Noto Sans JP", system-ui, sans-serif', fontSize:'11px', fontWeight: 600, fill: labelColor, letterSpacing:'0.1em' }}>
              {lb}
            </text>
            <text x={x} y={y + 10} textAnchor="middle"
                  style={{ fontFamily:'"Cormorant Garamond", serif', fontSize:'14px', fontWeight: 500, fill: valueColor }}>
              {values[i]}{targetValues && targetValues[i] !== values[i] && (
                <tspan dx="2" style={{ fill: targetAccent, fontSize:'10px' }}>→{targetValues[i]}</tspan>
              )}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

/* ---------- KarteMiniPentagon — 図鑑用の小型レーダー ---------- */
function KarteMiniPentagon({ values, size = 110 }) {
  const cx = size / 2;
  const cy = size / 2 + 2;
  const maxR = size * 0.36;
  const angleFor = i => (-90 + 72 * i) * Math.PI / 180;
  const vertex = (val, i) => {
    const r = (val / 5) * maxR;
    const a = angleFor(i);
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  };
  const dataPts = values.map((v, i) => vertex(v, i));
  const dataStr = dataPts.map(p => p.join(',')).join(' ');
  const outline = values.map((_, i) => vertex(5, i).join(',')).join(' ');
  const grid3   = values.map((_, i) => vertex(3, i).join(',')).join(' ');
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} aria-hidden>
      <polygon points={outline} fill="none" stroke="#D6C7B0" strokeWidth="0.7" />
      <polygon points={grid3}   fill="none" stroke="#E7E4DE" strokeWidth="0.5" />
      <polygon points={dataStr} fill="#B8945A" fillOpacity="0.18" stroke="#B8945A" strokeWidth="1.1" />

// ── 縮毛矯正ユーザー向け動的コピー差し替え
// answers.straighten が 'none'/'past' 以外、または answers.wave === 'straightened' の場合、
// MWA/AWP/SCA(波・くせ系キャラ)のコピーを「ストレートに整えた今のあなた」向けに調整。
function isCurrentlyStraightened(answers) {
  if (!answers) return false;
  const st = answers.straighten;
  const wave = answers.wave;
  const activeStraightening = st && st !== 'none' && st !== 'past';
  return activeStraightening || wave === 'straightened';
}

function adaptOriginForStraightening(origin, answers) {
  if (!origin || !origin.code) return origin;
  if (!isCurrentlyStraightened(answers)) return origin;
  const waveCodes = ['MWA', 'AWP', 'SCA'];
  if (!waveCodes.includes(origin.code)) return origin;

  // 各波系キャラに対する「ストレート派」用のオーバーライド
  const overrides = {
    MWA: {
      personality: '本来は独特な揺らぎを宿す髪。今は薬剤の力でまっすぐに整えていますが、その内側には誰にもまねできない繊細さと表情が眠っています。仕上げ方を自由に選べる、稀有なタイプ。',
      charmHint: '整えるほどに艶を纏う、深い静けさ。',
      dailyMood: 'ストレートが綺麗にキープできた日の、自分への小さな拍手。',
      suitableStyles: ['つややかなストレートロング', '繊細レイヤーミディアム', 'シャープなボブ', '上品なまとめ髪'],
    },
    AWP: {
      personality: 'もとは軽やかなくせを抱える髪。今はまっすぐに整え、ふんわりとした繊細さだけが残るようにケアされています。素材の繊細さは、ストレートでも品となって滲み出ます。',
      charmHint: '春風そのもののような、軽やかな艶。',
      dailyMood: 'ふんわりとしたシルエットが、いちばん上手く決まった朝。',
      suitableStyles: ['ふんわりストレートボブ', '前髪パーマでメリハリ', 'シースルーバング', '繊細なレイヤーミディアム'],
    },
    SCA: {
      personality: '光の角度で表情が変わるアレキサンドライトのような髪。今はストレートに整えることで、本来の艶と流れがより上品に際立つようになっています。',
      charmHint: '光を受けて、奥行きのあるツヤを見せる髪。',
      dailyMood: '艶やかにまっすぐ流れる髪を、ふと鏡で確認したくなる日。',
      suitableStyles: ['ストレートロング', '上品なシャープボブ', '艶感のあるミディアム', 'なめらかなまとめ髪'],
    },
  };
  const ov = overrides[origin.code];
  return ov ? { ...origin, ...ov } : origin;
}

/* ──────────────────────────────────────────
   VisitSeamSection — Apple新製品ページ風 minimal & exciting
   - 大胆な1行ステートメント
   - 3つの体験ブロック（スクロールトリガーで滑らかにフェードイン）
   - 単一の主役CTA
   ────────────────────────────────────────── */
function useScrollReveal() {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    if (!ref.current || !('IntersectionObserver' in window)) { setShown(true); return; }
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setShown(true); obs.disconnect(); } },
      { rootMargin: '0px 0px -15% 0px', threshold: 0.08 }
    );
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, shown];
}

function VisitReveal({ children, delay = 0, direction = 'up' }) {
  const [ref, shown] = useScrollReveal();
  const dy = direction === 'up' ? 28 : -16;
  return (
    <div
      ref={ref}
      style={{
        opacity: shown ? 1 : 0,
        transform: shown ? 'translateY(0) scale(1)' : `translateY(${dy}px) scale(0.985)`,
        transition: `opacity 0.9s cubic-bezier(0.16,1,0.3,1) ${delay}ms, transform 1s cubic-bezier(0.16,1,0.3,1) ${delay}ms`,
        willChange: 'opacity, transform',
      }}
    >
      {children}
    </div>
  );
}

            <span aria-hidden className="block w-12 h-px bg-gold/55 mx-auto mt-7" />
            <p className="mt-6 text-[14.5px] sm:text-[16px] leading-[2] text-charcoal/80 max-w-md mx-auto">

        {/* 二層の診断 — オンラインで読み解き 店頭で確かめる */}
        <VisitReveal delay={60}>
          <div className="mt-16 sm:mt-20">
            <p className="text-center font-mono tracking-widest3 text-[10px] uppercase text-gold mb-6" style={{ letterSpacing: '0.32em' }}>— Online × In Store</p>
            <div className="grid sm:grid-cols-2 gap-3 sm:gap-4 max-w-2xl mx-auto">
              <div className="bg-white/80 border border-gold/25 rounded-[2px] px-5 py-6 text-center">
                <p className="font-mono tracking-widest2 text-[9.5px] uppercase text-charcoal/50">Layer 1 · Online</p>
                <h4 className="mt-2.5 font-serif text-[17px] sm:text-[18px] text-ink leading-snug">質問から読み解く</h4>
                <p className="mt-3 text-[12.5px] leading-[1.95] text-charcoal/75">
                  美容師の知見をもとにしたロジックが<br />
                  回答から髪の履歴まで読み解きます
                </p>
              </div>
              <div className="bg-white/80 border border-gold/25 rounded-[2px] px-5 py-6 text-center">
                <p className="font-mono tracking-widest2 text-[9.5px] uppercase text-charcoal/50">Layer 2 · In Store</p>
                <h4 className="mt-2.5 font-serif text-[17px] sm:text-[18px] text-ink leading-snug">プロが直接確かめる</h4>
                <p className="mt-3 text-[12.5px] leading-[1.95] text-charcoal/75">
                  店頭では髪と頭皮の状態を間近で確認し<br />
                  カルテをあなた専用に仕上げます
                </p>
              </div>
            </div>
          </div>
        </VisitReveal>

        {/* 3 Feature Blocks */}
        <div className="mt-24 sm:mt-32 space-y-24 sm:space-y-36">
          {blocks.map((b, i) => {
            const reverse = i % 2 === 1;
            const Placeholder = (
              <div
                className="relative w-full overflow-hidden rounded-[2px]"
                style={{
                  aspectRatio: '4/3',
                  background: 'linear-gradient(160deg, #FFFFFF 0%, #F4ECDA 100%)',
                  borderTop: '1px solid rgba(184,148,90,0.25)',
                  borderBottom: '1px solid rgba(184,148,90,0.25)',
                }}
              >
                {b.img && (
                  <img
                    src={b.img}
                    alt={b.title}
                    loading="lazy"
                    className="absolute inset-0 w-full h-full object-cover"
                    onError={(e) => { e.target.style.display = 'none'; }}
                  />
                )}
                {/* ゴールドのコーナーフレーム */}
                <span aria-hidden className="absolute top-2 left-2 w-2.5 h-2.5 border-t border-l border-gold/60 z-10" />
                <span aria-hidden className="absolute top-2 right-2 w-2.5 h-2.5 border-t border-r border-gold/60 z-10" />
                <span aria-hidden className="absolute bottom-2 left-2 w-2.5 h-2.5 border-b border-l border-gold/60 z-10" />
                <span aria-hidden className="absolute bottom-2 right-2 w-2.5 h-2.5 border-b border-r border-gold/60 z-10" />
                {/* 番号 */}
                <span
                  aria-hidden
                  className="absolute bottom-2.5 right-3.5 font-serif italic text-white z-10"
                  style={{ fontSize: 'clamp(40px, 7vw, 72px)', lineHeight: 1, letterSpacing: '-0.04em', textShadow: '0 1px 10px rgba(40,30,15,0.45)' }}
                >{b.num}</span>
              </div>
            );
            const TextCol = (
              <div>
                <p className="font-mono tracking-widest3 text-[10px] uppercase text-gold mb-3" style={{ letterSpacing: '0.32em' }}>— {b.eyebrow}</p>
                <h3
                  className="font-serif text-ink leading-[1.2]"
                  style={{
                    fontSize: 'clamp(22px, 4vw, 32px)',
                    letterSpacing: '-0.012em',
                    fontWeight: 600,
                    wordBreak: 'keep-all',
                    overflowWrap: 'break-word',
                  }}
                >
                  {b.title}
                </h3>
                <p className="mt-5 text-[14px] sm:text-[15px] leading-[2] text-charcoal/80" style={{ wordBreak: 'keep-all', overflowWrap: 'break-word' }}>
                  {b.body}
                </p>
              </div>
            );
            return (
              <VisitReveal key={b.num} delay={i * 60}>
                <article className="grid sm:grid-cols-2 gap-8 sm:gap-14 items-center">
                  {reverse ? (
                    <>{TextCol}{Placeholder}</>
                  ) : (
                    <>{Placeholder}{TextCol}</>
                  )}
                </article>
              </VisitReveal>
            );
          })}
        </div>

        {/* Primary CTA */}
        <VisitReveal delay={120}>
          <div className="mt-28 sm:mt-36 text-center">
            <p className="font-mono tracking-widest3 text-[10.5px] uppercase text-gold mb-3" style={{ letterSpacing: '0.32em' }}>— Find a Store</p>
            <h3
              className="font-serif text-ink leading-[1.25] mb-7"
              style={{
                fontSize: 'clamp(22px, 4vw, 32px)',
                letterSpacing: '-0.012em',
                fontWeight: 600,
                wordBreak: 'keep-all',
                overflowWrap: 'break-word',
              }}
            >
              <span style={{ display: 'inline-block' }}>全国{typeof SEAM_STORES !== 'undefined' ? SEAM_STORES.length : 7}拠点で、</span>
              <span style={{ display: 'inline-block' }}>お待ちしています。</span>
            </h3>
            <a
              href="#visit-seam-stores"
              onClick={(e) => { e.preventDefault(); const el = document.getElementById('visit-seam-stores'); if (el) el.scrollIntoView({behavior:'smooth'}); }}
              className="inline-flex items-center gap-3 px-9 py-4 bg-ink text-ivory hover:bg-charcoal transition-all font-serif text-[15px] sm:text-[16px] rounded-full"
              style={{ boxShadow: '0 8px 24px -6px rgba(40,38,36,0.35)' }}
            >
              <span>近くのSEAMを探す</span>
              <span className="text-[14px]">→</span>
            </a>
          </div>
        </VisitReveal>

        {/* Store list — collapsible/inline */}
        <VisitReveal delay={180}>
          <div id="visit-seam-stores" className="mt-24 sm:mt-32 scroll-mt-[96px]">
            <div className="text-center mb-10">
              <p className="font-mono tracking-widest3 text-[10.5px] uppercase text-gold mb-3" style={{ letterSpacing: '0.32em' }}>— Stores</p>
              <h3 className="font-serif text-[22px] sm:text-[28px] text-ink leading-tight" style={{ letterSpacing: '-0.012em', fontWeight: 600 }}>
                SEAM 認定サロン
              </h3>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5">
              {(typeof SEAM_STORES !== 'undefined' ? SEAM_STORES : []).map((s, i) => <StoreCard key={s.id} store={s} index={i} />)}
            </div>
          </div>
        </VisitReveal>
      </div>
    </section>
  );
}

/* ──────────────────────────────────────────
   CounselingSheet — 美容師さんと共有するテキストのみのカルテ
   ────────────────────────────────────────── */
const STRAIGHTEN_LABEL = {
  none: 'していない',
  yearly: '年1回程度',
  biannual: '半年に1回',
  quarterly: '3ヶ月に1回',
  frequent: '2ヶ月に1回以上(年6回以上・頻繁)',
  kaizen: '髪質改善・酸性ストレートを定期的に',
  past: '過去にしていた',
};
const PERM_LABEL = {
  none: 'していない', past: '過去にしていた',
  yearly: '年1回程度', biannual: '半年に1回',
  quarterly: '3ヶ月に1回', frequent: '頻繁(年5回以上)',
};
const COLOR_LABEL = {
  none: 'していない',
  retouch_6w: '根元リタッチを1〜2ヶ月ごと',
  retouch_2m: '根元リタッチを2〜3ヶ月ごと',
  full_3m: '全頭カラーを3ヶ月ごと',
  full_6m: '全頭カラーを半年に1回',
  highlight: 'ハイライト/ローライト',
};
const BLEACH_LABEL = {
  none: 'していない', past: '過去にしていた',
  single: 'シングルカラー', double: 'ダブルカラー以上',
  retouch: 'リタッチでブリーチを継続',
};
const WAVE_LABEL = {
  none: 'ストレート', wave: 'ゆるい波・くせ', curly: 'くせ強め',
  straightened: '縮毛矯正で整えている',
  surface: '表面に出るくせ', humid: '湿気でうねりやすい',
  partial: '部分的なくせ', overall: '全体的にくせあり',
};
const CS_THICKNESS_LABEL = { thin: '細め', normal: '普通', thick: '太め' };
const CS_AMOUNT_LABEL = { few: '少なめ', normal: '普通', many: '多め' };
const CS_LENGTH_LABEL = {
  short: 'ショート', bob: 'ボブ', shoulderUp: '肩上',
  shoulderDown: '肩下', chestUp: '胸上', long: 'ロング',
};
const CS_TEMP_LABEL = { t150: '〜150℃', t180: '180℃', t200: '200℃以上' };
const CS_TOOL_LABEL = {
  iron: 'ストレートアイロン', curler: 'カールアイロン',
  bangs: '前髪アイロン', dryer: 'ドライヤー',
};

function CounselingSheet({ karte, answers, onSaveImage }) {
  const o = karte?.origin;
  if (!o) return null;
  const typeShort = (typeof TYPE_SHORT_NAME !== 'undefined') ? TYPE_SHORT_NAME[o.code] : null;
  const a = answers || {};

  const today = new Date();
  const todayStr = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;

  /* === 質問定義から値→ラベルを動的解決するヘルパー === */
  const QL = (typeof QUESTION_LOOKUP !== 'undefined') ? QUESTION_LOOKUP : {};
  const lookupLabel = (qid, value) => {
    if (value === undefined || value === null || value === '') return null;
    const q = QL[qid];
    if (!q || !q.options) return String(value);
    const opt = q.options.find(o => o.v === value);
    if (!opt) return String(value);
    // sub があれば併記(美容師さんに正確に伝わるため)
    return opt.sub ? `${opt.label}（${opt.sub}）` : opt.label;
  };
  const lookupLabelShort = (qid, value) => {
    if (value === undefined || value === null || value === '') return null;
    const q = QL[qid];
    if (!q || !q.options) return String(value);
    const opt = q.options.find(o => o.v === value);
    return opt ? opt.label : String(value);
  };
  const lookupMulti = (qid, values) => {
    if (!Array.isArray(values) || values.length === 0) return null;
    return values.map(v => lookupLabelShort(qid, v) || v).join('・');
  };

  /* === 各セクションのデータ === */
  // 基本情報 (年代・性別・長さ)
  const basicItems = [];
  if (a.age && a.age !== 'noanswer') basicItems.push(['年代', lookupLabelShort('age', a.age)]);
  if (a.gender && a.gender !== 'noanswer') basicItems.push(['性別', lookupLabelShort('gender', a.gender)]);
  if (a.length) basicItems.push(['長さ', lookupLabelShort('length', a.length)]);

  // 髪質
  const traitItems = [];
  if (a.thickness) traitItems.push(['髪の細さ', lookupLabelShort('thickness', a.thickness)]);
  if (a.density) traitItems.push(['髪の量・密度', lookupLabelShort('density', a.density)]);
  if (a.rootVolume) traitItems.push(['根元の立ち上がり', lookupLabel('rootVolume', a.rootVolume)]);
  if (a.wave) traitItems.push(['くせ・うねり', lookupLabelShort('wave', a.wave)]);

  // 頭皮
  const scalpItems = [];
  if (a.scalpType) scalpItems.push(['頭皮の状態', lookupLabel('scalpType', a.scalpType)]);
  if (a.scalpSensitivity) scalpItems.push(['頭皮の敏感さ', lookupLabel('scalpSensitivity', a.scalpSensitivity)]);
  {
    const allergyVal = Array.isArray(a.scalpAllergy)
      ? a.scalpAllergy.map(v => lookupLabel('scalpAllergy', v)).filter(Boolean).join('、')
      : (a.scalpAllergy ? lookupLabel('scalpAllergy', a.scalpAllergy) : null);
    if (allergyVal) scalpItems.push(['アレルギー・薬剤反応', allergyVal]);
  }

  // カラー履歴
  const colorItems = [];
  if (a.color) colorItems.push(['カラー履歴', lookupLabelShort('color', a.color)]);
  if (a.colorFreq) colorItems.push(['カラーの頻度', lookupLabel('colorFreq', a.colorFreq)]);
  if (a.grayHair) colorItems.push(['白髪染め', lookupLabel('grayHair', a.grayHair)]);
  if (a.grayFreq) colorItems.push(['白髪染めの頻度', lookupLabelShort('grayFreq', a.grayFreq)]);
  if (a.bleachLocation) colorItems.push(['ブリーチ残存箇所', lookupLabel('bleachLocation', a.bleachLocation)]);

  // パーマ・矯正履歴
  const permItems = [];
  if (a.straighten) permItems.push(['縮毛矯正', lookupLabelShort('straighten', a.straighten)]);
  if (a.perm) permItems.push(['パーマ', lookupLabelShort('perm', a.perm)]);
  if (a.permType) permItems.push(['パーマの種類', lookupLabel('permType', a.permType)]);
  if (a.permLoose) permItems.push(['パーマの保ち', lookupLabel('permLoose', a.permLoose)]);

  // 熱ツール使用
  const heatItems = [];
  const tools = (a.styling && a.styling.tools) || [];
  if (tools.length) {
    const toolNames = tools.map(t => {
      const q = QL.styling;
      const opt = q && q.toolOptions && q.toolOptions.find(o => o.v === t);
      return opt ? opt.label : t;
    }).join(' / ');
    heatItems.push(['熱ツールの使い方', toolNames]);
  }
  if (a.styling && a.styling.temp) {
    const q = QL.styling;
    const opt = q && q.tempOptions && q.tempOptions.find(o => o.v === a.styling.temp);
    if (opt) heatItems.push(['アイロン温度', opt.detail ? `${opt.label}（${opt.detail}）` : opt.label]);
  }
  if (Array.isArray(a.heatProtect) && a.heatProtect.length) {
    heatItems.push(['熱保護アイテム', lookupMulti('heatProtect', a.heatProtect)]);
  }

  // 過去のヘアトラブル
  const troubleList = (Array.isArray(a.hairTrouble) ? a.hairTrouble : [])
    .filter(v => v !== 'none')
    .map(v => lookupLabel('hairTrouble', v))
    .filter(Boolean);

  // ホームケア・ライフスタイル
  const lifeItems = [];
  if (Array.isArray(a.items) && a.items.length) {
    lifeItems.push(['日常のヘアケア', lookupMulti('items', a.items)]);
  }
  if (Array.isArray(a.lifestyle) && a.lifestyle.length) {
    lifeItems.push(['ライフスタイル', lookupMulti('lifestyle', a.lifestyle)]);
  }
  if (a.environment) lifeItems.push(['過ごす環境', lookupLabel('environment', a.environment)]);
  if (Array.isArray(a.concernsItem) && a.concernsItem.length) {
    const filtered = a.concernsItem.filter(v => v !== 'none');
    if (filtered.length) lifeItems.push(['アイテムで気になる点', filtered.map(v => lookupLabelShort('concernsItem', v)).join('・')]);
  }

  // 悩み
  const concernList = (Array.isArray(a.concerns) ? a.concerns : [])
    .map(c => lookupLabelShort('concerns', c))
    .filter(Boolean);

  // 希望
  const wishItems = [];
  if (a.goalTexture) wishItems.push(['理想の質感', lookupLabelShort('goalTexture', a.goalTexture)]);
  if (a.goal) wishItems.push(['髪の目標', lookupLabelShort('goal', a.goal)]);

  // ヘッドスパ
  const spaItems = [];
  if (Array.isArray(a.deviceInterest)) {
    const di = a.deviceInterest.filter(v => v !== 'none');
    if (di.length) spaItems.push(['美容家電の希望', di.map(v => lookupLabelShort('deviceInterest', v)).join('・')]);
  }
  if (a.headSpaInterest) spaItems.push(['ヘッドスパ', lookupLabelShort('headSpaInterest', a.headSpaInterest)]);
  if (Array.isArray(a.wellness) && a.wellness.length) {
    const filtered = a.wellness.filter(v => v !== 'well');
    if (filtered.length) spaItems.push(['気になる症状', filtered.map(v => lookupLabelShort('wellness', v)).join('・')]);
  }

  // 希望(タイプ別目指す姿)
  const idealImpression = karte?.mainGoal?.tagline || karte?.mainGoal?.name || '本来の質感を大切にしたい';

  const sectionTitle = (label) => (
    <p className="font-mono tracking-widest3 text-[10px] uppercase text-gold mt-8 mb-3" style={{ letterSpacing: '0.25em' }}>— {label}</p>
  );
  const dl = (items) => (
    <dl className="space-y-2.5">
      {items.map(([k, v], i) => (
        <div key={i} className="grid grid-cols-[110px_1fr] sm:grid-cols-[130px_1fr] gap-3 items-baseline">
          <dt className="font-serif text-[12px] sm:text-[12.5px] text-charcoal/60 leading-[1.65]" style={{ wordBreak: 'keep-all' }}>{k}</dt>
          <dd className="font-serif text-[13.5px] sm:text-[14.5px] text-ink leading-[1.8]" style={{ fontWeight: 500, wordBreak: 'keep-all', overflowWrap: 'break-word' }}>{v || '—'}</dd>
        </div>
      ))}
    </dl>
  );
  const chips = (arr) => (
    <p className="font-serif text-[13.5px] sm:text-[14.5px] text-ink leading-[2]" style={{ fontWeight: 500, wordBreak: 'keep-all', overflowWrap: 'break-word' }}>
      {arr.join('・')}
    </p>
  );

  return (
    <section className="-mx-5 sm:-mx-8 px-5 sm:px-8 py-16 sm:py-20 bg-white mt-12 sm:mt-16 anim-fade-up scroll-mt-[96px]" id="section-memo">
      <div className="flex items-center gap-3 mb-3">
        <span className="font-mono tracking-widest2 text-[11px] uppercase text-gold nums">— Counseling Sheet</span>
        <span className="h-px flex-1 bg-gold/40" />
      </div>
      <h2 className="font-serif text-[28px] sm:text-[40px] leading-[1.2] text-ink" style={{ wordBreak:'keep-all', overflowWrap:'break-word' }}>
        カルテが、<br />
        <span className="text-gold">作成されました。</span>
      </h2>
      <span aria-hidden className="block w-20 h-px bg-gold/55 mt-5" />
      <p className="mt-5 text-[13px] sm:text-[14px] leading-[1.95] text-charcoal/75 max-w-2xl">
        あなたの診断結果と回答を、美容師さんがそのまま受け取れる形にまとめました。<br />
        来店時にこのページを開いて、見せるだけで伝わります。
      </p>

      {/* カルテ本体 (テキストのみ) */}
      <article
        id="counseling-sheet"
        className="relative mt-9 mx-auto max-w-2xl bg-white p-7 sm:p-12"
        style={{
          borderTop: '1px solid rgba(184,148,90,0.4)',
          borderBottom: '1px solid rgba(184,148,90,0.4)',
          boxShadow: '0 1px 2px rgba(26,24,21,0.04), 0 18px 50px -28px rgba(26,24,21,0.18)',
        }}
      >
        {/* corner ornaments */}
        <span aria-hidden className="absolute top-2 left-2 w-3 h-3 border-t border-l border-gold/55" />
        <span aria-hidden className="absolute top-2 right-2 w-3 h-3 border-t border-r border-gold/55" />
        <span aria-hidden className="absolute bottom-2 left-2 w-3 h-3 border-b border-l border-gold/55" />
        <span aria-hidden className="absolute bottom-2 right-2 w-3 h-3 border-b border-r border-gold/55" />

        {/* Header */}
        <div className="flex items-center justify-between pb-4 border-b border-gold/25 text-[10px] font-mono tracking-widest2 uppercase">
          <span className="text-gold">SEAM Hair Karte</span>
          <span className="text-charcoal/55 nums">{todayStr}</span>
        </div>

        {/* 01 タイプ */}
        {sectionTitle('01 · あなたのタイプ')}
        <div>
          <h3 className="font-serif text-[20px] sm:text-[22px] text-ink leading-[1.35]">{o.name}</h3>
          <p className="mt-1 font-mono tracking-widest2 text-[10.5px] uppercase text-charcoal/55 nums">{o.nameEn} <span className="text-gold">· {o.code}</span></p>
          {typeShort && (
            <p className="mt-2 text-[13px] sm:text-[13.5px] text-charcoal/75">— {typeShort.jp}</p>
          )}
        </div>

        {/* 02 基本情報 */}
        {basicItems.length > 0 && (
          <>
            {sectionTitle('02 · 基本情報')}
            {dl(basicItems)}
          </>
        )}

        {/* 03 髪質の特徴 */}
        {traitItems.length > 0 && (
          <>
            {sectionTitle('03 · 髪質の特徴')}
            {dl(traitItems)}
          </>
        )}

        {/* 04 頭皮の状態 */}
        {scalpItems.length > 0 && (
          <>
            {sectionTitle('04 · 頭皮の状態')}
            {dl(scalpItems)}
          </>
        )}

        {/* 05 髪のキャラクター(性格) */}
        {o.personality && (
          <>
            {sectionTitle('05 · 髪のキャラクター')}
            <p className="font-serif text-[13.5px] sm:text-[14.5px] leading-[2] text-charcoal/85" style={{ letterSpacing: '0.02em' }}>
              {o.personality}
            </p>
          </>
        )}

        {/* 06 カラー履歴 */}
        {colorItems.length > 0 && (
          <>
            {sectionTitle('06 · カラー履歴')}
            {dl(colorItems)}
          </>
        )}

        {/* 07 縮毛矯正・パーマ履歴 */}
        {permItems.length > 0 && (
          <>
            {sectionTitle('07 · 縮毛矯正・パーマ履歴')}
            {dl(permItems)}
          </>
        )}

        {/* 08 熱ツールの使い方 */}
        {heatItems.length > 0 && (
          <>
            {sectionTitle('08 · 熱ツールの使い方')}
            {dl(heatItems)}
          </>
        )}

        {/* 09 過去のヘアトラブル */}
        {troubleList.length > 0 && (
          <>
            {sectionTitle('09 · 過去のヘアトラブル')}
            {chips(troubleList)}
          </>
        )}

        {/* 10 ホームケア・ライフスタイル */}
        {lifeItems.length > 0 && (
          <>
            {sectionTitle('10 · ホームケア・ライフスタイル')}
            {dl(lifeItems)}
          </>
        )}

        {/* 11 気になっていること */}
        {concernList.length > 0 && (
          <>

        {spaItems.length > 0 && (

            {sectionTitle('13 · ヘッドスパのご希望')}

      <div className="mt-5 no-print flex flex-wrap gap-3 justify-center">

          type="button"
          onClick={() => onSaveImage && onSaveImage('story')}

        >

          <span className="text-[12px]">↓</span>
        </button>
        <a
          href={`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(typeof window !== 'undefined' ? window.location.href : '')}`}
          target="_blank"
          rel="noopener noreferrer"
          className="inline-flex items-center gap-2 px-5 py-3.5 bg-white border border-gold/55 text-ink hover:bg-cream/40 transition-colors font-serif text-[13.5px] sm:text-[14px] rounded-[2px]"

      <p className="mt-4 text-center text-[11.5px] text-charcoal/55 leading-relaxed">
        ※ SEAM 以外の美容室でも、ご相談時にお使いいただけます。
