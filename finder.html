/* ---- Card multi (with exclusive option) — editorial tiles ---- */
function CardMulti({ q, value = [], onChange }) {
  const toggle = (o) => {
    if (o.exclusive) {
      return onChange(value.includes(o.v) ? [] : [o.v]);
    }
    const next = value.includes(o.v)
      ? value.filter(x => x !== o.v)
      : [...value.filter(x => !q.options.find(p => p.v === x)?.exclusive), o.v];
    onChange(next);
  };
  return (
    <div className="mt-5 grid grid-cols-2 sm:grid-cols-3 gap-1.5">
      {q.options.map((o, i) => {
        const active = value.includes(o.v);
        return (
          <button
            key={o.v}
            type="button"
            onClick={() => toggle(o)}
            className={[
              'group text-left px-3.5 py-3.5 border transition-all flex flex-col gap-2.5 rounded-[2px]',
              active
                ? 'bg-ink text-ivory border-ink'
                : 'bg-white/70 text-charcoal border-line hover:border-ink',
            ].join(' ')}
          >
            <div className="flex items-center justify-between">
              <span className={['font-mono tracking-widest2 text-[10.5px] nums',
                active ? 'text-goldLight' : 'text-charcoal/40'].join(' ')}>
                {String(i+1).padStart(2,'0')}
              </span>
              <span
                className={[
                  'w-[14px] h-[14px] border inline-flex items-center justify-center rounded-[1px]',
                  active ? 'border-ivory bg-ivory' : 'border-line group-hover:border-ink',
                ].join(' ')}
                aria-hidden
              >
                {active && (
                  <svg viewBox="0 0 12 12" className="w-2.5 h-2.5">
                    <path d="M2 6.5 L 5 9 L 10 3" stroke="#1A1815" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round" />
                  </svg>
                )}
              </span>
            </div>
            <span className={['font-serif text-[13.5px] sm:text-[14.5px] leading-snug',
              active ? 'text-ivory' : 'text-ink'].join(' ')}>{o.label}</span>
          </button>
        );
      })}
    </div>
  );
}

/* ---- Slider (3-step) — editorial dial ---- */
function SliderChoice({ q, value, onChange }) {
  const idx = q.options.findIndex(o => o.v === value);
  const defaultIdx = Math.floor(q.options.length / 2);
  const display = q.options[idx >= 0 ? idx : defaultIdx];
  // 初期表示時に中央(普通)を自動選択 — 何もしなくても進めるように
  useEffect(() => {
    if (!value && q.options[defaultIdx]) {
      onChange(q.options[defaultIdx].v);
    }
  }, [q.id]);
  return (
    <div className="mt-8">
      <div className="text-center mb-9">
        <p className="font-mono tracking-widest2 text-[10px] uppercase text-charcoal/50">— Now selecting —</p>
        <p className="mt-3 font-serif text-[40px] sm:text-[52px] leading-none text-ink tracking-tight">
          {display.label}
        </p>
      </div>
      <input
        type="range"
        min={0}
        max={q.options.length - 1}
        step={1}
        value={idx < 0 ? 1 : idx}
        onChange={(e) => onChange(q.options[Number(e.target.value)].v)}
        className="seam-slider"
      />
      <div className="mt-4 grid grid-cols-3 gap-2 text-[11px] tracking-widest2 uppercase text-charcoal/55">
        {q.options.map((o, i) => (
          <button
            key={o.v}
            type="button"
            onClick={() => onChange(o.v)}
            className={[
              'border-t pt-2 transition-colors text-center',
              i === 0 ? 'text-left' : i === q.options.length - 1 ? 'text-right' : 'text-center',
              value === o.v ? 'text-ink border-ink' : 'border-line hover:text-ink/80',
            ].join(' ')}
          >
            {o.label}
          </button>
        ))}

/* ---- Heat tools (frequency + temperature with inline warnings) ---- */

      const next = tools.includes(o.v) ? [] : [o.v];
      onChange({ ...value, tools: next });
      return;
    }
    const next = tools.includes(o.v)
      ? tools.filter(x => x !== o.v)
      : [...tools.filter(x => !q.toolOptions.find(p => p.v === x)?.exclusive), o.v];
    onChange({ ...value, tools: next });

/* ---------- 章立て ---------- */
const QUIZ_CHAPTERS = [
  { id:'now',     index:1, title:'髪の悩みと特徴',     subTitle:'まず、いまの悩みと髪のタイプを伺います。',         startIdx:0,  endIdx:4  },
  { id:'history', index:2, title:'髪の履歴',           subTitle:'これまでの施術と、アイロンの使い方を伺います。',   startIdx:5,  endIdx:9  },
  { id:'daily',   index:3, title:'いまの生活',         subTitle:'普段の習慣と、まわりの環境を伺います。',           startIdx:10, endIdx:13 },
  { id:'goal',    index:4, title:'目指したい仕上がり', subTitle:'これから目指したい髪を伺います。',                 startIdx:14, endIdx:15 },
  { id:'salon',   index:5, title:'サロンでの相談',     subTitle:'ヘッドスパなど、サロンでのご提案について伺います。', startIdx:16, endIdx:17 },
];
function getChapterFor(idx) {
  return QUIZ_CHAPTERS.find(c => idx >= c.startIdx && idx <= c.endIdx) || QUIZ_CHAPTERS[0];
}
function isChapterStart(idx) {
  return QUIZ_CHAPTERS.some(c => c.startIdx === idx);
}

/* ---------- Quiz ---------- */
function isAnswered(q, val) {
  if (val == null) return false;
  if (q.type === 'heat-tools') {
    const tools = (val && val.tools) || [];
    const temp  = val && val.temp;
    // 「ほとんど使わない」を選んだ場合は温度設定不要
    if (tools.includes('rare')) return true;
    return tools.length > 0 && !!temp;
  }
  if (Array.isArray(val)) return val.length > 0;
  return true;
}

function buildModeASequence(answers) {
  return Q
    .map((q, i) => ({ q, originalIdx: i }))
    .filter(({ q }) => {
      if (typeof q.when !== 'function') return true;
      try { return !!q.when(answers); } catch (e) { return true; }
    });
}

function Quiz({ answers, setAnswers, onComplete, onBackHome }) {
  const sequence = useMemo(() => buildModeASequence(answers), [answers]);
  const total = sequence.length;
  const [idx, setIdx] = useState(0);
  const safeIdx = Math.min(idx, total - 1);
  const entry = sequence[safeIdx];
  const q = entry?.q;
  const value = q ? answers[q.id] : null;
  const valid = q ? isAnswered(q, value) : false;
  const chapter = entry ? getChapterFor(entry.originalIdx) : QUIZ_CHAPTERS[0];

  // この設問が章の最初に表示されるかを、現在のシーケンスから判定
  const showChapterIntro = useMemo(() => {
    if (!entry) return false;
    const firstInChapter = sequence.find(e => getChapterFor(e.originalIdx)?.id === chapter.id);
    return firstInChapter && firstInChapter.q.id === entry.q.id;
  }, [entry, sequence, chapter]);

  const setValue = (v) => setAnswers(prev => ({ ...prev, [q.id]: v }));

  const next = () => {
    if (!valid) return;
    if (safeIdx >= total - 1) onComplete();
    else setIdx(safeIdx + 1);
  };
  const back = () => {
    if (safeIdx === 0) onBackHome();
    else setIdx(safeIdx - 1);
  };

  useEffect(() => { window.scrollTo({ top: 0, behavior: 'instant' }); }, [safeIdx]);

  if (!q) return null;

  return (
    <div className="min-h-[100svh] bg-finder relative pb-32 sm:pb-36">
      <TopBar step={safeIdx + 1} total={total} />
      <div className="pt-[78px]">
        <ProgressBar current={safeIdx + 1} total={total} />
      </div>

      <main className="mx-auto max-w-2xl px-5 sm:px-8 pt-8 sm:pt-14 relative z-10">
        <div key={q.id} className="anim-quiz">
          {/* Chapter marker */}
          <div className="flex items-center gap-3 mb-6 sm:mb-8">
            <span className={`font-mono tracking-widest2 text-[10.5px] uppercase text-gold nums inline-block ${showChapterIntro ? 'milestone-pulse' : ''} px-2 py-0.5`}>
              Chapter {String(chapter.index).padStart(2,'0')}
            </span>
            <span className="h-px w-6 bg-gold/40" />
            <span className="font-serif text-[13px] sm:text-[14px] text-charcoal">
              {chapter.title}
            </span>
          </div>

          {showChapterIntro && (
            <div className="anim-quiz mb-7 sm:mb-9 border-l-2 border-gold pl-4 sm:pl-5" style={{ animationDelay:'120ms' }}>
              <p className="font-mono tracking-widest2 text-[10.5px] uppercase text-charcoal/55">
                ━ {chapter.id === 'now' ? 'はじめに' : `Chapter ${String(chapter.index).padStart(2,'0')}`} ━
              </p>
              <p className="mt-2 text-[13.5px] sm:text-[15px] text-ink leading-[1.85]">
                {chapter.subTitle}
              </p>
            </div>
          )}

          {/* Editorial Q header */}
          <div className="flex items-start gap-5 sm:gap-7">
            <div className="shrink-0 -mt-1">
              <p className="font-mono tracking-widest2 text-[10.5px] uppercase text-charcoal/55 mb-1">Question</p>
              <p className="font-serif text-[44px] sm:text-[58px] leading-none text-ink nums tracking-tight">
                {String(safeIdx + 1).padStart(2,'0')}
              </p>
              <p className="font-mono tracking-widest2 text-[10.5px] uppercase text-charcoal/40 mt-1 nums">
                / {String(total).padStart(2,'0')}
              </p>
            </div>
            <div className="flex-1 min-w-0 pt-1">
              <p className="font-mono tracking-widest2 text-[10.5px] uppercase text-gold mb-2">— {q.eyebrow}</p>
              <h2 className="font-serif text-[22px] sm:text-[28px] leading-[1.4] text-ink">
                {q.title}
              </h2>
            </div>
          </div>
          <div className="mt-5 h-px bg-line" />
          {q.note && <p className="mt-4 text-[12.5px] sm:text-[13px] text-charcoal/70 leading-[1.85]">{q.note}</p>}

          <QuestionCard question={q} value={value} onChange={setValue} />
        </div>
      </main>

      <nav className="fixed bottom-0 inset-x-0 bg-gradient-to-t from-ivory via-ivory/95 to-ivory/0 pt-6 pb-5 sm:pb-7 z-20">
        <div className="mx-auto max-w-2xl px-5 sm:px-8 flex items-center justify-between gap-4">
          <button
            onClick={back}
            className="font-mono tracking-widest2 text-[10.5px] sm:text-[11px] uppercase text-charcoal/65 hover:text-ink transition-colors inline-flex items-center gap-2"
          >
            <span className="inline-block w-5 h-px bg-charcoal/40" />
            {safeIdx === 0 ? 'Home' : 'Back'}
          </button>
          <button
            onClick={next}
            disabled={!valid}
            className={[
              'inline-flex items-center justify-center gap-3 px-6 sm:px-9 py-3.5 sm:py-4 rounded-[2px] font-mono text-[10.5px] sm:text-[11px] tracking-widest2 uppercase transition-all',
              valid
                ? 'bg-ink text-ivory hover:bg-charcoal'
                : 'bg-mist text-charcoal/40 cursor-not-allowed',
            ].join(' ')}
          >
            <span className={valid ? 'text-goldLight' : 'text-charcoal/40'}>
              {safeIdx >= total - 1 ? 'Submit' : 'Next'}
            </span>
            <span className="font-serif normal-case tracking-normal text-[13px] sm:text-[14px]">
              {safeIdx >= total - 1 ? '診断結果を見る' : '次へ'}

            <span className={['inline-block w-4 h-px transition-all', valid ? 'bg-ivory' : 'bg-charcoal/30'].join(' ')} />
          </button>
        </div>
      </nav>
    </div>
  );

              </p>
              <p className="mt-2 font-serif text-[15px] sm:text-[17px] text-ink leading-[1.85]">

              </p>
            </div>
          )}

          <div className="flex items-start gap-5 sm:gap-7">

              <p className="font-serif text-[44px] sm:text-[58px] leading-none text-ink nums tracking-tight">
                {String(safeIdx + 1).padStart(2,'0')}
              </p>
              <p className="font-mono tracking-widest2 text-[10.5px] uppercase text-charcoal/40 mt-1 nums">
                / {String(total).padStart(2,'0')}
              </p>
            </div>
            <div className="flex-1 min-w-0 pt-1">
              <p className="font-mono tracking-widest2 text-[10.5px] uppercase text-gold mb-2">— {q.eyebrow}</p>

        <div className="mx-auto max-w-2xl px-5 sm:px-8 flex items-center justify-between gap-4">
          <button
            onClick={back}

          >
            <span className="inline-block w-5 h-px bg-charcoal/40" />
            {safeIdx === 0 ? 'Home' : 'Back'}
          </button>
          <button
            onClick={next}
            disabled={!valid}
            className={[
              'inline-flex items-center justify-center gap-3 px-6 sm:px-9 py-3.5 sm:py-4 rounded-[2px] font-mono text-[10.5px] sm:text-[11px] tracking-widest2 uppercase transition-all',
              valid
                ? 'bg-ink text-ivory hover:bg-charcoal'
                : 'bg-mist text-charcoal/40 cursor-not-allowed',
            ].join(' ')}
          >
            <span className={valid ? 'text-goldLight' : 'text-charcoal/40'}>
              {safeIdx >= total - 1 ? 'Submit' : 'Next'}
            </span>
            <span className="font-serif normal-case tracking-normal text-[13px] sm:text-[14px]">
              {safeIdx >= total - 1 ? '詳しい結果を見る' : '次へ'}
            </span>
            <span className={['inline-block w-4 h-px transition-all', valid ? 'bg-ivory' : 'bg-charcoal/30'].join(' ')} />
          </button>
        </div>
      </nav>
    </div>
  );
}

/* ---------- HairChart ---------- */
function HairChart({ chart }) {
  const entries = Object.entries(chart);
  return (
    <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-10 gap-y-5">
      {entries.map(([label, v]) => {
        const pct = (v / 5) * 100;
        const level = levelLabel(v);
        const tone = level === 'Keep' ? 'text-charcoal/70' : level === 'Care' ? 'text-roseAccent' : 'text-gold';
        const barColor = level === 'Intensive Care' ? '#B8945A' : level === 'Care' ? '#C9A089' : '#3D3833';
        return (
          <div key={label}>
            <div className="flex items-baseline justify-between">
              <span className="font-serif text-[14.5px] text-ink">{label}</span>
              <span className={`font-mono tracking-widest2 text-[10.5px] uppercase ${tone}`}>{level}</span>
            </div>
            <div className="mt-2 h-px bg-line/80 relative">
              <div
                className="absolute left-0 anim-bar"
                style={{
                  width: `${Math.max(4, pct)}%`,
                  background: barColor,
                  height: '2px',
                  top: '-0.5px',
                }}
              />
            </div>
            <div className="mt-1.5 flex justify-between text-[10px] tracking-widest2 uppercase text-charcoal/35 nums">
              <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ---------- StoreCard — editorial card with image ---------- */
function StoreCard({ store, index }) {
  return (
    <article className="bg-white border border-line rounded-[12px] overflow-hidden shadow-soft flex flex-col">
      {/* Store photo */}
      {store.image && (
        <div className="aspect-[4/3] bg-cover bg-center overflow-hidden">
          <div
            className="w-full h-full bg-cover bg-center"
            style={{ backgroundImage: `url(${store.image})` }}
            aria-label={store.name}
          />
        </div>
      )}

      <div className="px-5 py-5 sm:py-6 flex-1 flex flex-col">
        <header className="flex items-start justify-between gap-3 mb-2">
          <span className="font-mono tracking-widest2 text-[10px] uppercase text-gold font-medium">
            {store.area}
          </span>
          <span className="font-mono tracking-widest2 text-[10px] uppercase text-charcoal/40 nums">
            {String(index + 1).padStart(2, '0')}
          </span>
        </header>

        <h3 className="font-serif text-[19px] sm:text-[21px] text-ink leading-tight font-medium" style={{ wordBreak: 'keep-all', overflowWrap: 'normal' }}>{store.name}</h3>

        <div className="mt-4 space-y-3 flex-1">
          <div className="min-w-0">
            <div className="font-mono tracking-widest2 text-[10.5px] uppercase text-gold/70 mb-1">Address</div>
            <div className="text-[13px] sm:text-[13.5px] text-ink leading-relaxed" style={{ wordBreak: 'keep-all', overflowWrap: 'anywhere' }}>{store.address}</div>
          </div>
          <div className="min-w-0">
            <div className="font-mono tracking-widest2 text-[10.5px] uppercase text-gold/70 mb-1">Access</div>
            <div className="text-[13px] sm:text-[13.5px] text-ink leading-relaxed" style={{ wordBreak: 'keep-all', overflowWrap: 'anywhere' }}>{store.station}</div>
          </div>
        </div>

        {store.features && store.features.length > 0 && (
          <div className="mt-4 pt-3 border-t border-line/60 flex flex-wrap gap-1.5">
            {store.features.map(f => (
              <span key={f} className="font-mono tracking-widest2 text-[10.5px] uppercase px-2 py-1 bg-cream/70 text-charcoal/70 rounded-[2px] border border-line/50">
                {f}
              </span>
            ))}
          </div>
        )}
      </div>
    </article>
  );
}

function clampVal(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function computeKarteRadar(answers, scores) {
  const a = answers || {};
  const s = scores || {};

  let lightness = 3;
  if (a.thickness === 'thin')   lightness += 1;
  if (a.thickness === 'thick')  lightness -= 1;
  if (a.density === 'low')      lightness += 1;
  if (a.density === 'high')     lightness -= 1;
  if (s.bleachHistory >= 3)     lightness += 1;
  lightness = clampVal(Math.round(lightness), 1, 5);

  let luster = 4;
  if (s.damage >= 5)        luster -= 2;
  else if (s.damage >= 3)   luster -= 1;
  if (s.heatDamage >= 4)    luster -= 1;
  if (s.colorFade >= 3)     luster -= 1;
  if (s.bleachHistory >= 4) luster -= 1;
  luster = clampVal(Math.round(luster), 1, 5);

  let smoothness = 4;
  if (a.wave === 'humid' || a.wave === 'surface') smoothness -= 1;
  if (a.wave === 'root'  || a.wave === 'midEnd')  smoothness -= 2;
  if (a.wave === 'whole')                          smoothness -= 3;
  if (a.wave === 'straightened')                   smoothness += 1;
  if (s.frizz >= 3) smoothness -= 1;
  smoothness = clampVal(Math.round(smoothness), 1, 5);

  let volume = 3;
  if (a.thickness === 'thick') volume += 1;
  if (a.thickness === 'thin')  volume -= 1;
  if (a.density === 'high')    volume += 1;
  if (a.density === 'low')     volume -= 1;
  if (s.volumeLoss >= 2)       volume -= 1;
  if (a.wave === 'humid' || a.wave === 'whole') volume += 1;
  volume = clampVal(Math.round(volume), 1, 5);

  let scalp = 4;
  if (s.scalpDryness  >= 3) scalp -= 2;
  else if (s.scalpDryness  >= 2) scalp -= 1;
  if (s.scalpOiliness >= 3) scalp -= 2;
  else if (s.scalpOiliness >= 2) scalp -= 1;
  scalp = clampVal(Math.round(scalp), 1, 5);

  return [lightness, luster, smoothness, volume, scalp];
}

/* ═══════════════════════════════════════════════════════════════
   27キャラ判定 — 3軸直接ルックアップ (シンプル+完全網羅)
   Position 1 (太さ): F=Fine(細) / N=Normal(普通) / T=Thick(太)
   Position 2 (多さ): L=Low(少)   / N=Normal(普通) / H=High(多)
   Position 3 (クセ): S=Straight  / W=Wavy(少クセ) / C=Curly(強クセ)
   ─────────────────────────────────────────────────────────────── */
function selectOriginAnimalId(answers, scores, radar) {
  const a = answers || {};
  // Position 1: Thickness
  const t = a.thickness === 'thick' ? 'T' : (a.thickness === 'normal' ? 'N' : 'F');
  // Position 2: Density (L=Low少, N=Normal普通, H=High多)
  const d = a.density === 'high' ? 'H' : (a.density === 'normal' ? 'N' : 'L');
  // Position 3: Wave 統合: straightened/none → S, humid/surface → W, midEnd/root/whole → C
  let w = 'S';
  if (a.wave === 'humid' || a.wave === 'surface')      w = 'W';
  else if (['midEnd','root','whole'].includes(a.wave)) w = 'C';
  return t + d + w;  // 例: NNW = 普通+普通+少しクセ = 木洩れ日
}

const KARTE_GOAL_TEXTURE_TO_DIR = {
  moist:'C', glossy:'B', firm:'D', smooth:'C', airy:'D', soft:'A',
};
const KARTE_GOAL_INTENT_TO_DIR = {
  growLong:'C', keepColor:'A', firm:'D', easy:'C', ends:'C', idle:'A',
};

function selectGoalDirection(answers, radar) {
  const a = answers || {};
  if (a.goalTexture && KARTE_GOAL_TEXTURE_TO_DIR[a.goalTexture]) return KARTE_GOAL_TEXTURE_TO_DIR[a.goalTexture];
  if (a.goal && KARTE_GOAL_INTENT_TO_DIR[a.goal])                return KARTE_GOAL_INTENT_TO_DIR[a.goal];
  // フォールバック: もっとも低い軸を伸ばす
  const order = ['A','B','C','D'];
  const idx = [0,1,2,3].sort((x,y) => radar[x] - radar[y])[0];
  return order[idx];
}

function selectPoeticStates(answers, scores, maxCount = 2) {
  const matched = KARTE_POETIC_STATES
    .filter(st => { try { return st.match(scores, answers); } catch(e){ return false; } })
    .sort((a,b) => b.priority - a.priority);
  // 必ず1つは出す
  const picked = matched.slice(0, maxCount);
  if (picked.length) return picked;
  const fallback = KARTE_POETIC_STATES.find(s => s.id === 'calm') || KARTE_POETIC_STATES[KARTE_POETIC_STATES.length - 1];
  return [fallback];
}

function selectAdviceKey(scores) {
  const s = scores || {};
  if (s.heatDamage >= 4)     return 'heat';
  if (s.damage >= 5)         return 'damage';
  if (s.scalpDryness >= 2 || s.scalpOiliness >= 2) return 'scalp';
  if (s.frizz >= 3)          return 'frizz';
  if (s.colorFade >= 3)      return 'color';
  if (s.dryness >= 3)        return 'dry';
  if (s.volumeLoss >= 2)     return 'volume';
  return 'calm';
}

function deriveTargetRadar(currentRadar, direction) {
  const t = [...currentRadar];
  // 軸: [透明感, 艶, まとまり, 華やぎ, 頭皮]
  const boost = (i, n) => { t[i] = Math.min(5, t[i] + n); };
  if (direction === 'A') { boost(0, 2); boost(1, 1); } // 透明感の道
  if (direction === 'B') { boost(1, 2); boost(2, 1); } // 艶の道
  if (direction === 'C') { boost(2, 2); boost(1, 1); } // まとまりの道
  if (direction === 'D') { boost(3, 2); boost(1, 1); } // 華やぎの道
  // 頭皮は常に少し改善
  boost(4, 1);
  return t;
}

function resolveKarteAnimal(answers, scores) {
  const radar = computeKarteRadar(answers, scores);
  // キャラ既知ショートカット: ユーザーが picker で選んだ id、または共有URLの id を最優先
  const forcedId = answers && (answers._knownOriginId || answers._sharedOriginId);
  const originId = (forcedId && KARTE_ORIGIN_ANIMALS[forcedId])
    ? forcedId
    : selectOriginAnimalId(answers, scores, radar);
  const origin = KARTE_ORIGIN_ANIMALS[originId];

  const direction = selectGoalDirection(answers, radar);
  const mainGoalId = origin.targets[direction];

  const subDirs = ['A','B','C','D'].filter(d => d !== direction);
  const subGoals = subDirs.map(d => ({ dir:d, id: origin.targets[d] }));

  const states = selectPoeticStates(answers, scores, 2);
  const stateText = states.map(s => s.text).join('、');

  const adviceKey = selectAdviceKey(scores);
  const adviceText = KARTE_ADVICE[adviceKey];

  const targetRadar = deriveTargetRadar(radar, direction);

  return {
    radar, targetRadar,
    originId, origin,
    direction,
    mainGoalId, mainGoal: KARTE_GOAL_ANIMALS[mainGoalId],
    subGoals: subGoals.map(g => ({ dir:g.dir, id:g.id, goal: KARTE_GOAL_ANIMALS[g.id] })),
    stateText, states,
    adviceKey, adviceText,
  };
}

};

function listAnimalsForCollection(filter = 'all') {
  const arr = Object.entries(KARTE_ORIGIN_ANIMALS).map(([id, a]) => ({ id, ...a }));
  if (filter === 'all') {
    return arr.sort((x,y) => (y.rarity || 0) - (x.rarity || 0));
  }
  // 方向フィルタ: その方向にメインの進化先がある動物のうち、レアリティ降順
  return arr
    .filter(a => a.targets && a.targets[filter])
    .sort((x,y) => (y.rarity || 0) - (x.rarity || 0));
}

const CURRENT_CONDITION_BY_AXIS = {
  '透明感': 'キューティクルを整えると、光の通り方が変わる時期。',
  '艶':     '保湿を整えると、ツヤが本来の姿で現れる時期。',
  'まとまり':'内側の水分を整えると、まとまりが感じられやすくなる時期。',
  '華やぎ': '軽やかに立ち上げるケアで、本来の表情が現れる時期。',
  '頭皮':   '頭皮ケアを取り入れると、髪の根元から変わる時期。',
};

function buildCurrentCondition(radar) {
  if (!radar || radar.length !== 5) return null;
  const labels = ['透明感', '艶', 'まとまり', '華やぎ', '頭皮'];
  const items = labels.map((l, i) => ({ label: l, score: (radar[i] || 0) * 20 }));
  const sorted = [...items].sort((a, b) => a.score - b.score);
  const lowest = sorted[0];
  if (!lowest) return null;
  if (lowest.score >= 40) {
    return '整いやすい土台ができている、整えるほど映える状態。';
  }
  return CURRENT_CONDITION_BY_AXIS[lowest.label] || '本来の質を取り戻していく時期。';
}

/* ---------- KartePentagon — 5軸レーダーチャート(現在 vs 目標) ---------- */
function KartePentagon({ values, targetValues, palette = 'gold' }) {
  const size = 240;
  const cx = size / 2;
  const cy = size / 2 + 4;
  const maxR = 82;
  const angleFor = i => (-90 + 72 * i) * Math.PI / 180;

  const accent = palette === 'ivory' ? '#D9BE93' : '#B8945A';
  const targetAccent = '#D9BE93';
  const labelColor = palette === 'ivory' ? '#E7E4DE' : '#3D3833';
  const valueColor = palette === 'ivory' ? '#D9BE93' : '#B8945A';
  const gridColor  = palette === 'ivory' ? 'rgba(217,190,147,0.25)' : '#E7E4DE';
  const outerGrid  = palette === 'ivory' ? 'rgba(217,190,147,0.45)' : '#D6C7B0';

  const vertex = (val, i) => {
    const r = (val / 5) * maxR;
    const a = angleFor(i);
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  };
  const dataPts  = values.map((v,i) => vertex(v,i));
  const dataStr  = dataPts.map(p => p.join(',')).join(' ');
  const targetPts = (targetValues || []).map((v,i) => vertex(v,i));
  const targetStr = targetPts.map(p => p.join(',')).join(' ');
  const gridStr  = [1,2,3,4,5].map(lv => values.map((_,i) => vertex(lv,i).join(',')).join(' '));
  const axisEnd  = (i) => vertex(5, i);
  const labels   = KARTE_AXES.map(x => x.label);
  const labelPos = (i) => {
    const a = angleFor(i);
    const r = maxR + 22;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  };

  return (
    <svg viewBox={`0 0 ${size} ${size}`} className="w-full h-auto max-w-[260px] mx-auto" aria-hidden>
      {gridStr.map((pts, i) => (
        <polygon key={i} points={pts} fill="none" stroke={i === 4 ? outerGrid : gridColor} strokeWidth={i === 4 ? 0.9 : 0.7} />
      ))}
      {values.map((_, i) => {
        const end = axisEnd(i);
        return <line key={`ax${i}`} x1={cx} y1={cy} x2={end[0]} y2={end[1]} stroke={gridColor} strokeWidth="0.7" />;
      })}

      {/* 目標値(あれば)を点線で薄く描く */}
      {targetValues && (
        <>
          <polygon
            points={targetStr}
            fill={targetAccent}
            fillOpacity={palette === 'ivory' ? 0.10 : 0.08}
            stroke={targetAccent}
            strokeWidth="1.2"
            strokeDasharray="3 3"
            style={{ animation: 'karte-target-fade 1600ms ease-out 400ms both' }}
          />
          {targetPts.map((p, i) => (
            <circle key={`tpt${i}`} cx={p[0]} cy={p[1]} r="2.0" fill={targetAccent} opacity="0.7" />
          ))}
        </>
      )}

      {/* 現在値 */}
      <polygon
        points={dataStr}
        fill={accent} fillOpacity={palette === 'ivory' ? 0.22 : 0.16}
        stroke={accent} strokeWidth="1.4"
      />
      {dataPts.map((p, i) => (
        <circle key={`pt${i}`} cx={p[0]} cy={p[1]} r="2.6" fill={accent} />
      ))}

      {labels.map((lb, i) => {
        const [x,y] = labelPos(i);
        return (
          <g key={`lb${i}`}>
            <text x={x} y={y - 6} textAnchor="middle"
                  style={{ fontFamily:'"Inter", "Noto Sans JP", system-ui, sans-serif', fontSize:'11px', fontWeight: 600, fill: labelColor, letterSpacing:'0.1em' }}>
              {lb}
            </text>
            <text x={x} y={y + 10} textAnchor="middle"
                  style={{ fontFamily:'"Cormorant Garamond", serif', fontSize:'14px', fontWeight: 500, fill: valueColor }}>
              {values[i]}{targetValues && targetValues[i] !== values[i] && (
                <tspan dx="2" style={{ fill: targetAccent, fontSize:'10px' }}>→{targetValues[i]}</tspan>
              )}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

/* ---------- キャラクター画像パス解決 ---------- */

// gender / fallbackToFemale 引数は後方互換のため残置 (使用しない)

function _legacy_getCharImgPath_old(code, gender, { fallbackToFemale = false } = {}) {

/* ---------- KarteMiniPentagon — 図鑑用の小型レーダー ---------- */
function KarteMiniPentagon({ values, size = 110 }) {
  const cx = size / 2;
  const cy = size / 2 + 2;
  const maxR = size * 0.36;
  const angleFor = i => (-90 + 72 * i) * Math.PI / 180;
  const vertex = (val, i) => {
    const r = (val / 5) * maxR;
    const a = angleFor(i);
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  };
  const dataPts = values.map((v, i) => vertex(v, i));
  const dataStr = dataPts.map(p => p.join(',')).join(' ');
  const outline = values.map((_, i) => vertex(5, i).join(',')).join(' ');
  const grid3   = values.map((_, i) => vertex(3, i).join(',')).join(' ');
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size} aria-hidden>
      <polygon points={outline} fill="none" stroke="#D6C7B0" strokeWidth="0.7" />
      <polygon points={grid3}   fill="none" stroke="#E7E4DE" strokeWidth="0.5" />
      <polygon points={dataStr} fill="#B8945A" fillOpacity="0.18" stroke="#B8945A" strokeWidth="1.1" />
      {dataPts.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="1.8" fill="#B8945A" />)}
    </svg>
  );
}

// ── 縮毛矯正ユーザー向け動的コピー差し替え
// answers.straighten が 'none'/'past' 以外、または answers.wave === 'straightened' の場合、
// MWA/AWP/SCA(波・くせ系キャラ)のコピーを「ストレートに整えた今のあなた」向けに調整。
function isCurrentlyStraightened(answers) {
  if (!answers) return false;
  const st = answers.straighten;
  const wave = answers.wave;
  const activeStraightening = st && st !== 'none' && st !== 'past';
  return activeStraightening || wave === 'straightened';
}

function adaptOriginForStraightening(origin, answers) {
  if (!origin || !origin.code) return origin;
  if (!isCurrentlyStraightened(answers)) return origin;
  const waveCodes = ['MWA', 'AWP', 'SCA'];
  if (!waveCodes.includes(origin.code)) return origin;

  // 各波系キャラに対する「ストレート派」用のオーバーライド
  const overrides = {
    MWA: {
      personality: '本来は独特な揺らぎを宿す髪。今は薬剤の力でまっすぐに整えていますが、その内側には誰にもまねできない繊細さと表情が眠っています。仕上げ方を自由に選べる、稀有なタイプ。',
      charmHint: '整えるほどに艶を纏う、深い静けさ。',
      dailyMood: 'ストレートが綺麗にキープできた日の、自分への小さな拍手。',
      suitableStyles: ['つややかなストレートロング', '繊細レイヤーミディアム', 'シャープなボブ', '上品なまとめ髪'],
    },
    AWP: {
      personality: 'もとは軽やかなくせを抱える髪。今はまっすぐに整え、ふんわりとした繊細さだけが残るようにケアされています。素材の繊細さは、ストレートでも品となって滲み出ます。',
      charmHint: '春風そのもののような、軽やかな艶。',
      dailyMood: 'ふんわりとしたシルエットが、いちばん上手く決まった朝。',
      suitableStyles: ['ふんわりストレートボブ', '前髪パーマでメリハリ', 'シースルーバング', '繊細なレイヤーミディアム'],
    },
    SCA: {
      personality: '光の角度で表情が変わるアレキサンドライトのような髪。今はストレートに整えることで、本来の艶と流れがより上品に際立つようになっています。',
      charmHint: '光で深みを変える、変化の宝石。',
      dailyMood: '艶やかにまっすぐ流れる髪を、ふと鏡で確認したくなる日。',
      suitableStyles: ['ストレートロング', '上品なシャープボブ', '艶感のあるミディアム', 'なめらかなまとめ髪'],
    },
  };
  const ov = overrides[origin.code];
  return ov ? { ...origin, ...ov } : origin;
}

   VisitSeamSection — Apple新製品ページ風 minimal & exciting
   - 大胆な1行ステートメント
   - 3つの体験ブロック（スクロールトリガーで滑らかにフェードイン）
   - 単一の主役CTA
   ────────────────────────────────────────── */
function useScrollReveal() {
  const ref = useRef(null);
  const [shown, setShown] = useState(false);
  useEffect(() => {
    if (!ref.current || !('IntersectionObserver' in window)) { setShown(true); return; }
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setShown(true); obs.disconnect(); } },
      { rootMargin: '0px 0px -15% 0px', threshold: 0.08 }
    );
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, shown];
}

function VisitReveal({ children, delay = 0, direction = 'up' }) {
  const [ref, shown] = useScrollReveal();
  const dy = direction === 'up' ? 28 : -16;
  return (
    <div
      ref={ref}
      style={{
        opacity: shown ? 1 : 0,
        transform: shown ? 'translateY(0) scale(1)' : `translateY(${dy}px) scale(0.985)`,
        transition: `opacity 0.9s cubic-bezier(0.16,1,0.3,1) ${delay}ms, transform 1s cubic-bezier(0.16,1,0.3,1) ${delay}ms`,
        willChange: 'opacity, transform',
      }}
    >
      {children}
    </div>
  );
}

function CounselingSheet({ karte, answers, onSaveImage }) {
  const o = karte?.origin;
  if (!o) return null;
  const typeShort = (typeof TYPE_SHORT_NAME !== 'undefined') ? TYPE_SHORT_NAME[o.code] : null;
  const a = answers || {};

  const today = new Date();
  const todayStr = `${today.getFullYear()}.${String(today.getMonth()+1).padStart(2,'0')}.${String(today.getDate()).padStart(2,'0')}`;

  /* === 質問定義から値→ラベルを動的解決するヘルパー === */
  const QL = (typeof QUESTION_LOOKUP !== 'undefined') ? QUESTION_LOOKUP : {};
  const lookupLabel = (qid, value) => {
    if (value === undefined || value === null || value === '') return null;
    const q = QL[qid];
    if (!q || !q.options) return String(value);
    const opt = q.options.find(o => o.v === value);
    if (!opt) return String(value);
    // sub があれば併記(美容師さんに正確に伝わるため)
    return opt.sub ? `${opt.label}（${opt.sub}）` : opt.label;
  };
  const lookupLabelShort = (qid, value) => {
    if (value === undefined || value === null || value === '') return null;
    const q = QL[qid];
    if (!q || !q.options) return String(value);
    const opt = q.options.find(o => o.v === value);
    return opt ? opt.label : String(value);
  };
  const lookupMulti = (qid, values) => {
    if (!Array.isArray(values) || values.length === 0) return null;
    return values.map(v => lookupLabelShort(qid, v) || v).join('・');
  };

  /* === 各セクションのデータ === */
  // 基本情報 (年代・性別・長さ)
  const basicItems = [];
  if (a.age && a.age !== 'noanswer') basicItems.push(['年代', lookupLabelShort('age', a.age)]);
  if (a.gender && a.gender !== 'noanswer') basicItems.push(['性別', lookupLabelShort('gender', a.gender)]);
  if (a.length) basicItems.push(['長さ', lookupLabelShort('length', a.length)]);

  // 髪質

  if (a.density) traitItems.push(['髪の量・密度', lookupLabelShort('density', a.density)]);
  if (a.rootVolume) traitItems.push(['根元の立ち上がり', lookupLabel('rootVolume', a.rootVolume)]);

/* ──────────────────────────────────────────
   NarrativeJourney — 4章ナラティブ (Ch01-04, 05-06は別セクションへ統合)
   Chapter 01 髪の生まれ / 02 今の状態 / 03 いちばんの悩み /
   04 アドバイス→ヘアケア (05 美容師カード / 06 SEAM体験は別コンポーネント)
   ────────────────────────────────────────── */
function NarrativeJourney({ karte, answers }) {
  const origin = adaptOriginForStraightening(karte.origin, answers);
  if (!origin) return null;
  const radar = karte.radar || [3,3,3,3,3];

  // フォールバック: birthStory等が無いキャラはpersonalityで代用
  const birthStory = origin.birthStory || origin.personality || '';
  const currentMood = origin.currentMood || '';
  const primaryConcern = origin.primaryConcern || (origin.weaknesses && origin.weaknesses[0]?.title) || '';
  const tenderAdvice = origin.tenderAdvice || (origin.lifestyle && origin.lifestyle.join('。')) || '';

  // 履歴チップ作成
  const historyChips = [];
  if (answers?.straighten && answers.straighten !== 'none' && answers.straighten !== 'past') historyChips.push('縮毛矯正');
  if (answers?.bleach && answers.bleach !== 'none') historyChips.push('ブリーチ');
  if (answers?.color && answers.color !== 'none') historyChips.push('カラー');
  if (answers?.perm && answers.perm !== 'none') historyChips.push('パーマ');
  const tools = (answers?.styling && answers.styling.tools) || [];
  if (tools.some(t => /iron|bang/i.test(t))) historyChips.push('日々のアイロン');

  // しいたけ占い風: 改行で段落を分ける小コンポーネント
  const Paragraphs = ({ text }) => {
    if (!text) return null;
    return text.split('\n\n').map((p, i) => (
      <p key={i} className="font-serif text-[14.5px] sm:text-[15.5px] leading-[2.1] text-charcoal/90 mb-4 last:mb-0" style={{ letterSpacing: '0.02em' }}>
        {p.split('\n').map((line, j, arr) => (
          <React.Fragment key={j}>
            {line}{j < arr.length - 1 && <br />}
          </React.Fragment>
        ))}

    ));
  };

  // 章タイトルブロック
  const ChapterTitle = ({ num, en, jp, accent }) => (
    <div className="mt-14 sm:mt-20 mb-7 sm:mb-9 text-center">
      <p className="font-mono tracking-widest3 text-[10px] sm:text-[10.5px] uppercase text-gold mb-3">— Chapter {num} · {en}</p>

  // イラスト挿入用プレースホルダー / 動画/画像があればそれをレンダリング
  const IllustSlot = ({ label, ratio = '3/2', videoSrc, imageSrc, posterSrc, badge }) => (
    <div
      className="my-7 mx-auto max-w-md relative overflow-hidden"

      {videoSrc ? (

          />
          <span className="absolute top-3 left-1/2 -translate-x-1/2 z-10 font-mono tracking-widest3 text-[10.5px] uppercase text-gold bg-black/40 backdrop-blur-sm px-2 py-0.5 rounded-[1px]" style={{ letterSpacing: '0.3em' }}>

  return (

      {/* ━━━━━ Chapter 01 · 髪の生まれ ━━━━━ */}

        <IllustSlot

        <article className="max-w-2xl mx-auto bg-white/80 border border-gold/25 rounded-[18px] p-7 sm:p-9">
          <Paragraphs text={birthStory} />

      <section id="chapter-current" className="scroll-mt-[96px]">
        <ChapterTitle num="02" en="Current" jp="いまの、あなたの髪" accent="あなたの髪" />

        {/* 履歴チップ */}
        {historyChips.length > 0 && (
          <div className="mb-6 flex flex-wrap items-center justify-center gap-2 max-w-md mx-auto">
            <span className="font-mono tracking-widest2 text-[10.5px] uppercase text-charcoal/55">— History</span>
            {historyChips.map((c, i) => (

        {/* 状態本文 */}

              {buildCurrentCondition(radar)}
            </p>
          )}

      {/* ━━━━━ Chapter 03 · いちばんの、お悩み ━━━━━ */}

          badge="Empathy"
        />
        <article
          className="relative max-w-2xl mx-auto rounded-[2px] p-8 sm:p-12 bg-white"
          style={{
            borderTop: '1px solid rgba(184,148,90,0.35)',
            borderBottom: '1px solid rgba(184,148,90,0.35)',

          <span aria-hidden className="absolute bottom-3 left-3 w-3 h-3 border-b border-l border-gold/45" />
          <span aria-hidden className="absolute bottom-3 right-3 w-3 h-3 border-b border-r border-gold/45" />

        </article>
      </section>

      {/* ━━━━━ Chapter 04 · あなたへのアドバイス ━━━━━ */}
      <section id="chapter-advice" className="scroll-mt-[96px]">
        <ChapterTitle num="04" en="Tender Advice" jp="あなたへの、やさしい処方" accent="やさしい処方" />
        <article
          className="relative max-w-2xl mx-auto rounded-[2px] p-8 sm:p-12"

        <p className="mt-7 text-center font-mono tracking-widest2 text-[10px] uppercase text-charcoal/55">

/* ──────────────────────────────────────────
   ConditionalAdvice — 履歴 × 悩み × 熱の組合せで出る、状況別の追加処方
   ────────────────────────────────────────── */
function ConditionalAdvice({ answers = {} }) {
  const a = answers;
  const cards = [];

  // ── 1) ブリーチ歴あり × 伸ばしたい / セミロング以上 → 毛先専用ケア
  const hasBleach = ['bleach_recent','bleach_past','multi_bleach','highlight'].includes(a.color);
  const wantsLength = ['semi_long','long','medium'].includes(a.length) || (a.idealLength && ['semi_long','long'].includes(a.idealLength));
  if (hasBleach && wantsLength) {
    cards.push({
      tag: 'BLEACH × LENGTH',
      title: '毛先を、伸ばしたい人へ。',
      body: `ブリーチをした髪は、根元のあなたと、毛先の"前のあなた"が同居しています。
だから、ケアも一つではありません。

根元〜中間は、頭皮に優しいアミノ酸系で。
ブリーチが残る毛先は、ボンド系の集中補修（System Professional アルタイム R / Schwarzkopf ファイバープレックス / TOKIO PREMIUM）を毛先だけにつけて、30秒置いてから流す——これだけで切れ毛が止まります。

夜は、洗い流さないオイル＋集中マスクで"密封ケア"を週2回。
伸ばしている途中は、毛先の保湿が「長さを守る」ことそのものです。`,
    });
  }

  // ── 2) 縮毛矯正している × まだ"くせ"がある or "うねり"の悩み → 肯定 + 二段ケア
  const isStraightened = a.wave === 'straightened' || a.straighten === 'past' || a.straighten === 'recent';
  const stillHasFrizz = (a.concern || []).some(c => ['frizz','dryness','damage'].includes(c));
  if (isStraightened && stillHasFrizz) {
    cards.push({
      tag: 'STRAIGHTENED × WAVE',
      title: '矯正しても残るくせは、悪いものではありません。',
      body: `縮毛矯正をかけても、新しく生えてくる根元にはあなた本来のくせが必ず出ます。
それは"失敗"ではなく、髪が生きている証拠です。

ケアは、毛先と根元を別に考えてください。
矯正されたまっすぐな毛先は、薬剤でタンパク質構造が変化しているため、補修系（バイカルテ HS+ / アルタイム R / TOKIO PREMIUM）でタンパク質を補い続けることが必要です。
新しく生えた根元のくせは、保湿系（モイストカーム / クエンチ）でうねりを"いなす"のが正解。

アイロンを使うときは、必ず洗い流さないトリートメントで保護してから、160℃以下で。
矯正した毛先に200℃をあてると、内部のタンパク質が"二度死"します。
くせ部分だけにアイロンをあてる「部分使い」が、髪を長持ちさせます。`,
    });
  }

  // ── 3) カラー褪色が悩み × アイロン高温使用 → 140度推奨
  const hasColorFade = (a.concern || []).includes('colorFade');
  const usesIron = (a.heatTools?.tools || []).some(t => /iron|curling|wave_iron/i.test(t));
  const hot = ['t180','t200','high','very_high'].includes(a.heatTools?.temp) || ['t180','t200'].includes(a.styling?.temp);
  if (hasColorFade && usesIron) {
    cards.push({
      tag: 'COLOR × HEAT',
      title: 'カラーを"褪せない"ようにするには、温度です。',
      body: `カラーの色素は、180℃を超えると一気に分解されます。
シャンプーや紫外線より、アイロンの熱が圧倒的に褪色の原因です。

今日からの目安は、140℃。
「形がつかないのでは？」と思うかもしれませんが、洗い流さないトリートメントで保護した髪は、140℃でも十分まとまります。

それでも180℃以上が必要な日は、必ずヒートプロテクト系のミストやオイル（カラーモーション+ ルミナススプレー など）を全体に。
熱を当てる前の"準備"で、褪色は2倍以上、変わります。`,

  } else if (hasColorFade && hot && !usesIron) {

      body: `一度ビビリ毛になった髪は、内部のタンパク質と脂質(CMC)が抜けて空洞化しています。
何をしても「指通りだけ良くなって、また絡まる」のは、この空洞を埋めずに表面だけ整えているからです。

ホームケアで今夜から始めてほしいのは、脂質(リピッド)を補う集中補修。

Schwarzkopf ファイバープレックス ボンド トリートメント、TOKIO IE INKARAMI PREMIUM、ハホニコ レブリ も、同じ「内側を埋める」発想の処方です。

    });

  // ── 5) 白髪染め → グランケアで頭皮酸化抑制

/* ---------- 画像保存・シェア ---------- */
async function saveKarteCardAsImage(filename, mode) {
  if (typeof html2canvas !== 'function') {
    alert('保存の準備が整っていません。すこし時間を置いてもう一度お試しください。');
    return;
  }

  // mode: 'square' (1080x1080) / 'story' (1080x1920) / undefined (旧 Act 04 のみ)
  if (mode === 'square' || mode === 'story') {
    return saveCustomCanvas(filename, mode);
  }

  // 旧: Act 04 シェアカードのみ
  const node = document.getElementById('karte-share-card');
  if (!node) return;
  try {
    const canvas = await html2canvas(node, {
      backgroundColor: '#1A1815',
      scale: 2,
      useCORS: true,
      logging: false,
    });
    const link = document.createElement('a');
    link.download = filename || 'seam-karte.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    console.warn('Karte image save failed', e);
    alert('画像の保存に失敗しました。もう一度お試しください。');
  }
}

async function saveCustomCanvas(filename, mode) {
  // localStorage 経由でカルテ情報を取得
  let karte = null;
  try {
    const raw = localStorage.getItem('seam_karte_last');
    if (raw) karte = JSON.parse(raw);
  } catch (e) {}
  if (!karte) {
    alert('カルテ情報の読み込みに失敗しました。');
    return;
  }

  const isSquare = mode === 'square';
  const W = 1080;
  const H = isSquare ? 1080 : 1920;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // ── キャラクター画像を事前ロード(失敗してもフォールバックで継続)
  const animalDataPre = (typeof KARTE_ORIGIN_ANIMALS !== 'undefined') ? KARTE_ORIGIN_ANIMALS[karte.originId] : null;
  const charCode = (animalDataPre && animalDataPre.code) || karte.originCode || '';
  // 性別が女性のときのみキャラを描画 (それ以外は SVG/テキスト主体のシェア画像)
  const shareImgPath = (typeof getCharImgPath === 'function')
    ? getCharImgPath(charCode, karte.gender)
    : (karte.gender === 'female' ? `images/karte/spirits/${charCode}.png` : null);
  let charImg = null;
  if (shareImgPath) {
    try {
      charImg = await new Promise((resolve) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = shareImgPath;
        setTimeout(() => resolve(null), 5000);
      });
    } catch (e) { charImg = null; }
  }

  // 背景(オフホワイト + 上下に薄いグラデーション)
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#F4F0E8');
  bgGrad.addColorStop(0.5, '#FAF8F4');
  bgGrad.addColorStop(1, '#F2EEE6');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // ゴールドの細線(上下)
  ctx.fillStyle = '#B8945A';
  ctx.fillRect(0, 0, W, 4);
  ctx.fillRect(0, H - 4, W, 4);

  // フォント設定
  const fontMono = "'Montserrat', 'Helvetica Neue', Arial, sans-serif";
  const fontSerif = "'Cormorant Garamond', 'Noto Serif JP', serif";
  const fontJP = "'Noto Serif JP', 'Cormorant Garamond', serif";

  const cx = W / 2;
  let y = isSquare ? 90 : 180;

  // SEAM ロゴ
  ctx.fillStyle = '#3D3833';
  ctx.font = `400 28px ${fontMono}`;
  ctx.textAlign = 'center';
  ctx.fillText('SEAM', cx, y);

  // — Your Hair Type
  y += 50;
  ctx.fillStyle = '#B8945A';
  ctx.font = `500 18px ${fontMono}`;
  ctx.fillText('— YOUR HAIR TYPE', cx, y);

  // ペンタゴンの中心位置(やや小さめに)
  y += isSquare ? 50 : 80;
  const pentagonR = isSquare ? 110 : 130;
  const pentagonCY = y + pentagonR;
  drawCanvasPentagon(ctx, cx, pentagonCY, pentagonR, karte.radar || [3,3,3,3,3]);

  // ── キャラクターイラスト ──
  y = pentagonCY + pentagonR + (isSquare ? 20 : 40);
  const charSize = isSquare ? 300 : 480;
  if (charImg) {
    // 元画像のアスペクト比を保持して中央配置
    const ar = charImg.width / charImg.height;
    let dw = charSize, dh = charSize;
    if (ar >= 1) { dh = charSize / ar; } else { dw = charSize * ar; }
    const dx = cx - dw / 2;
    const dy = y;

    // 柔らかい影
    ctx.save();
    ctx.shadowColor = 'rgba(60,52,44,0.18)';
    ctx.shadowBlur = isSquare ? 18 : 28;
    ctx.shadowOffsetY = 6;
    ctx.drawImage(charImg, dx, dy, dw, dh);
    ctx.restore();

    y = dy + dh + (isSquare ? 18 : 36);
  } else {
    // フォールバック: なくても見苦しくない
    y += isSquare ? 20 : 30;
  }

  // 動物英語名 · コード
  ctx.fillStyle = '#8C7A63';
  ctx.font = `400 ${isSquare ? 20 : 22}px ${fontMono}`;
  // 英語名は KARTE_ORIGIN_ANIMALS から取得
  const animalData = (typeof KARTE_ORIGIN_ANIMALS !== 'undefined') ? KARTE_ORIGIN_ANIMALS[karte.originId] : null;
  const enLabel = animalData ? `${animalData.nameEn} · ${animalData.code}` : (karte.originCode || '');
  ctx.fillText(enLabel, cx, y);

  // 動物日本語名(大)
  y += isSquare ? 50 : 80;
  ctx.fillStyle = '#1A1815';
  ctx.font = `400 ${isSquare ? 52 : 72}px ${fontJP}`;
  ctx.fillText(karte.originName || '—', cx, y);

  // 目指す姿
  if (karte.mainGoalName) {
    y += isSquare ? 50 : 90;
    ctx.fillStyle = '#8C7A63';
    ctx.font = `400 18px ${fontMono}`;
    ctx.fillText('目指す姿', cx, y);
    y += 40;
    ctx.fillStyle = '#3D3833';
    ctx.font = `400 ${isSquare ? 36 : 44}px ${fontJP}`;
    ctx.fillText(karte.mainGoalName, cx, y);
  }

  // ストーリー縦長の場合は、追加で日付とハッシュタグ
  if (!isSquare) {
    y = H - 240;
    ctx.fillStyle = '#B8945A';
    ctx.font = `500 18px ${fontMono}`;
    ctx.fillText('— SEAM HAIR FINDER', cx, y);
    y += 40;
    ctx.fillStyle = '#8C7A63';
    ctx.font = `400 16px ${fontMono}`;
    ctx.fillText(new Date().toISOString().slice(0,10), cx, y);
    y += 40;
    ctx.fillStyle = '#3D3833';
    ctx.font = `400 20px ${fontMono}`;
    ctx.fillText('#SEAM髪診断', cx, y);
    y += 36;
    ctx.fillStyle = '#8C7A63';
    ctx.font = `400 14px ${fontMono}`;
    ctx.fillText('seam.site', cx, y);
  } else {
    // 正方形の場合は下部に日付
    y = H - 100;
    ctx.fillStyle = '#B8945A';
    ctx.font = `500 14px ${fontMono}`;
    ctx.fillText('— SEAM HAIR FINDER · #SEAM髪診断', cx, y);
    y += 30;
    ctx.fillStyle = '#8C7A63';
    ctx.font = `400 12px ${fontMono}`;
    ctx.fillText(`${new Date().toISOString().slice(0,10)} · seam.site`, cx, y);
  }

  // ダウンロード
  const link = document.createElement('a');
  link.download = filename || `seam-${mode}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function buildOgImageDataURL(originId, direction) {
  const origin = KARTE_ORIGIN_ANIMALS[originId];
  if (!origin) return null;
  const direction_ = direction || 'B';
  const mainGoalId = origin.targets?.[direction_];
  const mainGoal = KARTE_GOAL_ANIMALS[mainGoalId];

  const W = 1200, H = 630;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // 黒ベース背景 + 上下ゴールド
  ctx.fillStyle = '#0F0E0D';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#B8945A';
  ctx.fillRect(0, 0, W, 3);
  ctx.fillRect(0, H - 3, W, 3);

  // 微かなラジアルグラデーション
  const grad = ctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, 600);
  grad.addColorStop(0, 'rgba(217,190,147,0.10)');
  grad.addColorStop(1, 'rgba(217,190,147,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  const fontMono = "'Montserrat', 'Helvetica Neue', Arial, sans-serif";
  const fontSerif = "'Cormorant Garamond', 'Noto Serif JP', serif";
  const fontJP = "'Noto Serif JP', 'Cormorant Garamond', serif";

  // ペンタゴン(左側)
  const pentagonCX = 320;
  const pentagonCY = H / 2;
  drawCanvasPentagonDark(ctx, pentagonCX, pentagonCY, 170, origin.radar || [3,3,3,3,3]);

  // 右側テキスト
  const textCX = 820;
  let y = 130;

  // SEAM ロゴ + バッジ
  ctx.fillStyle = '#B8945A';
  ctx.font = `500 18px ${fontMono}`;
  ctx.fillText('— SEAM HAIR FINDER', textCX, y);

  // タイプコード(大)
  y += 100;
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `400 110px ${fontSerif}`;
  ctx.fillText(origin.code || '—', textCX, y);

  // 英語名
  y += 50;
  ctx.fillStyle = '#D9BE93';
  ctx.font = `400 22px ${fontMono}`;
  ctx.fillText(origin.nameEn || '', textCX, y);

  // 日本語名
  y += 60;
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `400 44px ${fontJP}`;
  ctx.fillText(origin.name || '', textCX, y);

  // レア度 + 目指す姿
  y += 50;
  ctx.fillStyle = '#D9BE93';
  ctx.font = `400 18px ${fontMono}`;
  const subtitle = origin.nameEn || origin.code || '';
  ctx.fillText(subtitle, textCX, y);
  if (mainGoal) {
    y += 35;
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = `400 18px ${fontJP}`;
    ctx.fillText(`目指す姿 → ${mainGoal.name}`, textCX, y);
  }

  // 下部 URL
  ctx.fillStyle = 'rgba(201,169,110,0.7)';
  ctx.font = `400 14px ${fontMono}`;
  ctx.fillText('seam.site · #SEAM髪診断', textCX, H - 50);

  return canvas.toDataURL('image/png');
}

function drawCanvasPentagonDark(ctx, cx, cy, radius, values) {
  const angleFor = (i) => (-Math.PI / 2) + (i * 2 * Math.PI / 5);
  for (let lv = 1; lv <= 5; lv++) {
    const r = (lv / 5) * radius;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = angleFor(i);
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = lv === 5 ? 'rgba(217,190,147,0.45)' : 'rgba(217,190,147,0.18)';
    ctx.lineWidth = lv === 5 ? 1.4 : 0.9;
    ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(217,190,147,0.18)';
  ctx.lineWidth = 0.9;
  for (let i = 0; i < 5; i++) {
    const a = angleFor(i);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + radius * Math.cos(a), cy + radius * Math.sin(a));
    ctx.stroke();
  }
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const v = values[i] || 3;
    const r = (v / 5) * radius;
    const a = angleFor(i);
    const x = cx + r * Math.cos(a);
    const y = cy + r * Math.sin(a);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(184,148,90,0.28)';
  ctx.fill();
  ctx.strokeStyle = '#B8945A';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#B8945A';
  for (let i = 0; i < 5; i++) {
    const v = values[i] || 3;
    const r = (v / 5) * radius;
    const a = angleFor(i);
    const x = cx + r * Math.cos(a);
    const y = cy + r * Math.sin(a);
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawCanvasPentagon(ctx, cx, cy, radius, values) {
  const angleFor = (i) => (-Math.PI / 2) + (i * 2 * Math.PI / 5);
  const labels = ['透明感', '艶', 'まとまり', '華やぎ', '頭皮'];

  // グリッド
  for (let lv = 1; lv <= 5; lv++) {
    const r = (lv / 5) * radius;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = angleFor(i);
      const x = cx + r * Math.cos(a);
      const y = cy + r * Math.sin(a);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = lv === 5 ? '#D6C7B0' : '#E7E4DE';
    ctx.lineWidth = lv === 5 ? 1.4 : 1.0;
    ctx.stroke();
  }

  // 軸線
  ctx.strokeStyle = '#E7E4DE';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const a = angleFor(i);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + radius * Math.cos(a), cy + radius * Math.sin(a));
    ctx.stroke();
  }

  // データ
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const v = values[i] || 3;
    const r = (v / 5) * radius;
    const a = angleFor(i);
    const x = cx + r * Math.cos(a);
    const y = cy + r * Math.sin(a);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(184,148,90,0.16)';
  ctx.fill();
  ctx.strokeStyle = '#B8945A';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 頂点ドット
  ctx.fillStyle = '#B8945A';
  for (let i = 0; i < 5; i++) {
    const v = values[i] || 3;
    const r = (v / 5) * radius;
    const a = angleFor(i);
    const x = cx + r * Math.cos(a);
    const y = cy + r * Math.sin(a);
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  // ラベル
  ctx.fillStyle = '#3D3833';
  ctx.font = "500 14px 'Montserrat', sans-serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < 5; i++) {
    const a = angleFor(i);
    const lr = radius + 30;
    const x = cx + lr * Math.cos(a);
    const y = cy + lr * Math.sin(a);
    ctx.fillText(labels[i], x, y - 8);
    ctx.fillStyle = '#B8945A';
    ctx.font = "400 18px 'Cormorant Garamond', serif";
    ctx.fillText(String(values[i] || 3), x, y + 10);
    ctx.fillStyle = '#3D3833';
    ctx.font = "500 14px 'Montserrat', sans-serif";
  }
}

/* ---------- 美容師さんに見せるメモ ---------- */
function shareKarteLink(origin) {
  const code = origin?.code || '';
  // キャラ別OGページ経由で共有 → LINE/Instagram で「私のキャラ」がプレビュー表示される
  let url;
  if (code && /^[A-Z]{3}$/.test(code)) {
    const dir = window.location.pathname.replace(/[^/]+$/, ''); // finder.html のあるディレクトリ
    url = window.location.origin + dir + 'share/' + code + '.html';
  } else {
    url = window.location.origin + window.location.pathname;
  }
  const text = `私の髪から生まれたキャラクターは「${origin?.name || '—'}」でした。あなたの髪は、どのこ？ #SEAM髪診断`;
  if (navigator.share) {
    navigator.share({ title: 'SEAM Hair Spirits', text, url }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(`${text}\n${url}`).then(
      () => alert('リンクをコピーしました。友達に送ってみてください。'),
      () => alert('コピーに失敗しました。')
    );
  } else {
    alert('お使いの環境ではシェアできません。URLを直接コピーしてください。');
  }
}

function Result({ answers, onRestart, onCollection }) {
  const { scores, flags } = useMemo(() => computeScores(answers), [answers]);
  const typeId = useMemo(() => determineType(scores, answers), [scores, answers]);
  // 旧 TYPE_DEFS / buildDescription / buildCarePoints の参照は撤去済み (Phase B 監査)
  const chart = useMemo(() => buildChart(scores, answers), [scores, answers]);
  // 共有URLでアクセス時、ページタイトルと OG メタを動的更新
  useEffect(() => {
    if (!answers._isShared) return;
    const origin = KARTE_ORIGIN_ANIMALS[answers._sharedOriginId];
    if (!origin) return;
    const title = `${origin.name} (${origin.code}) — あなたの髪タイプは? | SEAM 髪診断`;
    const desc  = `「${origin.name}」タイプ。${origin.strength || ''}あなたの髪タイプも診断してみませんか?`;
    document.title = title;

    // 動的 OG / Twitter Card
    const setMeta = (selector, attr, content) => {
      let el = document.head.querySelector(selector);
      if (!el) {
        el = document.createElement('meta');
        if (attr === 'property') el.setAttribute('property', selector.match(/property="([^"]+)"/)?.[1] || '');
        else el.setAttribute('name', selector.match(/name="([^"]+)"/)?.[1] || '');
        document.head.appendChild(el);
      }
      el.setAttribute('content', content);
    };
    setMeta('meta[property="og:title"]', 'property', title);
    setMeta('meta[property="og:description"]', 'property', desc);
    setMeta('meta[name="twitter:title"]', 'name', title);
    setMeta('meta[name="twitter:description"]', 'name', desc);

    // 動的 OG 画像生成(クライアントサイド)
    try {
      const dataURL = buildOgImageDataURL(answers._sharedOriginId, answers._sharedDirection);
      if (dataURL) {
        setMeta('meta[property="og:image"]', 'property', dataURL);
        setMeta('meta[name="twitter:image"]', 'name', dataURL);
      }
    } catch (e) { console.warn('Dynamic OG generation failed', e); }
  }, [answers._isShared, answers._sharedOriginId]);

  const karte = useMemo(() => {
    // 共有URLから来た場合は、サンプル回答ではなく指定された originId/dir で組み立て直す
    if (answers._isShared && answers._sharedOriginId) {
      const origin = KARTE_ORIGIN_ANIMALS[answers._sharedOriginId];
      const direction = answers._sharedDirection || 'B';
      const radar = origin?.radar || [3,3,3,3,3];
      const mainGoalId = origin?.targets?.[direction];
      const mainGoal = KARTE_GOAL_ANIMALS[mainGoalId];
      const targetRadar = deriveTargetRadar(radar, direction);
      const subDirs = ['A','B','C','D'].filter(d => d !== direction);
      const subGoals = subDirs.map(d => ({ dir:d, id: origin?.targets?.[d], goal: KARTE_GOAL_ANIMALS[origin?.targets?.[d]] }));
      const states = [KARTE_POETIC_STATES.find(s => s.id === 'calm')];
      const stateText = states.map(s => s.text).join('、');
      return {
        radar, targetRadar,
        originId: answers._sharedOriginId, origin,
        direction,
        mainGoalId, mainGoal,
        subGoals,
        stateText, states,
        adviceKey:'calm', adviceText: KARTE_ADVICE.calm,
        gender: answers._sharedGender,  // 共有URL からの場合 (なければ undefined)
      };
    }
    const built = resolveKarteAnimal(answers, scores);
    if (built) built.gender = answers?.gender;  // 性別をキャラ画像表示に使う
    return built;
  }, [answers, scores]);

  // 結果が出たら localStorage に保存(次回 "前回の診断結果" 用)
  useEffect(() => {
    if (!karte) return;
    try {
      const payload = {
        version: 1,
        savedAt: new Date().toISOString(),
        originId:   karte.origin?.id || karte.originId,
        originName: karte.origin?.name,
        originCode: karte.origin?.code,
        mainGoalId: karte.mainGoalId,
        mainGoalName: karte.mainGoal?.name,
        radar:      karte.radar,
        typeId:     typeId,
        gender:     answers?.gender,  // シェア画像でキャラ画像を出すかの判定
        answersSnapshot: answers,
      };
      localStorage.setItem('seam_karte_last', JSON.stringify(payload));
    } catch (e) {}
  }, [karte, typeId, answers]);
  // 旧 ROUTINE_BY_TYPE / PRODUCTS の参照は撤去済み (Phase B 監査)

  // SEAM 全商品マスター: data/products/seam-master.json を非同期取得 → 診断回答でスコアリング
  // cache-bust付きで強制最新化
  const [seamData, setSeamData] = useState(null);
  useEffect(() => {
    fetch('data/products/seam-master.json?v=' + Date.now(), { cache: 'no-store' })
      .then(r => r.ok ? r.json() : null)
      .then(d => setSeamData(d))
      .catch(() => setSeamData(null));
  }, []);
  // Home Tools(美容家電) data 取得
  const [toolsData, setToolsData] = useState(null);
  useEffect(() => {
    fetch('data/products/seam-tools.json?v=' + Date.now(), { cache: 'no-store' })
      .then(r => r.ok ? r.json() : null)
      .then(d => setToolsData(d))
      .catch(() => setToolsData(null));
  }, []);
  const seamPicks = useMemo(() => {
    if (!seamData) return [];
    return pickSeamProducts(seamData.products, answers, scores, flags, { maxPerBrand: 2 });
  }, [seamData, answers, scores, flags]);
  // DeepMatch 商品は Mode A / Mode B 両方で出す。
  // 詳しいカルテ(Mode B)が未回答でも、かんたん診断の回答だけで処方を生成する。
  const deepResult = useMemo(() => {
    if (!seamData) return null;
    const originCode = karte?.origin?.code || '';
    return pickDeepProducts(seamData.products, answers, scores, flags, {
      maxPerBlock: 4, maxPerBrand: 3, originCode,
    });
  }, [seamData, answers, scores, flags, karte]);
  const mustPlusOne = useMemo(() => {
    if (!seamData) return [];
    return pickMustPlusOne(seamData.products, answers, scores);
  }, [seamData, answers, scores]);

  useEffect(() => { window.scrollTo({ top: 0, behavior: 'instant' }); }, []);

  return (
    <div className="min-h-[100svh] bg-finder">
      <div className="no-print"><TopBar /></div>
      <main className="relative z-10 mx-auto max-w-3xl px-5 sm:px-8 pt-28 pb-[calc(90px+env(safe-area-inset-bottom,0px))] sm:pb-28">

            <div className="flex items-center gap-3">
              <span className="font-mono tracking-widest2 text-[10.5px] uppercase text-gold">Karte</span>
              <span className="h-px w-6 bg-line" />
              <span className="font-mono tracking-widest2 text-[10.5px] uppercase text-charcoal/60">SEAM Hair Finder</span>
            </div>
            <div className="flex items-center gap-3">
              <span className="font-mono tracking-widest2 text-[10.5px] uppercase text-charcoal/50 nums">
                {new Date().toISOString().slice(0,10)}
              </span>
              <button
                onClick={saveOrShareKarte}
                className="no-print inline-flex items-center gap-1.5 font-mono tracking-widest2 text-[10px] uppercase text-ink bg-ivory border border-ink px-3 py-1.5 rounded-[1px] hover:bg-ink hover:text-ivory transition-colors"
              >
                <svg viewBox="0 0 16 16" className="w-3 h-3" fill="none" aria-hidden>
                  <path d="M8 2 L 8 11 M4 7 L 8 11 L 12 7 M2.5 13.5 L 13.5 13.5" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
                <span className="hidden sm:inline">美容師さんに見せるメモを保存</span>
                <span className="sm:hidden">メモを保存</span>
              </button>
            </div>
          </div>
        </div>

        <ResultHero
          karte={karte}
          onSaveImage={(mode) => saveKarteCardAsImage(`SEAM-${karte?.origin?.code || 'karte'}-${mode}.png`, mode)}
          onShare={() => shareKarteLink(karte?.origin)}
        />

        {/* ━━━━━ NEW: 6-Chapter Narrative (しいたけ占い風寄り添い) ━━━━━ */}
        {karte?.origin && (
          <NarrativeJourney karte={karte} answers={answers} />

        {/* ChapterBottomNav は撤去 — スマホ最小幅 320px で破綻リスクと

        {/* 旧 Chapter 02 と KarteAnimalSection は NarrativeJourney に統合済み */}

        {/* ⓐ SEAM Select Shop ブロック → 削除 (重複整理)

                    <li>· 同じ箇所への連続スルーは避け、短時間で通す。</li>
                    <li>· 気になる症状がある場合は、自宅ケアより先にサロンでご相談ください。</li>
                  </ul>
                </article>
              )}
            </div>
          </section>
        )}

        {/* 旧 Chapter 03 banner は NarrativeJourney の Chapter 04 Tender Advice に統合済み */}

{/* "あなたに必要なケア" Care Points セクションは情報重複により削除済み */}

        {/* ━━━━━ +1 MUST · プラスワン必須処方(常時表示) ━━━━━ */}
        {mustPlusOne && mustPlusOne.length > 0 && (

        {/* Deep Match — Mode A / Mode B 両方で表示(かんたん診断でも商品を出す) */}

        {/* ProductShowcase (旧 "3つの選択") は DeepProductSection (あなただけのケア処方) と
            カテゴリ重複 + 役割重複のため削除済み (Phase 1 監査での重複削減) */}

        {/* Home Tools — 美容家電(ドライヤー/アイロン/ヘッドスパ) */}
        {toolsData && toolsData.tools && (

        {/* ━━━━━ カルテが作成されました — テキストのみのカウンセリングシート ━━━━━ */}

      </main>

        SEAM · Salon Selection Store

      {/* Mobile sticky bottom CTA — 結果ページ専用 (Apple HIG準拠 min-h 56px) */}

/* ---------- App ---------- */
function loadLastKarte() {
  try {
    const raw = localStorage.getItem('seam_karte_last');
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || !parsed.answersSnapshot) return null;
    return parsed;
  } catch (e) { return null; }
}

function clearLastKarte() {
  try { localStorage.removeItem('seam_karte_last'); } catch (e) {}
}

/* URL ?type=ASR&dir=B&g=female からサンプル回答を生成 */
function buildSampleAnswersForType(typeCode, dirCode, genderCode) {
  let originId = null;
  for (const id in KARTE_ORIGIN_ANIMALS) {
    if (KARTE_ORIGIN_ANIMALS[id].code === typeCode) { originId = id; break; }
  }
  if (!originId) return null;
  const validGender = ['female', 'male'].includes(genderCode) ? genderCode : undefined;
  return {
    concerns: ['noShine'],
    length: 'shoulderUp',
    thickness: 'normal', density: 'normal', wave: 'none',
    color: 'none', bleach: 'none', straighten: 'none', perm: 'none',
    styling: { tools: ['rare'], temp: 't140' },
    lifestyle: ['desk'],
    environment: 'indoor',
    items: ['shampoo'],
    concernsItem: ['none'],
    goalTexture: 'glossy', goal: 'ends',
    headSpaInterest: 'no',
    gender: validGender,         // ★ Fix W2: 通常回答と同じ gender キー
    _isShared: true,
    _sharedOriginId: originId,
    _sharedDirection: ['A','B','C','D'].includes(dirCode) ? dirCode : 'B',
    _sharedGender: validGender,
  };
}

function App() {
  // URL から共有リンクを検出
  const sharedInit = useMemo(() => {
    if (typeof window === 'undefined') return null;
    const params = new URLSearchParams(window.location.search);
    const type = (params.get('type') || '').toUpperCase();
    const dir  = (params.get('dir')  || '').toUpperCase();
    const g    = (params.get('g')    || '').toLowerCase();
    if (!type) return null;
    const sample = buildSampleAnswersForType(type, dir, g);
    return sample;
  }, []);

  const [view, setView] = useState(sharedInit ? 'result' : 'home');
  const [answers, setAnswers] = useState(sharedInit || {});
  const [lastKarte, setLastKarte] = useState(() => loadLastKarte());
  const [reservationOpen, setReservationOpen] = useState(false);

  // 予約モーダルの開閉(イベント委譲で全てのトリガーに対応)
  useEffect(() => {
    const handler = (e) => {
      const trigger = e.target.closest('[data-open-resv]');
      if (trigger) { e.preventDefault(); setReservationOpen(true); }
    };
    document.addEventListener('click', handler);
    const esc = (e) => { if (e.key === 'Escape') setReservationOpen(false); };
    document.addEventListener('keydown', esc);
    return () => {
      document.removeEventListener('click', handler);
      document.removeEventListener('keydown', esc);
    };
  }, []);

  const start     = () => { setAnswers({}); setView('quiz'); };
  const startDeep = () => { setAnswers({}); setView('quizDeep'); };
  const resume = () => {
    if (!lastKarte) return;
    setAnswers(lastKarte.answersSnapshot || {});
    setView('result');
  };
  const complete = () => {
    setView('reveal');
    setTimeout(() => setView('result'), 2800);
  };
  const backHome = () => {
    setView('home');
    setLastKarte(loadLastKarte());
  };
  const restart = () => {
    setAnswers({});
    setView('home');
    setLastKarte(loadLastKarte());
  };
  const clearAndRestart = () => {
    clearLastKarte();
    setLastKarte(null);
    setAnswers({});
    setView('home');
  };
  // 既存ユーザーは前回のキャラから「履歴更新」モードへ。
  // 初めての方は picker mode で 18 体から選択 → 履歴入力サブフロー。
  const [pickerMode, setPickerMode] = useState(false);
  const openCollection = () => {
    setLastKarte(loadLastKarte());
    setPickerMode(false);
    setView('collection');
  };
  const openCharacterPicker = () => {
    setLastKarte(loadLastKarte());
    setPickerMode(true);
    setView('collection');
  };
  // キャラを picker で選んだ → 履歴中心の短いカルテへジャンプ
  const pickAsMine = (animal) => {
    setAnswers({ _knownOriginId: animal.id });
    setPickerMode(false);
    setView('quizDeep');
  };
  const reservationEl = <ReservationModal open={reservationOpen} onClose={() => setReservationOpen(false)} />;

  if (view === 'home')       return <>{reservationEl}<Home onStart={start} onStartDeep={startDeep} lastKarte={lastKarte} onResume={resume} onClearLast={clearAndRestart} onCollection={openCharacterPicker} onLibrary={openCollection} /></>;
  if (view === 'quiz')       return <>{reservationEl}<Quiz answers={answers} setAnswers={setAnswers} onComplete={complete} onBackHome={backHome} /></>;
  if (view === 'quizDeep')   return <>{reservationEl}<QuizDeep answers={answers} setAnswers={setAnswers} onComplete={complete} onBackHome={backHome} /></>;
  if (view === 'reveal')     return <RevealLoader />;
  if (view === 'result')     return <>{reservationEl}<Result answers={answers} onRestart={restart} onCollection={openCollection} /></>;
  if (view === 'collection') return <>{reservationEl}<Collection onBackHome={backHome} myKarte={lastKarte} onPickAsMine={pickerMode ? pickAsMine : undefined} /></>;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
setTimeout(() => { try { window.__seamReady && window.__seamReady(); } catch(e) {} }, 50);
  </script>

      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js').catch(function () {});
      });
    }
  </script>
</body>
