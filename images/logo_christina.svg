<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- 左側の水平ライン -->
  <line x1="0" y1="28" x2="36" y2="28" stroke="#888" stroke-width="0.8"/>
  <!-- CHRISTINA テキスト（セリフ体風） -->
  <text x="160" y="36"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="400"
    letter-spacing="6"
    fill="#555555"
    text-anchor="middle"
    dominant-baseline="middle">CHRISTINA</text>
  <!-- 右側の水平ライン -->
  <line x1="284" y1="28" x2="320" y2="28" stroke="#888" stroke-width="0.8"/>
  <!-- サブテキスト "It just works" -->
  <text x="160" y="56"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="8"
    font-weight="400"
    letter-spacing="2.5"
    fill="#888888"
    text-anchor="middle"
    dominant-baseline="middle">It just works</text>
</svg>
