<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0e0d"/>
  <!-- Gold accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="#c9a96e"/>

  <!-- Center content -->
  <!-- Brand name SEAM -->
  <text x="600" y="260"
    font-family="'Georgia','Times New Roman',serif"
    font-size="120" font-weight="400"
    letter-spacing="40"
    text-anchor="middle"
    fill="#ffffff">SEAM</text>

  <!-- Divider line -->
  <line x1="440" y1="290" x2="760" y2="290" stroke="#c9a96e" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="600" y="340"
    font-family="'Arial','Helvetica',sans-serif"
    font-size="18" font-weight="300"
    letter-spacing="8"
    text-anchor="middle"
    fill="#c9a96e">HAIR CARE SELECT SHOP</text>

  <!-- Description -->
  <text x="600" y="400"
    font-family="'Noto Serif JP','Hiragino Mincho Pro','serif'"
    font-size="22" font-weight="300"
    letter-spacing="4"
    text-anchor="middle"
    fill="rgba(255,255,255,0.7)">サロン専売品を、もっとわかりやすく、もっと身近に。</text>

  <!-- Store count -->
  <text x="600" y="450"
    font-family="'Arial','Helvetica',sans-serif"
    font-size="14" font-weight="300"
    letter-spacing="3"
    text-anchor="middle"
    fill="rgba(255,255,255,0.45)">銀座 · 表参道 · 大阪 · 名古屋 · 福岡 · 札幌 · 宇都宮</text>

  <!-- URL -->
  <text x="600" y="510"
    font-family="'Arial','Helvetica',sans-serif"
    font-size="16" font-weight="400"
    letter-spacing="2"
    text-anchor="middle"
    fill="rgba(201,169,110,0.7)">seam.site</text>

  <!-- Gold accent line bottom -->
  <rect x="0" y="627" width="1200" height="3" fill="#c9a96e"/>
</svg>
